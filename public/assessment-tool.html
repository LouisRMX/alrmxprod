function viewAssessment(i){
  const a=assessments[i];
  if(!a)return;
  const sc=v=>v>=80?'#27ae60':v>=60?'#D68910':'#C0392B';
  const fmtCEO=n=>'$'+Math.round(n).toLocaleString('en-US');
  const dateStr=a.date?new Date(a.date).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}):'—';

  // Build modal
  const modal=document.createElement('div');
  modal.id='assessment-modal';
  modal.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:500;display:flex;align-items:flex-start;justify-content:center;padding:24px 16px;overflow-y:auto;backdrop-filter:blur(2px)';

  const scores=[['Production',a.scores?.prod],['Dispatch',a.scores?.dispatch],['Logistics',a.scores?.logistics||a.scores?.fleet],['Quality',a.scores?.quality]];
  const scoreBars=scores.map(([n,v])=>v!=null?`
    <div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px">
        <span style="font-size:12px;color:#555;font-weight:${a.bottleneck===n?'600':'400'}">${n}${a.bottleneck===n?' ◂ bottleneck':''}</span>
        <span style="font-size:13px;font-weight:600;color:${sc(v)};font-family:monospace">${v}/100</span>
      </div>
      <div style="height:7px;background:#f0f0f0;border-radius:4px;overflow:hidden;position:relative">
        <div style="height:7px;width:${v}%;background:${sc(v)};border-radius:4px"></div>
        <div style="position:absolute;top:0;bottom:0;left:80%;width:2px;background:rgba(0,0,0,0.08)"></div>
      </div>
    </div>`:'').join('');

  modal.innerHTML=`<div style="background:#fff;border-radius:16px;width:100%;max-width:600px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.2)">

    <!-- Header -->
    <div style="background:#0F6E56;padding:18px 22px;display:flex;align-items:center;justify-content:space-between">
      <div>
        <div style="color:rgba(255,255,255,0.65);font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px">${a.company||''}</div>
        <div style="color:#fff;font-size:17px;font-weight:500">${a.plant}</div>
        <div style="color:rgba(255,255,255,0.55);font-size:11px;margin-top:2px">${a.country} · ${dateStr}${a.analyst?' · '+a.analyst:''}${a.demo?' · Demo':''}</div>
      </div>
      <button onclick="document.getElementById('assessment-modal').remove()" style="background:rgba(255,255,255,0.15);border:none;color:#fff;width:32px;height:32px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0">×</button>
    </div>

    <div style="padding:20px 22px">

      <!-- Data confidence -->
      ${(()=>{
        if(!a.answers)return'';
        const ans=a.answers;
        const srcW={'System records \u2014 read from batch computer or dispatch system':1.0,'Calculated from monthly reports or delivery tickets':0.90,'Estimated by plant manager or dispatcher':0.70,'Rough estimates \u2014 not based on records':0.60}[ans.prod_data_source];
        const frW={"Today's operation \u2014 figures from this visit":1.0,"This week \u2014 within the last 7 days":0.95,"This month \u2014 within the last 30 days":0.85,"Older or unsure":0.70}[ans.data_freshness];
        const obW={'Seen on screen \u2014 batch computer, dispatch system, or printout':1.0,'Seen on paper \u2014 delivery tickets, reports, or invoices':0.95,'Told verbally \u2014 by plant manager or dispatcher':0.75,'Mix of observed and verbal':0.85}[ans.data_observed];
        const cxW={'Yes \u2014 two or more independent sources confirmed the same figure':1.0,'Partially \u2014 one or two figures cross-checked':0.90,'No \u2014 single source for all figures':0.80,'Not possible \u2014 no second source available':0.80}[ans.data_crosscheck];
        const scW={"High \u2014 I would present these to the plant owner without hesitation":1.0,"Medium \u2014 reasonable but I'd verify one or two before presenting":0.85,"Low \u2014 significant uncertainty, treat dollar figures as directional only":0.65,"Very low \u2014 data quality was poor, findings are indicative only":0.50}[ans.data_confidence_self];
        const ws=[srcW,frW,obW,cxW].filter(v=>v!=null);
        if(!ws.length)return'';
        let pct=Math.round(Math.min(ws.reduce((s,v)=>s+v,0)/ws.length, scW||1)*100);
        const col=pct>=90?'var(--green-mid)':pct>=75?'var(--amber)':'var(--red)';
        const bg=pct>=90?'var(--green-pale)':pct>=75?'var(--amber-light)':'var(--red-light)';
        const border=pct>=90?'#9FE1CB':pct>=75?'#f9e4a0':'#f5c6c2';
        const lbl=pct>=90?'High confidence':pct>=75?'Medium confidence':pct>=60?'Low confidence':'Very low confidence';
        return`<div style="background:${bg};border:1px solid ${border};border-radius:10px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px">
          <div style="font-size:24px;font-weight:700;color:${col};font-family:monospace">${pct}%</div>
          <div>
            <div style="font-size:12px;font-weight:600;color:${col}">${lbl}</div>
            <div style="font-size:11px;color:#888;margin-top:1px">Data quality score — read dollar figures accordingly</div>
          </div>
        </div>`;
      })()}

      <!-- Hero number -->
      <div style="background:#FDEDEC;border:1px solid #f5c6c2;border-radius:12px;padding:18px 20px;margin-bottom:14px">
        <div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:#C0392B;margin-bottom:6px">Monthly margin gap</div>
        <div style="display:flex;align-items:flex-end;gap:16px;flex-wrap:wrap">
          <div>
            <div style="font-size:38px;font-weight:500;line-height:1;color:#C0392B;font-family:monospace">${fmtL(a.ebitdaMonthly||0)}</div>
            <div style="font-size:12px;color:#a93226;margin-top:4px">per month left on the table</div>
          </div>
          <div style="padding-left:16px;border-left:1px solid rgba(192,57,43,0.2)">
            <div style="font-size:20px;font-weight:500;color:#C0392B;font-family:monospace">${fmtL((a.ebitdaMonthly||0)*12)}</div>
            <div style="font-size:12px;color:#a93226;margin-top:3px">per year</div>
          </div>
          ${(a.hiddenDel||0)>0?`<div style="padding-left:16px;border-left:1px solid rgba(192,57,43,0.2)">
            <div style="font-size:20px;font-weight:500;color:#C0392B;font-family:monospace">${a.hiddenDel} deliveries/day</div>
            <div style="font-size:12px;color:#a93226;margin-top:3px">hidden — no new trucks needed</div>
          </div>`:''}
        </div>
      </div>

      <!-- Score + bottleneck -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px">
        <div style="background:#fff;border:1px solid rgba(0,0,0,0.08);border-radius:10px;padding:14px 16px">
          <div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#aaa;margin-bottom:10px">Where the loss comes from</div>
          ${scoreBars}
        </div>
        <div style="background:#fff;border:1px solid rgba(0,0,0,0.08);border-radius:10px;padding:14px 16px;display:flex;flex-direction:column;gap:10px">
          <div>

function generatePortfolioReport(){
  const src=assessments.filter(a=>a.overall||a.ebitdaMonthly);
  if(!src.length){alert('No assessments with data yet.');return;}

  let modal=document.getElementById('ceo-modal');
  if(modal)modal.remove();
  modal=document.createElement('div');
  modal.id='ceo-modal';
  modal.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:600;display:flex;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto;backdrop-filter:blur(2px)';

  const f=n=>'$'+Math.round(n).toLocaleString('en-US');
  const clr=v=>v>=80?'#27ae60':v>=60?'#D68910':'#C0392B';
  const company=src[0].company||'Portfolio';
  const totalMo=src.reduce((s,a)=>s+(a.ebitdaMonthly||0),0);
  const validS=src.filter(a=>a.overall);
  const avg=validS.length?Math.round(validS.reduce((s,a)=>s+(a.overall||0),0)/validS.length):0;
  const bnCounts={};src.forEach(a=>{if(a.bottleneck)bnCounts[a.bottleneck]=(bnCounts[a.bottleneck]||0)+1;});
  const topBn=Object.entries(bnCounts).sort((a,b)=>b[1]-a[1])[0];
  const domBn=topBn?.[0]||'—';
  const domBnCount=topBn?.[1]||0;
  const worst=src.slice().sort((a,b)=>(a.overall||100)-(b.overall||100))[0];
  const hiddenDel=src.reduce((s,a)=>s+(a.hiddenDel||0),0);
  const hiddenRev=src.reduce((s,a)=>s+(a.hiddenRevMonthly||0),0);

  const rows=src.slice().sort((a,b)=>(a.overall||100)-(b.overall||100)).map(a=>`
    <div style="display:grid;grid-template-columns:2fr 1fr 1fr 1.2fr;padding:10px 12px;border-bottom:1px solid var(--gray-50);align-items:center">
      <div style="font-size:12px;font-weight:500;color:var(--gray-800)">${(a.plant.split('—')[1]||a.plant).trim()}</div>
      <div style="font-size:13px;font-weight:600;color:${a.overall?clr(a.overall):'var(--gray-300)'};font-family:var(--mono)">${a.overall||'—'}</div>
      <div style="font-size:12px;font-weight:600;color:var(--red);font-family:var(--mono)">${f(a.ebitdaMonthly||0)}</div>
      <div style="font-size:11px;color:var(--gray-600)">${a.bottleneck||'—'}</div>
    </div>`).join('');

  const summary=[];
  if(totalMo>0) summary.push(`Across ${src.length} plant${src.length!==1?'s':''}, the portfolio is leaving <strong>${f(totalMo)}/month</strong> (${f(totalMo*12)}/year) unrealised.`);
  if(domBn!=='—') summary.push(`${domBn} is the dominant bottleneck — affecting ${domBnCount} of ${src.length} plants. This points to a shared process gap that requires a leadership decision, not a plant-level fix.`);
  if(worst&&worst.overall) summary.push(`${(worst.plant.split('—')[1]||worst.plant).trim()} is the priority plant with a score of ${worst.overall}/100.`);
  if(hiddenDel>0) summary.push(`${hiddenDel} hidden deliveries/day are available across the portfolio using existing fleet — worth ${f(hiddenRev)}/month with no additional investment.`);

  modal.innerHTML=`
    <div style="background:var(--white);border-radius:var(--radius-lg);width:100%;max-width:680px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.25)">
      <div style="background:var(--green);padding:20px;display:flex;align-items:flex-start;justify-content:space-between">
        <div>
          <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:rgba(255,255,255,0.6);margin-bottom:4px">Executive portfolio report</div>
          <div style="font-size:18px;font-weight:500;color:#fff">${company}</div>
          <div style="font-size:12px;color:rgba(255,255,255,0.6);margin-top:2px">${src.length} plant${src.length!==1?'s':''} · ${new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})}</div>
        </div>
        <button onclick="document.getElementById('ceo-modal').remove()" style="background:rgba(255,255,255,0.15);border:none;color:#fff;border-radius:6px;padding:6px 12px;font-size:12px;cursor:pointer;font-family:var(--font);white-space:nowrap;min-height:36px">Close ✕</button>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border)">
        <div style="padding:14px 16px;border-right:1px solid var(--border);border-bottom:1px solid var(--border)"><div style="font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.5px;color:var(--gray-400);margin-bottom:4px">Cost of inaction</div><div style="font-size:20px;font-weight:600;color:var(--red);font-family:var(--mono)">${f(totalMo)}/mo</div></div>
        <div style="padding:14px 16px;border-bottom:1px solid var(--border)"><div style="font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.5px;color:var(--gray-400);margin-bottom:4px">Per year</div><div style="font-size:20px;font-weight:600;color:var(--red);font-family:var(--mono)">${f(totalMo*12)}</div></div>
        <div style="padding:14px 16px;border-right:1px solid var(--border)"><div style="font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.5px;color:var(--gray-400);margin-bottom:4px">Portfolio score</div><div style="font-size:20px;font-weight:600;color:${clr(avg)};font-family:var(--mono)">${avg||'—'}/100</div></div>
        <div style="padding:14px 16px"><div style="font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.5px;color:var(--gray-400);margin-bottom:4px">Main bottleneck</div><div style="font-size:17px;font-weight:600;color:var(--gray-700);font-family:var(--mono)">${domBn}</div></div>
      </div>
      <div style="padding:16px;overflow-x:auto">
        <div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--gray-300);margin-bottom:8px">Plant breakdown</div>
        <div style="border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;min-width:360px">
          <div style="display:grid;grid-template-columns:2fr 1fr 1fr 1.2fr;padding:8px 12px;background:var(--gray-50);border-bottom:1px solid var(--border)">
            ${['Plant','Score','Gap/mo','Bottleneck'].map(h=>`<div style="font-size:10px;font-weight:600;color:var(--gray-400);text-transform:uppercase;letter-spacing:.4px">${h}</div>`).join('')}
          </div>
          ${rows}
          <div style="display:grid;grid-template-columns:2fr 1fr 1fr 1.2fr;padding:10px 12px;background:var(--gray-50)">
            <div style="font-size:11px;font-weight:600;color:var(--gray-600)">Total</div>
            <div style="font-size:12px;font-weight:600;color:var(--gray-600)">${avg} avg</div>
            <div style="font-size:12px;font-weight:600;color:var(--red);font-family:var(--mono)">${f(totalMo)}/mo</div>
            <div></div>
          </div>
        </div>
      </div>
      ${summary.length?`<div style="padding:0 16px 16px">
        <div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--gray-300);margin-bottom:8px">Summary</div>
        <div style="font-size:13px;line-height:1.75;color:var(--gray-700)">${summary.map(l=>`<p style="margin-bottom:8px">${l}</p>`).join('')}</div>
      </div>`:''}
      <div style="padding:0 16px 16px;display:flex;gap:8px;flex-wrap:wrap">
        <button onclick="window.print()" style="flex:1;padding:11px;background:var(--green);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font)">Print / save as PDF</button>
        <button onclick="sharePortfolioReport()" style="flex:1;padding:11px;background:var(--white);color:var(--green);border:1px solid var(--green-mid);border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font)">Share →</button>
      </div>
    </div>`;

  document.body.appendChild(modal);
  modal.addEventListener('click',e=>{if(e.target===modal)modal.remove();});
}


function sharePortfolioReport(){
  const fmtS=n=>'$'+Math.round(n).toLocaleString('en-US');
  const src=assessments.filter(a=>a.overall||a.ebitdaMonthly);
  if(!src.length)return;
  const totalMonthly=src.reduce((s,a)=>s+(a.ebitdaMonthly||0),0);
  const avgScore=src.filter(a=>a.overall).length?Math.round(src.filter(a=>a.overall).reduce((s,a)=>s+(a.overall||0),0)/src.filter(a=>a.overall).length):0;
  const bottleneckCounts={};src.forEach(a=>{if(a.bottleneck)bottleneckCounts[a.bottleneck]=(bottleneckCounts[a.bottleneck]||0)+1;});
  const dominantBottleneck=Object.entries(bottleneckCounts).sort((a,b)=>b[1]-a[1])[0]?.[0]||'—';
  const text=`Al-Cem — Portfolio Report\n${src[0].company||'Portfolio'} · ${new Date().toLocaleDateString('en-GB')}\n\nTotal gap: ${fmtS(totalMonthly)}/month (${fmtS(totalMonthly*12)}/year)\nPortfolio score: ${avgScore}/100\nDominant bottleneck: ${dominantBottleneck}\n\nGenerated by Al-Cem Plant Intelligence`;
  if(navigator.share){navigator.share({title:'Al-Cem Portfolio Report',text}).catch(()=>{});}
  else if(navigator.clipboard){navigator.clipboard.writeText(text).then(()=>alert('Copied to clipboard.')).catch(()=>{prompt('Copy:',text);});}
  else{prompt('Copy:',text);}
}


// ── ACTION TRACKER ────────────────────────────────────────────────────────────
function getActions(plantId){
  return JSON.parse(localStorage.getItem('alcem_actions_'+plantId)||'[]');
}
function saveActions(plantId,actions){
  localStorage.setItem('alcem_actions_'+plantId,JSON.stringify(actions));
}

function renderActions(i){
  const a=assessments[i];if(!a)return;
  const wrap=document.getElementById('actions-'+i);if(!wrap)return;
  const plantId=a.id||a.plant;
  const actions=getActions(plantId);
  if(!actions.length){wrap.innerHTML='<div style="font-size:11px;color:var(--gray-400);padding:4px 0 2px">No actions yet</div>';return;}
  const statusColors={todo:'var(--gray-400)',doing:'var(--amber)',done:'#27ae60'};
  wrap.innerHTML=actions.map((ac,j)=>`
    <div id="action-row-${i}-${j}" style="display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid var(--gray-50)">
      <select onchange="updateActionStatus(${i},${j},this.value)" style="font-size:10px;padding:2px 4px;border:1px solid var(--gray-200);border-radius:4px;color:${statusColors[ac.status||'todo']};background:var(--white);font-family:var(--font);cursor:pointer;flex-shrink:0;margin-top:1px">
        <option value="todo" ${!ac.status||ac.status==='todo'?'selected':''}>Not started</option>
        <option value="doing" ${ac.status==='doing'?'selected':''}>In progress</option>
        <option value="done" ${ac.status==='done'?'selected':''}>Done</option>
      </select>
      <div style="flex:1;min-width:0">
        <div style="font-size:12px;color:${ac.status==='done'?'var(--gray-400)':'var(--gray-700)'};text-decoration:${ac.status==='done'?'line-through':'none'};line-height:1.4;cursor:pointer" onclick="editActionInline(${i},${j})" title="Click to edit">${ac.text}</div>
        ${ac.owner?`<div style="font-size:10px;color:var(--gray-400);margin-top:1px;cursor:pointer" onclick="editActionInline(${i},${j})">${ac.owner}</div>`:''}
      </div>
      <div style="display:flex;gap:4px;flex-shrink:0">
        <button onclick="editActionInline(${i},${j})" style="background:none;border:none;color:var(--gray-300);cursor:pointer;font-size:11px;padding:0 2px" title="Edit">✎</button>
        <button onclick="deleteAction(${i},${j})" style="background:none;border:none;color:var(--gray-300);cursor:pointer;font-size:12px;padding:0 2px" title="Delete">✕</button>
      </div>
    </div>`).join('');
}

function editActionInline(i,j){
  const row=document.getElementById('action-row-'+i+'-'+j);if(!row)return;
  const a=assessments[i];if(!a)return;
  const plantId=a.id||a.plant;
  const actions=getActions(plantId);
  const ac=actions[j];if(!ac)return;
  row.innerHTML=`
    <div style="flex:1;display:flex;flex-direction:column;gap:5px;width:100%">
      <input id="edit-text-${i}-${j}" value="${ac.text.replace(/"/g,'&quot;')}" style="padding:5px 8px;border:1px solid var(--green-mid);border-radius:6px;font-size:12px;font-family:var(--font);color:var(--gray-900);background:var(--white);width:100%">
      <input id="edit-owner-${i}-${j}" value="${(ac.owner||'').replace(/"/g,'&quot;')}" placeholder="Responsible (optional)" style="padding:5px 8px;border:1px solid var(--gray-300);border-radius:6px;font-size:11px;font-family:var(--font);color:var(--gray-700);background:var(--white);width:100%">
      <div style="display:flex;gap:5px">
        <button onclick="saveActionEdit(${i},${j})" style="flex:1;padding:5px;background:var(--green);color:#fff;border:none;border-radius:5px;font-size:11px;font-weight:500;cursor:pointer;font-family:var(--font)">Save</button>
        <button onclick="renderActions(${i})" style="padding:5px 10px;background:var(--white);border:1px solid var(--gray-200);border-radius:5px;font-size:11px;color:var(--gray-500);cursor:pointer;font-family:var(--font)">Cancel</button>
      </div>
    </div>`;
  document.getElementById('edit-text-'+i+'-'+j)?.focus();
}

function editChecklistItem(itemId,plantId){
  // Don't open if already editing
  if(document.getElementById('cl-edit-'+itemId))return;
  const wrap=document.getElementById('cl-wrap-'+itemId+'-'+plantId);if(!wrap)return;
  const textEl=wrap.querySelector('[style*="font-size:13px"][style*="font-weight:500"]');
  const currentText=textEl?textEl.textContent.trim():'';
  wrap.innerHTML=`<div style="padding:8px 14px;display:flex;flex-direction:column;gap:5px;background:var(--gray-50)">
    <input id="cl-edit-${itemId}" value="${currentText.replace(/"/g,'&quot;')}"
      style="padding:6px 9px;border:1px solid var(--green-mid);border-radius:6px;font-size:13px;font-family:var(--font);color:var(--gray-900);background:var(--white);width:100%"
      onkeydown="if(event.key==='Enter')saveChecklistEdit('${itemId}','${plantId}');if(event.key==='Escape')rerenderChecklist('${plantId}')">
    <div style="display:flex;gap:5px">
      <button onclick="saveChecklistEdit('${itemId}','${plantId}')" style="flex:1;padding:6px;background:var(--green);color:#fff;border:none;border-radius:5px;font-size:12px;font-weight:500;cursor:pointer;font-family:var(--font)">Save</button>
      <button onclick="rerenderChecklist('${plantId}')" style="padding:6px 10px;background:var(--white);border:1px solid var(--gray-200);border-radius:5px;font-size:12px;color:var(--gray-500);cursor:pointer;font-family:var(--font)">Cancel</button>
    </div>
  </div>`;
  document.getElementById('cl-edit-'+itemId)?.focus();
}

function saveChecklistEdit(itemId,plantId){
  const inp=document.getElementById('cl-edit-'+itemId);
  const newText=inp?.value.trim();if(!newText)return;
  // Save override
  const overrides=JSON.parse(localStorage.getItem('alcem_actions_cl_'+plantId)||'{}');
  overrides[itemId]=newText;
  localStorage.setItem('alcem_actions_cl_'+plantId,JSON.stringify(overrides));
  // Update stored snapshot with new text so rerender shows it
  if(window._clBodyHTML&&window._clBodyHTML[plantId]){
    // Parse and update the text in the snapshot via a temporary div
    const tmp=document.createElement('div');
    tmp.innerHTML=window._clBodyHTML[plantId];
    const wrap=tmp.querySelector('#cl-wrap-'+itemId+'-'+plantId);
    if(wrap){
      const t=wrap.querySelector('[style*="font-size:13px"][style*="font-weight:500"]');
      if(t)t.textContent=newText;
    }
    window._clBodyHTML[plantId]=tmp.innerHTML;
  }
  rerenderChecklist(plantId);
}

function rerenderChecklist(plantId){
  const body=document.getElementById('cl-body-'+plantId);
  if(!body)return;
  const stored=window._clBodyHTML&&window._clBodyHTML[plantId];
  if(stored){
    body.innerHTML=stored;
  }
}

function refreshChecklist(plantId){
  const body=document.getElementById('cl-body-'+plantId);
  if(!body)return;
  const overrides=JSON.parse(localStorage.getItem('alcem_actions_cl_'+plantId)||'{}');
  const extras=JSON.parse(localStorage.getItem('alcem_actions_cl_extra_'+plantId)||'[]');
  let states={};
  try{const raw=localStorage.getItem('alcem_actions_'+plantId);if(raw)states=JSON.parse(raw);}catch(e){}
  // Update text of overridden items already in DOM
  Object.entries(overrides).forEach(([id,newText])=>{
    const wrap=document.getElementById('cl-wrap-'+id+'-'+plantId);
    if(wrap){
      const t=wrap.querySelector('[style*="font-size:13px"][style*="font-weight:500"]');
      if(t)t.textContent=newText;
    }
  });
  // Add any extra items not yet in DOM
  const addRow=document.getElementById('cl-add-row-'+plantId);
  if(!addRow)return;
  extras.forEach(ex=>{
    if(document.getElementById('cl-wrap-'+ex.id+'-'+plantId))return;
    const div=document.createElement('div');
    div.id='cl-wrap-'+ex.id+'-'+plantId;
    div.style.cssText='border-bottom:1px solid var(--gray-50)';
    const done=states[ex.id]===true;
    div.innerHTML=`<div style="display:flex;align-items:flex-start;gap:0">
      <div id="cl-${ex.id}" onclick="toggleCheck('${ex.id}','${plantId}')" style="flex:1;display:flex;gap:12px;align-items:flex-start;padding:12px 14px;cursor:pointer;background:var(--white)" onmouseover="this.style.background='#fafafa'" onmouseout="this.style.background='var(--white)'">
        <div style="width:20px;height:20px;border-radius:50%;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:11px;border:2px solid ${done?'var(--green-mid)':'var(--gray-300)'};background:${done?'var(--green-mid)':'transparent'};color:#fff">${done?'✓':''}</div>

function markBaseline(id){
  let stored=JSON.parse(localStorage.getItem('alcem_v4')||'[]');
  let idx=stored.findIndex(a=>a.id===id);
  // Fallback: find by plant name if id not found (e.g. demo assessment)
  if(idx<0){
    const plant=assessments.find(a=>a.id===id)?.plant;
    if(plant)idx=stored.findIndex(a=>a.plant===plant);
  }
  if(idx<0){
    // Assessment not in storage yet — add it from in-memory assessments
    const mem=assessments.find(a=>a.id===id);
    if(mem){stored.unshift(mem);idx=0;}
    else{alert('Assessment not found.');return;}
  }
  const plant=stored[idx].plant;
  stored.forEach(a=>{if(a.plant===plant)a.isBaseline=false;});
  stored[idx].isBaseline=true;
  localStorage.setItem('alcem_v4',JSON.stringify(stored));
  assessments=stored;
  const btn=document.getElementById('baseline-btn-'+id);
  if(btn){
    btn.innerHTML='📌 Baseline set';
    btn.style.background='var(--green-light)';
    btn.style.color='var(--green)';
    btn.style.borderColor='var(--green-mid)';
    btn.disabled=true;
    btn.style.cursor='default';
  }
  renderDashboard();
}

function getScoreExplanation(name,r){var a=S.answers||{};var bp={'Fast — under 5 minutes':0,'Normal — 5 to 7 minutes':-5,'Slow — 7 to 10 minutes':-14,'Very slow — over 10 minutes':-22};var sp={'None — no unplanned stops':0,'1 to 2 stops':-3,'3 to 5 stops':-10,'More than 5 stops':-20};var cp={'System records — read from batch computer or dispatch system':'100%','Calculated from monthly reports or delivery tickets':'90%','Estimated by plant manager or dispatcher':'70%','Rough estimates — not based on records':'60%'};var dm={'Under 15 minutes — fast response':100,'15 to 25 minutes — acceptable':70,'25 to 40 minutes — slow':40,'Over 40 minutes — critical bottleneck':10};var cm={'Always — formal zone system in place':100,'Usually — informal grouping most of the time':75,'Sometimes — depends on the dispatcher':45,'Rarely or never':15};var im={'Never — a truck is always available':100,'Occasionally — a few times per week':70,'Regularly — most busy periods':40,'Every day — always waiting for trucks':10};var tm={'Dedicated dispatch software with real-time tracking':100,'Spreadsheet combined with WhatsApp':65,'WhatsApp messages only — no spreadsheet':35,'Phone calls and a whiteboard or paper list':10};if(name==='Production'){if(r.scores.prod===null)return'Enter production data to calculate.';var base=Math.round(r.util/0.92*100),bpen=bp[a.batch_cycle]||0,spen=sp[a.stops_freq]||0,cw=cp[a.prod_data_source]||'100%';return'Util: '+Math.round(r.util*100)+'% ÷ 92% × 100 = '+base+(bpen?' | Batch: '+bpen+' pts':'')+(spen?' | Stops: '+spen+' pts':'')+' | After penalties: '+(base+bpen+spen)+' | Confidence ('+cw+'): '+r.scores.prod;}if(name==='Dispatch'){if(r.scores.dispatch===null)return'Answer dispatch questions to calculate.';var parts=[];if(dm[a.order_to_dispatch]!==undefined)parts.push('OTD '+dm[a.order_to_dispatch]+' (40%)');if(cm[a.route_clustering]!==undefined)parts.push('Cluster '+cm[a.route_clustering]+' (25%)');if(im[a.plant_idle]!==undefined)parts.push('Idle '+im[a.plant_idle]+' (20%)');if(tm[a.dispatch_tool]!==undefined)parts.push('Tool '+tm[a.dispatch_tool]+' (15%)');return parts.join(' | ')+' | Avg: '+r.scores.dispatch;}if(name==='Logistics'||name==='Fleet'){if(r.scores.logistics===null&&r.scores.fleet===null)return'Enter turnaround and truck data to calculate.';var ls=r.scores.logistics||r.scores.fleet;var cw2=cp[a.prod_data_source]||'100%';return'Turnaround: '+r.ta+'min vs '+r.TARGET_TA+'min target | Availability: '+Math.round(r.availRate*100)+'% | Score: '+ls+' | Conf: '+cw2;}return'';}

async function ftCallClaude(prompt){
  // Embedded mode — use proxy
  if(window.parent!==window&&S._assessmentId){
    return callAI(prompt);
  }
  const resp=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01','x-api-key':ANTHROPIC_API_KEY},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:600,messages:[{role:'user',content:prompt}]})
  });
  if(!resp.ok){const e=await resp.json().catch(()=>({}));throw new Error(e.error?.message||'API error');}
  const data=await resp.json();
  return data.content?.[0]?.text?.trim()||'';
}

async function ftTranslateQ(qid,englishText){
  if(FT.lang==='off')return;
  if(FT.busy[qid])return;
  const panel=document.getElementById('ft-panel-'+qid);
  const btn=document.getElementById('ft-btn-'+qid);
  if(!panel)return;

  // Toggle: if already open with same language, close it
  if(panel.classList.contains('open')&&FT.translations[qid]===FT.lang){
    panel.classList.remove('open');
    return;
  }

  FT.busy[qid]=true;
  const isRTL=(FT.lang==='ar'||FT.lang==='ur');
  panel.innerHTML=`<div class="ft-lang-tag">${FT.name}</div><div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--gray-500)"><span class="ft-spinner"></span> Translating…</div>`;
  panel.classList.add('open');
  if(btn){btn.innerHTML=`🌐 <span>Close</span>`;}

  try{
    const translated=await ftCallClaude(
      `Translate the following question into ${FT.name}. Return ONLY the translated text — no preamble, no quotation marks, no explanation. Keep it natural and direct, as if a supervisor is asking a worker.\n\nQuestion: "${englishText}"`
    );
    FT.translations[qid]=FT.lang;
    const escapedTrans=translated.replace(/`/g,"'").replace(/\\/g,'\\\\');
    panel.innerHTML=`
      <div class="ft-lang-tag">
        <span>${FT.name}</span>
        <span style="font-size:10px;color:var(--gray-400);font-weight:400;text-transform:none">tap 🔊 to read aloud</span>
      </div>
      <div class="ft-text${isRTL?' rtl':''}">${translated}</div>
      <div class="ft-actions">
        <button class="ft-speak-btn" id="ft-speak-${qid}" onclick="ftSpeak('${qid}',\`${escapedTrans}\`)">🔊 Read aloud</button>
        <button class="ft-rec-btn" id="ft-rec-${qid}" onclick="ftRecord('${qid}')">🎙 Record answer</button>
        <span id="ft-rec-loading-${qid}" style="display:none;font-size:11px;color:var(--gray-500);display:none;align-items:center;gap:5px"><span class="ft-spinner"></span> Analysing…</span>
      </div>
      <div id="ft-answer-${qid}"></div>`;
  }catch(e){
    panel.innerHTML=`<div style="font-size:12px;color:var(--red)">Translation failed — check internet connection.</div>`;
  }
  FT.busy[qid]=false;
}

async function ftSpeak(qid,text){
  const btn=document.getElementById('ft-speak-'+qid);
  // Stop any current audio
  if(FT.ttsAudio){
    FT.ttsAudio.pause();
    FT.ttsAudio=null;
    document.querySelectorAll('.ft-speak-btn').forEach(b=>{b.classList.remove('speaking');b.textContent='🔊 Read aloud';});
    if(FT._speakingQid===qid)return; // was this one — just stop
  }
  FT._speakingQid=qid;
  if(btn){btn.classList.add('speaking');btn.textContent='⏹ Stop';}

  // Try OpenAI TTS first (best quality)
  if(FT.openaiKey){
    try{
      const resp=await fetch('https://api.openai.com/v1/audio/speech',{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+FT.openaiKey},
        body:JSON.stringify({model:'tts-1',input:text,voice:'alloy',speed:0.9})
      });
      if(resp.ok){
        const blob=await resp.blob();
        const url=URL.createObjectURL(blob);
        const audio=new Audio(url);
        FT.ttsAudio=audio;
        audio.onended=()=>{
          if(btn){btn.classList.remove('speaking');btn.textContent='🔊 Read again';}
          FT.ttsAudio=null;FT._speakingQid=null;
          URL.revokeObjectURL(url);
        };
        audio.onerror=()=>{
          if(btn){btn.classList.remove('speaking');btn.textContent='🔊 Read aloud';}
          FT.ttsAudio=null;FT._speakingQid=null;
        };
        audio.play();
        return;
      }
    }catch(e){}
    if(btn){btn.classList.remove('speaking');btn.textContent='🔊 Read aloud';}
    alert('OpenAI TTS failed — check your OpenAI API key.');
    return;
  }

  // Fallback: browser TTS (lower quality)
  if(!('speechSynthesis' in window)){
    alert('No TTS available. Add an OpenAI API key above for high-quality speech in all languages.');
    if(btn){btn.classList.remove('speaking');btn.textContent='🔊 Read aloud';}
    return;
  }
  window.speechSynthesis.cancel();
  const utter=new SpeechSynthesisUtterance(text);
  utter.lang=FT.speechCode;
  utter.rate=0.85;
  utter.onend=()=>{if(btn){btn.classList.remove('speaking');btn.textContent='🔊 Read again';}FT._speakingQid=null;};
  utter.onerror=()=>{if(btn){btn.classList.remove('speaking');btn.textContent='🔊 Read aloud';}};
  window.speechSynthesis.speak(utter);
}

async function ftRecord(qid){
  const btn=document.getElementById('ft-rec-'+qid);
  // If already recording this question — stop
  if(FT.mediaRecorder&&FT.mediaRecorder.state==='recording'&&FT.currentQid===qid){
    FT.mediaRecorder.stop();
    if(btn){btn.classList.remove('recording');btn.innerHTML='🎙 Record answer';}
    return;
  }
  // Stop any existing recording
  if(FT.mediaRecorder&&FT.mediaRecorder.state==='recording'){FT.mediaRecorder.stop();}
  FT.currentQid=qid;
  FT.audioChunks=[];
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    FT.mediaRecorder=new MediaRecorder(stream);
    FT.mediaRecorder.ondataavailable=e=>{if(e.data.size>0)FT.audioChunks.push(e.data);};
    FT.mediaRecorder.onstop=async()=>{
      stream.getTracks().forEach(t=>t.stop());
      await ftProcessRecording(qid);
    };
    FT.mediaRecorder.start();
    if(btn){btn.classList.add('recording');btn.innerHTML='⏹ Stop recording';}
  }catch(err){
    // Microphone not available — show manual text input instead
    ftShowManualInput(qid);
  }
}

function ftShowManualInput(qid){
  const ansBox=document.getElementById('ft-answer-'+qid);
  if(!ansBox)return;
  const isRTL=(FT.lang==='ar'||FT.lang==='ur');
  ansBox.innerHTML=`
    <div class="ft-answer-box">
      <div class="ft-trans" style="margin-bottom:6px">Microphone not available — type the answer instead:</div>
      <textarea id="ft-manual-${qid}" style="width:100%;padding:8px;border:1px solid var(--gray-300);border-radius:6px;font-size:13px;font-family:var(--font);min-height:60px;resize:none;direction:${isRTL?'rtl':'ltr'};text-align:${isRTL?'right':'left'}" placeholder="${FT.lang==='ar'?'اكتب الإجابة هنا...':FT.lang==='ur'?'یہاں جواب لکھیں...':'Type answer here…'}"></textarea>
      <button onclick="ftAnalyseText('${qid}',document.getElementById('ft-manual-${qid}').value)" style="margin-top:6px;padding:6px 14px;background:var(--green);color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;font-family:var(--font)">Analyse answer →</button>
    </div>`;
}

async function ftProcessRecording(qid){
  const loadEl=document.getElementById('ft-rec-loading-'+qid);
  const ansBox=document.getElementById('ft-answer-'+qid);
  if(loadEl){loadEl.style.display='flex';}

  const blob=new Blob(FT.audioChunks,{type:'audio/webm'});
  const reader=new FileReader();
  reader.onloadend=async()=>{
    const base64=reader.result.split(',')[1];
    try{
      // Use Claude's audio understanding via the messages API
      const isEmbedded=window.parent!==window&&S._assessmentId;
      const audioMsg=[{role:'user',content:[
        {type:'text',text:`The following audio is an operator at a ready-mix concrete plant answering a question in ${FT.name}. Transcribe exactly what they said, then translate it to English. Respond in JSON only: {"transcription": "...", "translation": "..."}`},
        {type:'document',source:{type:'base64',media_type:'audio/webm',data:base64}}
      ]}];
      let data;
      if(isEmbedded){
        const r=await fetch('/api/ai-stream',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:audioMsg,max_tokens:600})});
        let full='';const rdr=r.body.getReader();const dec2=new TextDecoder();
        while(true){const{done:d2,value:v2}=await rdr.read();if(d2)break;const ch=dec2.decode(v2,{stream:true});for(const ln of ch.split('\n')){if(!ln.startsWith('data:'))continue;const rw=ln.slice(5).trim();if(rw==='[DONE]')continue;try{const ev2=JSON.parse(rw);if(ev2.text)full+=ev2.text;}catch(e2){}}}
        data={content:[{text:full}]};
      } else {
        const resp=await fetch('https://api.anthropic.com/v1/messages',{
          method:'POST',
          headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01','x-api-key':ANTHROPIC_API_KEY},
          body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:600,messages:audioMsg})
        });
        data=await resp.json();
      }
      const text=data.content?.[0]?.text||'';
      let parsed;
      try{parsed=JSON.parse(text.replace(/```json|```/g,'').trim());}catch(e){parsed=null;}
      if(parsed){
        if(loadEl)loadEl.style.display='none';
        await ftSuggestAnswer(qid,parsed.transcription,parsed.translation);
      }else{
        throw new Error('parse');
      }
    }catch(e){
      // Fallback: ask Claude to just process the text transcription via manual input
      if(loadEl)loadEl.style.display='none';
      ftShowManualInput(qid);
    }
  };
  reader.readAsDataURL(blob);
}

async function ftAnalyseText(qid,rawText){
  if(!rawText.trim())return;
  const ansBox=document.getElementById('ft-answer-'+qid);
  if(ansBox)ansBox.innerHTML=`<div class="ft-answer-box"><div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--gray-500)"><span class="ft-spinner"></span> Translating and analysing…</div></div>`;
  try{
    const translation=await ftCallClaude(
      `Translate this ${FT.name} text to English. Return ONLY the English translation, nothing else.\n\nText: "${rawText}"`
    );
    await ftSuggestAnswer(qid,rawText,translation);
  }catch(e){
    if(ansBox)ansBox.innerHTML=`<div class="ft-answer-box"><div style="font-size:12px;color:var(--red)">Could not translate — check internet.</div></div>`;
  }
}

async function ftSuggestAnswer(qid,transcription,translation){
  const ansBox=document.getElementById('ft-answer-'+qid);
  const loadEl=document.getElementById('ft-rec-loading-'+qid);
  if(loadEl)loadEl.style.display='none';
  if(ansBox)ansBox.innerHTML=`<div class="ft-answer-box"><div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--gray-500)"><span class="ft-spinner"></span> Matching to scorecard options…</div></div>`;

  // Find the question definition to get its options
  let qDef=null;
  for(const sec of SECTIONS){for(const q of sec.qs){if(q.id===qid){qDef=q;break;}}}

  if(!qDef){if(ansBox)ansBox.innerHTML='';return;}
  const isRTL=(FT.lang==='ar'||FT.lang==='ur');

  if(qDef.type==='opts'){
    const optsText=qDef.opts.map((o,i)=>`${i+1}. ${o}`).join('\n');
    let suggested=null,reasoning='',confidence='medium';
    try{
      const result=await ftCallClaude(
        `A concrete plant operator said (translated to English): "${translation}"\n\nChoose the best matching option from this list:\n${optsText}\n\nRespond in JSON only: {"option": "exact option text", "confidence": "high/medium/low", "reasoning": "one sentence"}`
      );
      const parsed=JSON.parse(result.replace(/```json|```/g,'').trim());
      suggested=parsed.option;confidence=parsed.confidence||'medium';reasoning=parsed.reasoning||'';
    }catch(e){suggested=qDef.opts[0];reasoning='Could not auto-match — please select manually.';}

    if(ansBox)ansBox.innerHTML=`
      <div class="ft-answer-box">
        <div class="ft-orig${isRTL?' rtl':''}">"${transcription}"</div>
        <div class="ft-trans">→ "${translation}"</div>
        ${suggested?`<div class="ft-suggestion">
          <div class="ft-sug-lbl">Suggested scorecard answer <span style="opacity:.7;font-weight:400">(${confidence} confidence)</span></div>
          <div class="ft-sug-text">${suggested}</div>
          ${reasoning?`<div class="ft-sug-why">${reasoning}</div>`:''}
        </div>
        <div class="ft-accept-row">
          <button class="ft-accept" onclick="ftAccept('${qid}','${(suggested||'').replace(/'/g,"\\'")}')">✓ Accept &amp; save to scorecard</button>
          <button class="ft-retry" onclick="ftRecord('${qid}')">↺ Re-record</button>
        </div>`:''}
      </div>`;
  }else if(qDef.type==='text'){
    // For free-text questions just fill the textarea
    if(ansBox)ansBox.innerHTML=`
      <div class="ft-answer-box">
        <div class="ft-orig${isRTL?' rtl':''}">"${transcription}"</div>
        <div class="ft-trans">→ "${translation}"</div>
        <div class="ft-accept-row">
          <button class="ft-accept" onclick="ftAcceptText('${qid}','${translation.replace(/'/g,"\\'")}')">✓ Use translation in field</button>
          <button class="ft-retry" onclick="ftRecord('${qid}')">↺ Re-record</button>
        </div>
      </div>`;
  }else{
    // Numeric — extract number
    let num='';
    try{
      const r=await ftCallClaude(`Extract ONLY the number from this English text. Return just the number, nothing else. If no clear number, return empty string.\n\nText: "${translation}"`);
      num=r.trim().replace(/[^0-9.]/g,'');
    }catch(e){}
    if(ansBox)ansBox.innerHTML=`
      <div class="ft-answer-box">
        <div class="ft-orig${isRTL?' rtl':''}">"${transcription}"</div>
        <div class="ft-trans">→ "${translation}"</div>
        ${num?`<div class="ft-suggestion"><div class="ft-sug-lbl">Extracted value</div><div class="ft-sug-text">${num}</div></div>
        <div class="ft-accept-row">
          <button class="ft-accept" onclick="ftAcceptNum('${qid}','${num}')">✓ Use value: ${num}</button>
          <button class="ft-retry" onclick="ftRecord('${qid}')">↺ Re-record</button>
        </div>`:'<div style="font-size:12px;color:var(--gray-500)">Could not extract a number — please enter manually.</div>'}
      </div>`;
  }
}

function ftAccept(qid,option){
  // Simulate clicking the corresponding option button
  const optBtns=document.querySelectorAll(`#qcard-${qid} .opt`);
  let matched=false;
  optBtns.forEach(btn=>{
    if(btn.textContent.trim()===option||btn.textContent.trim().startsWith(option)){
      btn.click();matched=true;
    }
  });
  if(!matched){
    // Fallback: directly set in answers
    saveOpt(qid,option,null);
  }
  // Close panel
  const panel=document.getElementById('ft-panel-'+qid);
  if(panel){panel.classList.remove('open');panel.innerHTML='';}
  const ftBtn=document.getElementById('ft-btn-'+qid);
  if(ftBtn)ftBtn.innerHTML='🌐 <span>Translate &amp; read aloud</span>';
  // Visual confirmation on the question card
  const card=document.getElementById('qcard-'+qid);
  if(card)card.style.borderLeftColor='var(--green-mid)';
}

function ftAcceptText(qid,text){
  const ta=document.getElementById('inp-'+qid);
  if(ta){ta.value=text;save(qid,text);}
  const panel=document.getElementById('ft-panel-'+qid);
  if(panel){panel.classList.remove('open');panel.innerHTML='';}
}

function ftAcceptNum(qid,num){
  const inp=document.getElementById('inp-'+qid);
  if(inp){inp.value=num;save(qid,num);calcLive(qid);}
  const panel=document.getElementById('ft-panel-'+qid);
  if(panel){panel.classList.remove('open');panel.innerHTML='';}
}
</script>


<script>
// ── KPI FLOATING TOOLTIP ──────────────────────────────────────────────────────
(function(){
  // Inject tooltip DOM once
  var tt=document.createElement('div');
  tt.id='kpi-tooltip';
  tt.innerHTML='<div id="kpi-tooltip-arrow" class="arr-up"></div>'
    +'<div class="kpi-tt-header">'
    +'<span class="kpi-tt-name" id="kpi-tt-name"></span>'
    +'<button class="kpi-tt-close" onclick="hideKpiTooltip()">✕</button>'
    +'</div>'
    +'<div class="kpi-tt-divider"></div>'
    +'<div id="kpi-tt-body"></div>';
  document.body.appendChild(tt);
})();

var _kpiTTActive=null;

function showKpiTooltip(e,label,score,chipId){
  e.stopPropagation();
  var tt=document.getElementById('kpi-tooltip');
  if(!tt)return;

  // Toggle off if same chip clicked again
  if(_kpiTTActive===chipId&&tt.classList.contains('kpi-tt-visible')){
    hideKpiTooltip();return;
  }
  _kpiTTActive=chipId;

  var info={
    'Overall Score':{
      what:'A single number that summarises plant health across four areas: Production, Dispatch, Logistics, and Quality.',
      how:'Simple average of all four scores. Each area:\n\nPRODUCTION — How close the plant runs to designed capacity. Score based on actual vs. designed m³/hr, with penalties for slow batch cycle and unplanned stops.\n\nDISPATCH — How efficiently orders become loaded trucks. Weighted: order-to-dispatch time (40%), route clustering (25%), plant idle (20%), dispatch tool (15%).\n\nLOGISTICS — How efficiently the delivery cycle runs. Weighted: turnaround vs. target (50%), truck availability (25%), qualified drivers (15%), washout time (10%).\n\nQUALITY — How well the plant controls waste and rejects. Weighted: reject rate (50%), QC consistency (25%), batch calibration (15%), surplus concrete (10%).',
      target:'≥ 80 across all four areas is best practice. Any single area below 65 is a critical finding — even if the overall score looks acceptable.',
      lever:'Address the primary bottleneck first. A 10-point improvement in the lowest area lifts the overall score by 2–3 points and typically recovers 30–50% of the total monthly opportunity.'    },
    Dispatch:{
      what:'How efficiently orders are converted into loaded trucks leaving the gate.',
      how:'Weighted average: order-to-dispatch time (40%), route clustering (25%), plant idle time (20%), dispatch tool (15%).',
      target:'≥ 80 means orders are dispatched fast, routes are coordinated, and trucks are used efficiently. Below 65 means the dispatch process is actively losing capacity.',
      lever:'Measure order-to-dispatch daily — target under 15 min.'
    },
    Production:{
      what:'How close the plant runs to its designed output capacity during active hours.',
      how:'Base score = actual m³/hr ÷ designed capacity ÷ 92% target × 100. Penalties for slow batch cycle (up to −22 pts) and stops (up to −20 pts), weighted by data confidence.',
      target:'≥ 80 means the plant is running close to its potential. Below 70 means more than a quarter of designed capacity is unused — the biggest single lever on monthly revenue.',
      lever:'Check batch cycle time first — 7→5 min/cycle recovers ~25% output.'
    },
    Logistics:{
      what:'How efficiently the delivery operation converts available fleet and driver hours into completed deliveries.',
      how:'Weighted score: turnaround vs. target (50%) + truck availability rate (25%) + qualified driver ratio (15%) + washout time (10%). Each component scored 0–100.',
      target:'≥ 80 means turnaround on target, 90%+ truck availability, full driver complement. Below 65 = significant operational drag.',
      lever:'Site readiness confirmation before dispatch recovers turnaround. Stagger home leave to prevent driver shortages. Preventive maintenance improves availability.'    },
    Quality:{
      what:'How well the plant controls quality at dispatch and minimises material waste — based on reject rate, pre-dispatch testing, equipment calibration, and over-batching.',
      how:'Weighted score: reject rate (50%) + quality control consistency (25%) + batch plant calibration (15%) + surplus concrete per trip (10%). Each component scored 0–100.',
      target:'≥ 80 means reject rate below 2%, pre-dispatch QC on every batch, batch plant calibrated within 12 months, surplus under 0.2 m³ per trip. Below 65 means material losses are running every day.',
      lever:'Pre-dispatch slump test on every load. Annual batch plant calibration. Tighter batch volumes reduce over-batching.'    },
        'Data Confidence':{
      what:'How reliable the inputs behind the four scores are. If this is low, all scores and dollar figures are directional at best.',
      how:'Weighted average: data source (40%), data freshness (25%), observation method (20%), cross-check (15%).',
      target:'≥ 80% = scores are reliable. 65–79% = treat dollar figures as directional. Below 65% = re-validate before presenting to ownership.',
      lever:'Open the batch computer monthly report and dispatch log on the next visit — these two sources alone typically lift confidence above 75%.'
    },
    'Cost of Inaction':{
      what:'The total monthly revenue and margin being left on the table — the sum of all identified, quantifiable losses running right now.',
      how:'Sum of all quantified issue losses: hidden delivery capacity, dispatch inefficiency, turnaround excess, production underutilisation, load rejections, cement optimisation, and material waste. Turnaround loss is only counted once — either under dispatch or logistics, not both.',
      target:'This is the recoverable amount if all identified issues are fixed. Not all of it is fixable immediately — the primary bottleneck alone typically accounts for 50–70% of the total.',
      lever:'Focus on the primary bottleneck first. Fixing secondary issues before the bottleneck rarely moves the total figure.'
    }
  };
  var d=info[label]||{};

  document.getElementById('kpi-tt-name').textContent=label;

  // Get per-KPI confidence if available
  var kpiConfData=null;
  try{
    var kc=calcKpiConfidence();
    var kcMap={'Dispatch':kc.dispatch,'Production':kc.prod,'Logistics':kc.fleet,'Quality':kc.fleet};
    kpiConfData=kcMap[label]||null;
  }catch(e){}

  var confRow=kpiConfData?'<div class="kpi-tt-row" style="padding-top:8px;margin-top:4px;border-top:1px solid #f0f0f0">'
    +'<div class="kpi-tt-key">Data confidence for this score</div>'
    +'<div class="kpi-tt-val" style="display:flex;align-items:center;gap:6px">'
    +'<span style="font-family:var(--mono);font-weight:700;font-size:13px;color:'+kpiConfData.color+'">'+kpiConfData.pct+'%</span>'
    +'<span style="color:'+kpiConfData.color+'">'+kpiConfData.label+'</span>'
    +'</div></div>':'';

  // For Overall Score — render 'how' as structured KPI sections
  var howHtml='';
  if(d.how){
    if(label==='Overall Score'){
      // Split by KPI name markers and render as mini-sections
      var kpiNames=['PRODUCTION','DISPATCH','LOGISTICS','QUALITY'];
      var howText=d.how;
      // First part before first KPI name
      var firstPart=howText.split('PRODUCTION')[0].trim();
      var kpiBlocks=[];
      kpiNames.forEach(function(kpi,i){
        var nextKpi=kpiNames[i+1];
        var startIdx=howText.indexOf(kpi+' —');
        if(startIdx===-1)return;
        var endIdx=nextKpi?howText.indexOf(nextKpi+' —'):howText.length;
        var block=howText.substring(startIdx,endIdx).trim();
        kpiBlocks.push(block);
      });
      howHtml='<div class="kpi-tt-row"><div class="kpi-tt-key">How it\'s calculated</div>'
        +'<div class="kpi-tt-val" style="margin-bottom:4px">'+firstPart+'</div>'
        +kpiBlocks.map(function(b){
          var dash=b.indexOf(' — ');
          var kpiLabel=b.substring(0,dash);
          var kpiDesc=b.substring(dash+3);
          return '<div style="margin-top:8px;padding:7px 9px;background:var(--gray-50);border-radius:6px;border-left:2px solid var(--green-mid)">'
            +'<div style="font-size:10px;font-weight:700;color:var(--green);margin-bottom:2px">'+kpiLabel+'</div>'
            +'<div style="font-size:11px;color:#555;line-height:1.5">'+kpiDesc+'</div>'
            +'</div>';
        }).join('')
        +'</div></div>';
    } else {
      howHtml='<div class="kpi-tt-row"><div class="kpi-tt-key">How it\'s calculated</div><div class="kpi-tt-val">'+d.how+'</div></div>';
    }
  }

  document.getElementById('kpi-tt-body').innerHTML=
    (d.what?'<div class="kpi-tt-row"><div class="kpi-tt-key">What it measures</div><div class="kpi-tt-val">'+d.what+'</div></div>':'')
    +howHtml
    +(d.target?'<div class="kpi-tt-row"><div class="kpi-tt-key">Target</div><div class="kpi-tt-val">'+d.target+'</div></div>':'')
    +(d.lever?'<div class="kpi-tt-row"><div class="kpi-tt-key">Fastest lever</div><div class="kpi-tt-val">'+d.lever+'</div></div>':'')
    +confRow;

  // Place off-screen first so we can measure real height
  tt.style.position='fixed';
  tt.style.top='-9999px';
  tt.style.left='-9999px';
  tt.classList.add('kpi-tt-visible');

  var chip=document.getElementById(chipId);
  var cr=chip?chip.getBoundingClientRect():{top:200,left:200,width:100,height:60};
  var tw=264;
  var th=tt.offsetHeight||240;
  var vh=window.innerHeight;

  // Prefer above; if not enough room above, try below; if not below either, force above with scroll
  var spaceAbove=cr.top-12;
  var spaceBelow=vh-cr.bottom-12;
  var placeAbove=spaceAbove>=th||(spaceAbove>=spaceBelow);
  var top=placeAbove ? (cr.top - th - 12) : (cr.bottom + 12);

  // If tooltip would go off top of screen, clamp it
  if(top<8)top=8;
  // If tooltip would go off bottom, clamp it
  if(top+th>vh-8)top=vh-th-8;
  if(top<8)top=8;

  var left=cr.left+(cr.width/2)-(tw/2);
  left=Math.max(8,Math.min(left,window.innerWidth-tw-8));

  tt.style.top=top+'px';
  tt.style.left=left+'px';

  // Arrow — points toward the chip
  var arr=document.getElementById('kpi-tooltip-arrow');
  if(arr){
    var arrLeft=(cr.left+(cr.width/2))-left;
    arrLeft=Math.max(14,Math.min(arrLeft,tw-14));
    arr.style.left=arrLeft+'px';
    var chipMidY=cr.top+(cr.height/2);
    var ttMidY=top+(th/2);
    arr.className=chipMidY>ttMidY?'arr-down':'arr-up';
  }
}

function hideKpiTooltip(){
  var tt=document.getElementById('kpi-tooltip');
  if(tt)tt.classList.remove('kpi-tt-visible');
  _kpiTTActive=null;
}

document.addEventListener('click',function(e){

// ── GUIDED VISIT MODE ─────────────────────────────────────────────────────────
// CORE_BLOCKS and GM defined earlier for demo access

// Triggered deep-dive groups — adaptive based on core answers
function getGuidedTriggers(r, a) {
  const triggers = [];

  if (r && r.ta > 0 && r.excessMin > 10) {
    triggers.push({
      id: 'turnaround',
      icon: '',
      title: 'Turnaround deep-dive',
      why: `Turnaround is ${r.ta} min — ${r.excessMin} min above the ${r.TARGET_TA}-min target. Where is the time going?`,
      ids: ['site_wait_time','washout_time','delivery_radius']
    });
  }

  if (r && r.rejectPct > 2) {
    triggers.push({
      id: 'reject',
      icon: '',
      title: 'Reject & return rate',
      why: `${r.rejectPct}% reject rate is above the 1.5% threshold — ${fmt(r.rejectLeakMonthly)}/month.`,
      ids: ['reject_cause','return_liability','demurrage_policy','surplus_concrete']
    });
  }

  if (r && r.hiddenDel > 5 && !r.hiddenSuspect) {
    triggers.push({
      id: 'capacity',
      icon: '',
      title: 'Hidden capacity',
      why: `${r.hiddenDel} deliveries/day unrealised — potential ${fmt(r.hiddenRevMonthly)}/month.`,
      ids: ['truck_availability','qualified_drivers','partial_load_size']
    });
  }

  const truckAvail = +a.truck_availability||0;
  const nTrucks = +a.n_trucks||0;
  if (truckAvail > 0 && nTrucks > 0 && truckAvail/nTrucks < 0.85) {
    triggers.push({
      id: 'maintenance',
      icon: '',
      title: 'Fleet maintenance',
      why: `Only ${truckAvail} of ${nTrucks} trucks operative — ${Math.round(truckAvail/nTrucks*100)}% availability.`,
      ids: ['maint_programme','truck_breakdowns']
    });
  }

  if (r && r.util < 0.75 && r.actual > 0) {
    triggers.push({
      id: 'production',
      icon: '',
      title: 'Production efficiency',
      why: `Plant running at ${Math.round(r.util*100)}% — ${Math.round((0.92-r.util)*100)} points below 92% target.`,
      ids: ['batch_cycle','stops_freq','operator_backup','batch_calibration']
    });
  }

  if (+a.cement_cost > 0) {
    triggers.push({
      id: 'mix',
      icon: '',
      title: 'Mix design & margin',
      why: 'Cement cost entered — check if mix design is optimised and margin is fully costed.',
      ids: ['mix_design_review','admix_strategy','high_strength_price','aggregate_cost','admix_cost']
    });
  }

  const country = S.meta?.country || '';
  if (['Saudi Arabia','UAE','Kuwait','Qatar','Bahrain'].includes(country)) {
    triggers.push({
      id: 'gcc',
      icon: '',
      title: 'GCC operational factors',
      why: 'GCC-specific factors — Ramadan, summer heat, cement and aggregate supply.',
      ids: ['ramadan_schedule','summer_cooling','silo_days','aggregate_days']
    });
  }

  triggers.push({
    id: 'supplementary',
    icon: '',
    title: 'Additional context',
    why: 'Supplementary data that improves report accuracy and dollar estimates.',
    ids: ['mixer_capacity','fuel_per_delivery','water_cost','order_notice','top_customer_pct','data_freshness','data_observed','data_crosscheck']
  });

  return triggers;
}

// Guided mode state — GM defined earlier

function startGuidedMode() {
  GM = { phase: 'core', triggers: [], skipped: new Set(), openGroups: new Set() };
  S.guidedMode = true;
  // Open all core blocks by default
  CORE_BLOCKS.forEach(b => GM.openGroups.add(b.id));
  renderGuidedMode();
}

function switchToFullMode() {
  S.guidedMode = false;
  S.sec = 0;
  renderSec();
}

function renderGuidedMode() {
  if (!S.guidedMode) return;
  const main = document.getElementById('diag-main');
  main.scrollTop = 0; window.scrollTo(0,0);
  if (GM.phase === 'core') renderGuidedCore(main);
  else if (GM.phase === 'depth') renderGuidedDepth(main);
  else if (GM.phase === 'preview') renderGuidedPreview(main);
}

function renderPhaseBar(currentPhase) {
  const phases = [
    { id: 'core', label: 'Core', sub: '4 blocks' },
    { id: 'depth', label: 'Deep-dive', sub: 'Adaptive' },
    { id: 'preview', label: 'Findings', sub: 'Live preview' }
  ];
  return `<div class="gm-phase-bar">` + phases.map((p, i) => {
    const state = p.id === currentPhase ? 'active' :
      ['core','depth','preview'].indexOf(p.id) < ['core','depth','preview'].indexOf(currentPhase) ? 'done' : 'pending';
    const isLast = i === phases.length - 1;
    return `<div class="gm-phase-dot ${state}">${state==='done'?'✓':(i+1)}</div>
      <div style="flex:1"><div class="gm-phase-label">${p.label}</div><div class="gm-phase-sub">${p.sub}</div></div>
      ${!isLast ? '<div class="gm-phase-sep"></div>' : ''}`;
  }).join('') + `</div>`;
}

function renderGuidedCore(main) {
  // Count answered core questions
  const allCoreIds = CORE_BLOCKS.flatMap(b => b.ids);
  const answered = allCoreIds.filter(id => S.answers[id] !== undefined && S.answers[id] !== '').length;
  const total = allCoreIds.length;
  const requiredDone = SECTIONS.flatMap(s=>s.qs).filter(q=>q.req && allCoreIds.includes(q.id))
    .every(q => S.answers[q.id] !== undefined && S.answers[q.id] !== '');
  const progress = Math.round(answered/total*100);

  const blocksHtml = CORE_BLOCKS.map(block => {
    const qs = [];
    SECTIONS.forEach(sec => sec.qs.forEach(q => { if (block.ids.includes(q.id)) qs.push(q); }));
    qs.sort((a,b) => block.ids.indexOf(a.id) - block.ids.indexOf(b.id));
    const blockAnswered = qs.filter(q => S.answers[q.id] !== undefined && S.answers[q.id] !== '').length;
    const isOpen = GM.openGroups.has(block.id);
    const allDone = blockAnswered === qs.length;

    return `<div class="gm-trigger-group">
      <div class="gm-trigger-head" onclick="gmToggleGroup('${block.id}')">
        <span class="gm-trigger-title">${block.label}</span>
        <span class="gm-trigger-count" style="${allDone?'color:var(--green)':''}">${allDone?'✓ complete':blockAnswered+'/'+qs.length}</span>
        <span style="color:var(--gray-400);font-size:12px">${isOpen?'▲':'▼'}</span>
      </div>
      <div class="gm-trigger-qs ${isOpen?'open':''}" id="gm-group-${block.id}">
        ${qs.map((q,i) => renderQ(q,i)).join('')}
      </div>
    </div>`;
  }).join('');

  main.innerHTML = `
    ${renderPhaseBar('core')}
    <div class="prog-bar" style="margin-bottom:16px">
      <div class="prog-track"><div class="prog-fill" style="width:${progress}%"></div></div>
      <div class="prog-lbl">${answered} / ${total} answered</div>
    </div>
    ${blocksHtml}
    <div style="margin-top:16px;display:flex;gap:8px;flex-wrap:wrap">
      <button class="gm-btn-primary" onclick="transitionToDepth()">Continue to deep-dive →</button>
      <button class="gm-btn-secondary" onclick="GM.phase='preview';renderGuidedMode()">Skip to findings</button>
    </div>
    <div style="margin-top:10px;padding:10px 14px;background:var(--gray-50);border-radius:8px;border:1px solid var(--border)">
      <div style="font-size:11px;color:var(--gray-500);margin-bottom:6px">Heard something important? Open deep-dive questions early to take a note.</div>
      <button class="gm-btn-secondary" style="font-size:11px" onclick="openDeepDiveEarly()">Open deep-dive questions →</button>
    </div>
    <button class="gm-view-all" onclick="switchToFullMode()">View full question set →</button>`;

  updateLiveScores();
}

function gmToggleGroup(id) {
  if (GM.openGroups.has(id)) GM.openGroups.delete(id);
  else GM.openGroups.add(id);
  renderGuidedMode();
}

function gmSkipGroup(id) {
  GM.skipped.add(id);
  GM.openGroups.delete(id);
  renderGuidedMode();
}

function openDeepDiveEarly() {
  // Build all deep-dive triggers with all IDs — no filtering by answers yet
  // This lets the analyst browse and note anything mentioned by plant manager
  const r = (() => { try { return calc(); } catch(e) { return {}; } })();
  const a = S.answers;

  // Get all possible trigger groups regardless of threshold
  const allTriggers = [
    { id:'turnaround', title:'Turnaround & site wait', why:'Site wait, washout, and delivery radius.',
      ids:['site_wait_time','washout_time','delivery_radius'] },
    { id:'reject', title:'Reject & return rate', why:'Cause, liability, demurrage, and surplus.',
      ids:['reject_cause','return_liability','demurrage_policy','surplus_concrete'] },
    { id:'capacity', title:'Fleet capacity', why:'Operative trucks, qualified drivers, load size.',
      ids:['truck_availability','qualified_drivers','partial_load_size'] },
    { id:'maintenance', title:'Fleet maintenance', why:'Maintenance programme and truck breakdowns.',
      ids:['maint_programme','truck_breakdowns'] },
    { id:'production', title:'Production efficiency', why:'Batch cycle, stops, operator backup, calibration.',
      ids:['batch_cycle','stops_freq','operator_backup','batch_calibration'] },
    { id:'mix', title:'Mix design & margin', why:'Mix review, admixture strategy, high-strength premium.',
      ids:['mix_design_review','admix_strategy','high_strength_price','aggregate_cost','admix_cost'] },
    { id:'gcc', title:'GCC operational factors', why:'Ramadan, summer cooling, cement and aggregate stock.',
      ids:['ramadan_schedule','summer_cooling','silo_days','aggregate_days'] },
    { id:'supplementary', title:'Additional context', why:'Fuel, water, order notice, customer concentration.',
      ids:['mixer_capacity','fuel_per_delivery','water_cost','order_notice','top_customer_pct','data_freshness','data_observed','data_crosscheck'] },
  ];

  GM.triggers = allTriggers;
  // Open all groups so analyst can see everything
  allTriggers.forEach(t => GM.openGroups.add(t.id));
  GM.phase = 'depth';

  const main = document.getElementById('diag-main');
  renderGuidedDepth(main);

  // Add a banner noting this is early access
  const banner = document.createElement('div');
  banner.style.cssText = 'background:var(--amber-light);border:1px solid #f9e4a0;border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:#7a5c00';
  banner.innerHTML = '<strong>Early access</strong> — all deep-dive questions shown. Answer anything you hear now. When ready, go back to core or continue to findings.';
  main.insertBefore(banner, main.firstChild);

  // Add back to core button at top
  const backBtn = document.createElement('button');
  backBtn.className = 'gm-btn-secondary';
  backBtn.style.cssText = 'margin-bottom:12px;font-size:12px';
  backBtn.textContent = '← Back to core questions';
  backBtn.onclick = () => { GM.phase = 'core'; renderGuidedMode(); };
  main.insertBefore(backBtn, main.firstChild);
}

function transitionToDepth() {
  const r = calc();
  const a = S.answers;
  GM.triggers = getGuidedTriggers(r, a);

  // Filter out triggers where all questions already answered
  GM.triggers = GM.triggers.filter(t =>
    t.ids.some(id => !S.answers[id] || S.answers[id] === '')
  );

  GM.phase = 'depth';
  const main = document.getElementById('diag-main');
  const totalFollowUp = GM.triggers.reduce((s,t) => s + t.ids.filter(id => !S.answers[id] || S.answers[id]==='').length, 0);

  if (GM.triggers.length === 0) {
    GM.phase = 'preview';
    renderGuidedMode();
    return;
  }

  // Auto-open first trigger group
  if (GM.triggers.length > 0) GM.openGroups.add(GM.triggers[0].id);

  main.innerHTML = `
    ${renderPhaseBar('depth')}
    <div class="gm-transition">
      <div class="gm-transition-title">Core complete ✓</div>
      <div class="gm-transition-sub">Based on your answers, we have <strong>${totalFollowUp} follow-up questions</strong> across <strong>${GM.triggers.length} areas</strong> — each tied to a specific finding.</div>
      <button class="gm-btn-primary" onclick="renderGuidedDepth(document.getElementById('diag-main'))">See follow-up questions →</button>
      <button class="gm-btn-secondary" onclick="GM.phase='preview';renderGuidedMode()">Skip to findings</button>
    </div>
    <button class="gm-view-all" onclick="switchToFullMode()">View full question set →</button>`;
}

function renderGuidedDepth(main) {
  GM.phase = 'depth';
  const r = calc();
  const totalRemaining = GM.triggers.reduce((s,t) =>
    s + t.ids.filter(id => (!S.answers[id] || S.answers[id]==='') && !GM.skipped.has(t.id)).length, 0);

  const groupsHtml = GM.triggers.map(t => {
    if (GM.skipped.has(t.id)) return '';
    const qs = [];
    SECTIONS.forEach(sec => sec.qs.forEach(q => { if (t.ids.includes(q.id)) qs.push(q); }));
    qs.sort((a,b) => t.ids.indexOf(a.id) - t.ids.indexOf(b.id));
    const remaining = qs.filter(q => !S.answers[q.id] || S.answers[q.id]==='').length;
    const isOpen = GM.openGroups.has(t.id);
    const allDone = remaining === 0;

    return `<div class="gm-trigger-group">
      <div class="gm-trigger-head" onclick="gmToggleGroup('${t.id}')">
        <span class="gm-trigger-title">${t.title}</span>
        <span class="gm-trigger-count" style="${allDone?'color:var(--green)':''}">${allDone?'✓ done':remaining+' remaining'}</span>
        <span style="color:var(--gray-400);font-size:12px">${isOpen?'▲':'▼'}</span>
      </div>
      <div class="gm-trigger-why">${t.why}</div>
      <div class="gm-trigger-qs ${isOpen?'open':''}" id="gm-group-${t.id}">
        ${qs.map((q,i) => renderQ(q,i)).join('')}
        <button class="gm-skip-btn" onclick="gmSkipGroup('${t.id}')">Skip this area →</button>
      </div>
    </div>`;
  }).join('');

  main.innerHTML = `
    ${renderPhaseBar('depth')}
    <div class="gm-q-counter">${totalRemaining} questions remaining</div>
    ${groupsHtml}
    <div style="margin-top:16px;display:flex;gap:8px;flex-wrap:wrap">
      <button class="gm-btn-primary" onclick="GM.phase='preview';renderGuidedMode()">Show live findings →</button>
      <button class="gm-btn-secondary" onclick="showResult()">Generate full report</button>
    </div>
    <button class="gm-view-all" onclick="switchToFullMode()">View full question set →</button>`;

  updateLiveScores();
}

function renderGuidedPreview(main) {
  const r = calc();
  const issues = buildIssues(r, S.answers);
  const top = issues.slice(0, 5);
  const totalLoss = issues.filter(i=>i.loss>0).reduce((s,i)=>s+i.loss,0);

  const findingsHtml = top.length > 0 ? top.map(iss => `
    <div class="gm-live-finding">
      <div class="gm-live-sev ${iss.sev}"></div>
      <div class="gm-live-text">${iss.t}</div>
      ${iss.loss>0?`<div class="gm-live-usd">${fmt(iss.loss)}/mo</div>`:''}
    </div>`).join('') :
    `<div style="font-size:13px;color:var(--gray-500);padding:12px 0">Answer the core questions to see findings.</div>`;

  main.innerHTML = `
    ${renderPhaseBar('preview')}
    <div class="gm-live-preview">
      <div class="gm-live-title">Live findings — ${S.meta?.plant||'this plant'}</div>
      ${findingsHtml}
      ${totalLoss>0?`<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
        <div style="font-size:11px;color:var(--gray-500)">Total identified monthly opportunity</div>
        <div style="font-size:16px;font-weight:600;color:var(--red);font-family:var(--mono)">${fmt(totalLoss)}/month</div>
      </div>`:''}
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">
      <button class="gm-btn-primary" onclick="showResult()">Generate full report →</button>
      <button class="gm-btn-secondary" onclick="GM.phase='depth';GM.triggers.length?renderGuidedDepth(document.getElementById('diag-main')):renderGuidedCore(document.getElementById('diag-main'))">← Back to questions</button>
    </div>
    <button class="gm-view-all" onclick="switchToFullMode()">View full question set →</button>`;
}

if(window.location.hash==='#demo'){
  if(!assessments.length){assessments=[...DEMO_ASSESSMENTS];localStorage.setItem('alcem_v4',JSON.stringify(assessments));}
  // Hide only the green topbar when embedded — keep mode-tabs for navigation
  document.querySelector('.topbar').style.display='none';
  switchMode('dashboard',document.querySelectorAll('.mode-tab')[3]);
}
