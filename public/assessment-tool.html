<script>
// ── BETA CONFIGURATION ────────────────────────────────────────────────────────
// ⬇⬇⬇ INDSÆT DIN API-NØGLE HER (åbn filen i Notepad og erstat teksten mellem gåseøjnene) ⬇⬇⬇
const ANTHROPIC_API_KEY = 'DIN-API-NØGLE-HER';
// ⬆⬆⬆ KUN DENNE LINJE SKAL ÆNDRES ⬆⬆⬆

const BETA_MODE = true; // Sæt til false når du lancerer rigtigt
const BETA_VERSION = 'Beta v0.1';
// ── SECTIONS ──────────────────────────────────────────────────────────────────
const SECTIONS=[
{id:'economics',label:'1. Prices & costs',qs:[
  {id:'price_m3',label:'What is your standard selling price per cubic metre (m³) of concrete?',
   hint:'1 m³ ≈ one full standard mixer load. Use your normal list price to a regular contractor — not a special discount rate.',
   field:'Check a recent invoice on screen to confirm the price.',howto:'Ask to see the most recent delivery invoice on their computer or phone. The price per m³ is usually printed on the invoice. If they quote from memory, ask to verify it on screen — plant managers often quote their best price, not their average.',type:'num',unit:'USD / m³',req:true,
   info:{what:'Revenue earned per m³ of concrete delivered.',why:'Every margin figure in this report is built on this number.',calc:'Contribution margin ($/m³) = price − cement − aggregates − admixtures. Example: $65 − $32 − $11 − $4 = $18/m³. Every dollar figure in this report is derived from this margin multiplied by volume and operating days.'}},
  {id:'cement_cost',label:'How much does cement cost per cubic metre of concrete produced?',
   hint:'Calculate: cement price per tonne × kg used per m³ ÷ 1,000. Example: 320 kg/m³ at $120/tonne = $38.40/m³.',
   field:'Check most recent cement delivery invoice for price per tonne.',howto:'Ask for the most recent cement delivery note or invoice. Find the price per tonne and the kg/m³ specification on their mix design sheet. If they cannot find either, ask the batch plant operator — they typically know the mix design from memory. Calculate: (kg per m³ ÷ 1,000) × price per tonne.',type:'num',unit:'USD / m³',req:true,
   info:{what:'Cost of cement per m³ of finished concrete.',why:'Cement is 60–75% of total variable material cost. Without it the margin calculation is incomplete.',calc:'Contribution margin = price − cement − aggregates − admixtures. To convert from tonne price: (kg per m³ ÷ 1,000) × price per tonne. Example: 320 kg at $120/t = $38.40/m³.'}},
  {id:'aggregate_cost',label:'What do sand and aggregates cost per cubic metre? (optional — leave blank if unknown)',
   hint:'All types combined: sand, gravel, crushed stone. System will estimate from regional averages if blank.',
   howto:'Ask for the most recent aggregate delivery invoice. Find the price per tonne for each type (sand, gravel, crushed stone) and ask the batch plant operator how many kg of each they use per m³ from their mix design. Calculate: (kg ÷ 1,000) × price per tonne for each, then sum. If they cannot find the mix design, ask the batch plant operator — they typically know the quantities from memory.',
   type:'num',unit:'USD / m³',
   info:{what:'Combined cost of all aggregates per m³ of concrete.',why:'Second largest variable cost after cement.',calc:'Contribution margin = price − cement − aggregates − admixtures. If blank, the system notes margin as incomplete and warns that it is overstated. No default value is substituted — the warning prompts you to obtain the figure.'}},
  {id:'admix_cost',label:'What do chemical admixtures cost per cubic metre? (optional — enter 0 if none used)',
   hint:'Plasticizers, retarders, accelerators. Retarders are important in Saudi/Bahrain heat to prevent premature hardening during transport.',
   howto:'Ask for the most recent admixture delivery invoice. Find the price per litre or kg and ask the batch plant operator what dosage rate they use per m³. If they do not use admixtures, enter 0. If they cannot find the dosage, check the mix design sheet.',
   type:'num',unit:'USD / m³',
   info:{what:'Cost of chemical additives per m³.',why:'Often $3–10/m³. Missing this slightly overstates margin.',calc:'Contribution margin = price − cement − aggregates − admixtures. Admixture cost is typically $3–10/m³. Enter 0 if none used. Leaving blank combined with blank aggregates triggers the margin-incomplete warning.'}},
  {id:'fuel_per_delivery',label:'What is the average fuel cost per concrete delivery — one round trip?',
   hint:'Calculate: monthly diesel bill ÷ total deliveries last month. Or: litres per trip × diesel price per litre.',
   field:'Ask the workshop supervisor for last month\'s diesel bill. Divide by total deliveries last month.',
   howto:'Ask the workshop supervisor or plant accountant for the total diesel expenditure last month. Divide by total deliveries last month to get cost per trip. Alternatively, ask a driver how many litres a typical round trip uses and multiply by the current diesel price. If fuel is subsidised locally, use the actual price paid — not the market rate. A typical GCC ready-mix delivery uses 8–15 litres per trip.',
   type:'num',unit:'USD per delivery',
   info:{what:'Fuel cost per truck round trip.',why:'Fuel is often the largest variable cost after materials — but many plants do not include it in their per-m³ cost calculation, causing margin to be systematically overstated.',calc:'Fuel cost per m³ = fuel_per_delivery ÷ mixer_capacity. This is subtracted from contrib to give fuel-adjusted margin. Monthly fleet fuel cost = fuel_per_delivery × delDay × (opD÷12). If fuel cost per m³ exceeds 15% of contrib, flagged as a margin erosion finding.'}},
  {id:'water_cost',label:'What does water cost per cubic metre of concrete produced? (optional — enter 0 if negligible)',
   hint:'Relevant if plant uses tanker delivery. Mains water is typically $0.50–1.50/m³ of concrete. Tanker water can reach $3–5/m³.',
   field:'Ask the accountant — check last water delivery invoice or monthly utility bill.',
   howto:'Ask whether the plant uses mains water or tanker delivery. If tanker: find last delivery invoice, divide total cost by m³ water delivered, then multiply by mix design water content (typically 160–200 litres per m³ of concrete). If mains: find monthly water bill and divide by monthly m³ produced. Enter 0 if water cost is negligible or already included in another cost line.',
   type:'num',unit:'USD / m³',
   info:{what:'Cost of water per m³ of concrete produced.',why:'In Saudi Arabia and UAE, many plants rely on tanker water delivery at $3–5/m³ of water. At 180 litres per m³ of concrete, that is $0.54–$0.90/m³ — a real margin item that is often invisible in cost tracking.',calc:'Added directly to contrib deduction: contrib = price − cement − aggregates − admixtures − water. If water_cost > $1/m³, flagged as a margin line worth tracking separately.'}},
  {id:'aggregate_days',label:'How many days of sand and aggregate stock does this plant typically hold?',
   hint:'An aggregate stoppage is as critical as a cement stoppage — but far less often tracked.',
   field:'Walk the aggregate yard — estimate pile volume visually. Ask batch plant operator daily consumption.',
   howto:'Walk the aggregate storage area and estimate the volume of sand and each aggregate type. Ask the batch plant operator what the daily consumption is in tonnes. Divide estimated stock by daily consumption. Cross-check: when was the last aggregate delivery and how much came in? Under 2 days is a critical supply risk — one missed delivery stops the plant just as surely as an empty cement silo.',
   type:'opts',
   opts:['10+ days — comfortable buffer','5 to 10 days — adequate','2 to 5 days — tight, supply-sensitive','Under 2 days — high supply risk'],
   info:{what:'Days of sand and aggregate stock at current consumption rate.',why:'Aggregate supply disruptions are as common as cement disruptions in GCC markets — especially for washed sand and crushed aggregate during peak construction seasons. Most plants track cement stock carefully but ignore aggregate stock.',calc:'Qualitative risk flag — not scored. Under 2 days = red issue. 2–5 days = amber. Mirrors silo_days logic exactly. No dollar estimate — disruption cost depends on how quickly supply can be restored.'}},
  {id:'op_days',label:'How many days per year does this plant actually produce concrete?',
   hint:'Start from 365. Subtract: Fridays (52), public holidays (~10), Ramadan if applicable (~20), other closures. Saudi/Bahrain plants typically operate 280–310 days/year.',
   howto:'Ask the plant manager to count backwards from 365: subtract Fridays (52), public holidays (10–12), Ramadan days if production is reduced (∼20), and any other planned shutdowns. Cross-check against last year’s batch production records if available.',
   type:'num',unit:'days / year',req:true,
   info:{what:'Actual working production days per year.',why:'Every annual margin figure is multiplied by this. Off by 20 days = all annual totals are wrong.',calc:'All monthly figures = annual total ÷ 12, where annual total uses this day count. Example: 300 days vs 280 days changes all annual figures by 7%. Hidden revenue = hidden deliveries × mixer cap × margin × (this ÷ 12) per month.'}},
  {id:'mix_split',label:'What is the approximate split of production by concrete strength class?',
   hint:'Concrete strength is measured in MPa or by class (C20, C25, C30, C40, C50+). Higher strength classes use more cement and command higher prices — so the mix of what you produce directly affects your real margin.',
   howto:'Ask to see the monthly production breakdown by concrete class from the batch computer or invoicing system. If not tracked by class, ask the batch plant operator which strength classes they produce most frequently. Look at the last 10 batch tickets if available.',
   type:'opts',
   opts:['Mostly standard strength — over 70% is C20 to C30','Balanced mix — roughly equal split across strength classes','Mostly high strength — over 70% is C35 and above','Not sure — no visibility on production mix by strength class'],
   info:{what:'The proportion of production that is standard vs. high-strength concrete.',why:'High-strength mixes (C35+) typically require 20–40% more cement per m³, but command 15–30% higher prices. A plant producing mostly C40 has a structurally different margin profile than one producing C25 — even with identical turnaround times.',calc:'Used with high-strength price premium (Q3.6) to calculate blended margin. Formula: blended margin = base margin + (HS premium × HS fraction). Fractions used: >70% HS = 0.75, balanced = 0.45, >70% standard = 0.15. Monthly uplift = blended margin increase × monthly m³ produced.'}},
  {id:'silo_days',label:'How many days of cement stock does this plant typically hold in its silos?',
   hint:'Ask the plant manager: "If your cement supplier stopped delivering today, how many days could you keep producing at normal volume?" Typical GCC minimum: 5 days. Less than 3 is a supply risk.',
   field:'Check the silo level indicator or ask the batch plant operator for the last cement delivery date and volume.',
   howto:'Ask to see the cement silo level gauge — most batch plants have a digital readout on the control panel. Ask what the current level is in tonnes, then ask what their average daily consumption is. Divide level by daily consumption to get days remaining.',
   type:'opts',
   opts:['10+ days — comfortable buffer','5 to 10 days — adequate','2 to 5 days — tight, supply-sensitive','Under 2 days — high supply risk'],
   info:{what:'Days of cement stock held in silos at current production rate.',why:'A single delayed cement delivery can stop a GCC plant for a full day — losing all revenue. This is a common hidden cause of unexpected downtime, especially around public holidays and during Ramadan.',calc:'Qualitative risk flag only — not included in score. Under 2 days = red issue in report. 2–5 days = amber issue. 5–10 days = adequate, no flag. 10+ days = no action. The finding is presented in the issues list with a recommendation but no dollar estimate, as supply disruption cost depends on how quickly the gap can be closed.'}},
  {id:'ramadan_schedule',label:'Does this plant adjust its dispatch schedule during Ramadan?',
   hint:'During Ramadan, site activity typically shifts earlier (5am–11am peak) and drops sharply after noon. Plants that do not adjust dispatch schedules miss the morning peak and incur idle truck costs in the afternoon.',
   howto:'Ask the plant manager directly: ‘During Ramadan, do you change your dispatch schedule to start earlier in the morning?’ If yes, ask what time first dispatch is and what time last dispatch is. If no, ask whether Ramadan affects their customer demand.',
   type:'opts',
   opts:['Yes — formal early-shift schedule during Ramadan','Partially — informal earlier start, no formal plan','No — same schedule year-round','Not applicable — plant is not in a predominantly Muslim-majority market'],
   info:{what:'Whether dispatch scheduling is formally adjusted for Ramadan operating patterns.',why:'Unadjusted dispatch during Ramadan typically costs 15–25% of monthly revenue during the period — trucks idle when demand is high, then sent out when sites have closed for iftar.',calc:'If no adjustment and country is Saudi Arabia, Bahrain, UAE, Kuwait, or Qatar: estimated Ramadan revenue loss = deliveries/day × mixer capacity × margin × 30 days × 20%. The 20% is a conservative estimate of the morning-peak revenue window missed when dispatch schedules are not brought forward. Shown as $/month in the findings list.'}},
]},
{id:'fleet',label:'2. Trucks & delivery',qs:[
  {id:'n_trucks',label:'How many mixer trucks are assigned to this plant?',
   hint:'Include trucks currently out on deliveries — not just those in the yard.',
   field:'Count from the yard, then cross-check the dispatch list for trucks on the road.',
   howto:'Walk the yard and count trucks yourself. Then ask the dispatcher to pull up the active delivery list and count trucks currently on the road. Add the two numbers. Do not accept a single verbal answer — managers often quote their nominal fleet size, not the number actually operational today.',
   type:'num',unit:'trucks',req:true,
   info:{what:'Total mixer trucks dedicated to this plant.',why:'Fleet size is the hard ceiling on daily delivery capacity.',calc:'Theoretical max deliveries/day = trucks × (op hours × 60 ÷ turnaround minutes). Realistic target = trucks × (op hours × 60 ÷ TARGET_TA) × 85% fleet utilisation, where TARGET_TA = 60 + delivery radius × 1.5 (clamped 65–110 min). Hidden deliveries = realistic target − actual.'}},
  {id:'mixer_capacity',label:'How many cubic metres can each truck carry per trip? (optional — default: 7 m³)',
   hint:'The drum capacity — common sizes: 6, 7, 8, or 9 m³. Leave blank to use 7 m³ default.',
   field:'Read from the manufacturer plate on the drum if available.',
   howto:'Look for the drum capacity plate on each mixer truck — it is stamped on the mixer drum body or printed near the driver cab. Common sizes are 6, 7, 8, or 9 m³. If trucks have different sizes, use the most common. If no plate is visible, ask the workshop supervisor.',
   type:'num',unit:'m³ per truck',
   info:{what:'Maximum volume of concrete each truck carries per trip.',why:'20 trucks at 6 m³ vs 8 m³ = 33% revenue difference per trip.',calc:'Default: 7 m³ if blank. Hidden revenue/month = hidden deliveries × mixer capacity × contribution margin × (operating days ÷ 12). Example: 10 hidden del × 7 m³ × $18 margin × 25 days/month = $31,500/month.'}},
  {id:'turnaround',label:'How long does one complete truck trip take — from leaving the plant loaded to returning empty?',
   hint:'Full round trip: load at plant + drive to site + wait at site + discharge concrete + drive back. Best practice for this region (10–20 km radius): 75–90 minutes.',
   field:'Open dispatch system, find 10 most recent completed deliveries, calculate average of (time returned − time dispatched).',
   howto:'Ask to sit at the dispatch screen and open the completed delivery log. Find the last 10 deliveries and note the departure time and return time for each. Calculate the average difference. If there is no system log, time 3 live deliveries yourself — start the timer when the loaded truck leaves the gate, stop it when the same truck returns empty.',
   type:'num',unit:'minutes',req:true,
   info:{what:'Total time for one complete truck cycle, loaded departure to empty return.',why:'The single biggest margin lever in ready-mix. Every minute above 80 reduces daily delivery capacity.',calc:'Turnaround target (TARGET_TA) = 60 + delivery radius × 1.5 minutes, clamped 65–110 min. If no radius entered, default is 80 min. Excess = actual − TARGET_TA. Logistics score = 100 − (excess ÷ TARGET_TA) × 80, confidence-weighted. Turnaround loss/month = (excess ÷ actual TA) × realistic max deliveries × mixer cap × margin × (op days ÷ 12). Example: 14 excess min ÷ 94 min × 63 target del × 7 m³ × $18 × 25 = $29,500/month.'}},
  {id:'deliveries_day',label:'On average, how many concrete deliveries does this plant complete per working day?',
   hint:'Calculate from last month: total completed deliveries ÷ working days. Monthly average is more reliable than yesterday’s count.',
   field:'Open dispatch or invoicing system: total deliveries last month ÷ days operated.',
   howto:'Ask to see the dispatch log or invoicing system. Find the total number of completed deliveries for the last full calendar month. Divide by the number of days operated that month. If they cannot find a monthly total, ask for the daily delivery report for the last 5 working days and calculate the average. Cross-check: does the number make sense given their truck count and turnaround time?',
   type:'num',unit:'deliveries / day',req:true,
   info:{what:'Average completed deliveries per working day, based on last month.',why:'Compared against theoretical fleet maximum to reveal hidden capacity.',calc:'Realistic max deliveries = trucks × (op hours × 60 ÷ TARGET_TA) × 85% utilisation. TARGET_TA = 60 + radius × 1.5, default 80 min. Hidden deliveries = realistic max − actual (capped: if gap > trucks × 3, inputs flagged as inconsistent). Hidden revenue/month = hidden del × mixer cap × margin × (op days ÷ 12). Sanity check: if hidden del > trucks × 3, the system shows a warning instead of a dollar figure.'}},
  {id:'partial_load_size',label:'On average, how many cubic metres of concrete are actually loaded per truck trip?',
   hint:'Compare to truck capacity — a 7 m³ truck consistently loaded at 4 m³ is a 43% capacity loss per trip.',
   field:'Check last 10 batch tickets — note the actual volume per load, not the truck capacity.',
   howto:'Ask the batch plant operator to pull up the last 10 batch tickets. Note the actual volume batched per load — not the truck drum capacity. Calculate the average. If tickets are not available, ask the dispatcher what a typical order size is. Small residential or villa jobs often result in partial loads. If average load is below 80% of truck capacity, that is a structural margin issue.',
   type:'num',unit:'m³ per trip',
   info:{what:'Average concrete volume actually loaded per truck trip.',why:'Sending a 7 m³ truck with 4 m³ costs the same in driver time, fuel, and turnaround as a full load — but earns 43% less revenue per trip.',calc:'Partial load ratio = partial_load_size ÷ mixer_capacity. If ratio < 0.80: monthly margin loss = (mixer_capacity − partial_load_size) × delDay × contrib × (opD÷12). Example: 7 m³ truck at 5 m³ average = 2 m³ lost × 38 del/day × $18 margin × 25 days = $34,200/month foregone margin.'}},
  {id:'delivery_radius',label:'What is the average one-way distance from this plant to active construction sites?',
   hint:'Estimate based on your most frequent delivery destinations this month. Radius directly affects turnaround time — a 5 km radius and a 25 km radius are fundamentally different operations even with identical truck counts.',
   field:'Check dispatch records for 10 recent deliveries and note site addresses. Estimate average km.',
   type:'num',unit:'km (one-way average)',
   info:{what:'Average one-way distance from plant to active sites.',why:'GCC best practice turnaround of 75–90 min assumes a 10–15 km radius. At 25 km, 90 min turnaround is excellent; at 5 km, it is a critical failure.',calc:'Radius sets the turnaround target: TARGET_TA = 60 + radius × 1.5 minutes, clamped 65–110 min. Examples: 5 km → 67 min target. 12 km → 78 min. 20 km → 90 min. 30 km → 105 min. Logistics score and all turnaround-derived dollar figures use this adjusted target, not a fixed 80 min.'}},
  {id:'truck_availability',label:'On a typical working day, how many of your mixer trucks are actually available and operational?',
   hint:'Operational = could receive a load right now. Exclude trucks in workshop, waiting for parts, or off-road.',
   field:'Ask the workshop supervisor: how many trucks are currently off-road? Subtract from total fleet.',
   howto:'Walk the yard and ask the workshop supervisor or senior mechanic: "How many trucks are currently off-road for repairs or waiting for parts?" Do not ask the plant manager — they typically quote the nominal fleet size. Subtract off-road trucks from the total fleet count entered above. The number you want is trucks that could receive a load right now.',
   type:'num',unit:'trucks available',
   info:{what:'Actual operative trucks on a typical working day.',why:'A fleet of 12 with 3 permanently off-road has the real capacity of a 9-truck fleet — all capacity calculations are overstated without this.',calc:'Availability rate = truck_availability ÷ n_trucks. Realistic max deliveries is multiplied by this rate. Example: 9 available ÷ 12 total = 75% availability. If availability < 85%, flagged as a finding. Hidden revenue recalculated on operative fleet, not nominal fleet.'}},
  {id:'qualified_drivers',label:'How many drivers are currently available and fully licensed to operate mixer trucks?',
   hint:'Exclude drivers on home leave, visa renewal, or without a valid heavy vehicle licence for this truck class.',
   field:'Ask the dispatcher or workshop supervisor — not the plant manager.',
   howto:'Ask the dispatcher or workshop supervisor: "How many drivers can take a truck out right now?" Exclude drivers currently on home leave, awaiting visa renewal, or whose heavy vehicle licence has expired or covers a smaller truck class than what the plant operates. In GCC plants, visa cycles and home leave patterns are the most common cause of periodic driver shortages — often invisible until it happens. If qualified drivers is less than operative trucks, drivers are the bottleneck, not trucks.',
   type:'num',unit:'qualified drivers available',
   info:{what:'Number of drivers currently available and fully licensed to operate mixer trucks.',why:'In GCC ready-mix, driver availability is often the binding constraint — not trucks or plant capacity. Visa renewals, home leave, and licence expiries can remove 20–30% of a driver pool at short notice.',calc:'Effective capacity ceiling = MIN(operativeTrucks, qualifiedDrivers). If qualifiedDrivers < operativeTrucks: realisticMaxDel is recalculated using qualifiedDrivers instead of operativeTrucks. Flagged as a finding if qualifiedDrivers < operativeTrucks × 0.85.'}},
  {id:'site_wait_time',label:'On average, how long does a truck wait at the construction site — from arrival to completing discharge?',
   hint:'Includes waiting for pump, foreman sign-off, and full discharge. Best practice: under 40 minutes.',
   field:'Ask the dispatcher or a driver. Check last 5 delivery records if timestamps exist.',
   howto:'Ask the dispatcher: "From when a truck arrives at site to when it leaves empty, how long does it typically take?" Then ask a driver the same question separately — the two answers often differ significantly. If the dispatch system logs arrival and departure timestamps at site, calculate the average from the last 10 deliveries. Anything over 45 minutes is a finding worth flagging.',
   type:'num',unit:'minutes at site',
   info:{what:'Average time a truck spends at the construction site per delivery.',why:'Site wait time is often the single largest component of turnaround — and the only part the plant cannot control directly, unless demurrage is enforced.',calc:'Used to decompose turnaround: estimated transit = radius × 2 × 1.5 min/km. Site time = this figure. Washout = washout_time midpoint. Unexplained remainder = turnaround − transit − site − washout. A large unexplained remainder is itself a finding. Site wait > 45 min triggers a demurrage recommendation if demurrage_policy is not enforced.'}},
  {id:'washout_time',label:'How long does the washout process take after a truck returns — from arrival at plant to ready for next load?',
   hint:'Start: truck enters gate. Stop: driver signals ready for loading. Best practice: under 15 minutes.',
   field:'Time the next returning truck yourself.',
   howto:'When the next truck returns, time it yourself — start when it enters the gate, stop when the driver signals ready for loading. If you cannot observe directly, ask two drivers independently what the washout typically takes. Drivers give more accurate answers than managers on this. Anything over 20 minutes is recoverable with basic process improvement.',
   type:'opts',
   opts:['Under 10 minutes — fast','10 to 20 minutes — standard','20 to 30 minutes — slow','Over 30 minutes — significant bottleneck'],
   info:{what:'Time to clean and prepare a truck for its next load after returning.',why:'20-minute washout on a 10-truck fleet = over 3 hours of combined fleet idle time per day.',calc:'Washout midpoints used in turnaround decomposition: <10 min = 7 min, 10–20 = 15 min, 20–30 = 25 min, >30 = 35 min. If washout > 20 min, flagged as recoverable finding. Monthly impact = (washout midpoint − 15) × deliveries_day × n_trucks × contrib ÷ 60 ÷ op_hours (as % of daily capacity lost).'}},

]},
{id:'capacity',label:'3. Production capacity',qs:[
  {id:'plant_cap',label:'What is the maximum output rate this plant was built to produce?',
   hint:'The manufacturer’s rated maximum in m³/hour — not what it produces today. Written on the specification plate.',
   field:'Find the metal spec plate on the batch plant control cabinet. Look for “Rated Capacity” or “Max Output” in m³/hr.',
   howto:'Ask the batch plant operator to show you the control cabinet. Look for a manufacturer plate — usually on the side of the control panel. Find the rated output in m³/hour. If unreadable, ask for the original purchase documents or check the batch computer configuration screen.',
   type:'num',unit:'m³ / hour',req:true,
   info:{what:'Manufacturer rated maximum output under ideal conditions.',why:'The ceiling against which all actual production is measured.',calc:'Average actual output (m³/hr) = monthly m³ ÷ (op hours × op days ÷ 12). Utilization = actual ÷ designed capacity. Capacity gap/month (in $) = (designed − actual) × op hours × (op days ÷ 12) × margin. Example: 120 m³/hr designed, 92 m³/hr actual, 10 hr/day, 25 days/month, $18 margin = (28 × 10 × 25 × $18) = $126,000/month.'}},
  {id:'op_hours',label:'How many hours per day is this plant actively producing concrete?',
   hint:'Active hours only. Exclude prayer breaks, shift handover, cleaning, maintenance.',
   howto:'Ask the batch plant operator what time the first batch of the day is produced and what time the last truck leaves. The difference minus prayer breaks (typically 4 × 10–15 min) is the active window. Cross-check: if they say 10 hours but you see the yard quiet at 4pm and they started at 6am, that is 10 hours minus breaks.',
   type:'num',unit:'hours / day',req:true,
   info:{what:'Active production hours per day.',why:'Multiplier for all capacity calculations.',calc:'Used as multiplier in three formulas: (1) Hourly output rate: monthly m³ ÷ (this × op days ÷ 12). (2) Max deliveries: trucks × (this × 60 ÷ TARGET_TA) × 85%. (3) Capacity gap cost: unused m³/hr × this × op days ÷ 12 × margin. Reducing op hours by 1 hour reduces all three.'}},
  {id:'actual_prod',label:'What was the total volume of concrete produced last month?',
   hint:'The total m³ produced and dispatched last month. This is in your batch computer or invoicing system as total monthly production. Do not estimate — this number drives the entire financial analysis.',
   field:'Open batch computer monthly report or invoicing system. Find total m³ produced or invoiced last month.',
   howto:'Ask the batch plant operator to open the monthly production report on the batch computer — this is usually a one-click report. Alternatively, ask the accounts person for total invoiced volume last month. If neither is available, ask for batch tickets from last month and count the total — this is the most reliable manual method. Never accept a verbal estimate for this figure.',
   type:'num',unit:'m³ last month',req:true,
   info:{what:'Total concrete produced and dispatched in the past calendar month.',why:'Dividing this by operating hours × operating days gives real average utilization — far more reliable than peak output, which only shows the best hour of the month.',calc:'Step 1: hours/month = op hours × (op days ÷ 12). Step 2: average rate = this figure ÷ hours/month. Step 3: utilization = rate ÷ designed capacity. Step 4: base score = utilization ÷ 0.92 × 100. Step 5: deduct batch cycle penalty (fast=0, normal=−5, slow=−14, very slow=−22) and stops penalty (0/−3/−10/−20). Step 6: multiply by confidence weight (system=100%, reports=90%, estimates=70%, rough=60%). Capacity gap cost = (designed − actual rate) × op hours × op days ÷ 12 × margin.'}},
  {id:'working_days_month',label:'How many days did the plant actually operate last month?',
   hint:'Count only the days the plant actually produced concrete — not calendar days. This must match the month reported in "actual production" above.',
   howto:'Ask the batch plant operator or check the dispatch log. Count the days with at least one delivery. In Ramadan months or holiday periods this number can be significantly lower than the annual average.',
   type:'num',unit:'working days',req:true,
   info:{what:'Actual working days in the reported production month.',why:'Converts monthly production volume to an accurate hourly rate. Using annual average (op_days÷12) instead of actual days can mis-state utilization by 20–30% in months with holidays or shutdowns.',calc:'hours this month = op_hours × this value. Hourly rate = actual_prod ÷ hours this month. If not entered, falls back to op_days ÷ 12.'}},
  {id:'operator_backup',label:'If the primary batch plant operator was absent, is there another person on site who can run the plant independently?',
   hint:'Single-operator dependency is one of the most common hidden risks in GCC ready-mix plants.',
   field:'Ask the batch plant operator directly — not the plant manager.',
   howto:'Ask the batch plant operator: "If you were sick tomorrow, who would run the plant?" Then find that person and ask them directly whether they have done it before. A manager saying "yes we have backup" and the backup person never having actually operated the plant are two very different situations. Single-operator dependency is a significant operational risk — flag it clearly in the report.',
   type:'opts',
   opts:['Yes — trained backup operator, has done it before','Partially — someone could manage but has limited experience','No — only one person can run the batch plant','Not sure'],
   info:{what:'Whether a qualified backup exists if the primary batch plant operator is absent.',why:'In GCC plants, the batch plant operator is often a long-tenure expat worker. His absence — through illness, travel, or resignation — can halt production entirely for days.',calc:'Risk flag only — not scored. If "No" or "Not sure": flagged as operational risk in report. Presented as: estimated daily revenue at risk = deliveries_day × mixer_cap × price. No monthly dollar figure shown — duration of disruption is unknown. Combined with operator tenure context if available.'}},
  {id:'batch_cycle',label:'How long does one complete mixing cycle take — from loading aggregates to discharging into the truck?',
   hint:'One cycle: load aggregates + cement into mixer → mix → discharge into truck drum. Best practice: 4–6 minutes.',
   field:'Watch 2–3 cycles and time them. Otherwise ask the batch plant operator.',howto:'Stand at the batch plant and time from when the mixer starts loading to when it is ready to discharge. Do this for at least 2 consecutive cycles. If you cannot observe directly, ask the batch plant operator — not the manager — how long a typical cycle takes. Operators give more accurate answers than managers on this question.',
   type:'opts',
   opts:['Fast — under 5 minutes','Normal — 5 to 7 minutes','Slow — 7 to 10 minutes','Very slow — over 10 minutes'],
   info:{what:'Time per complete mixing cycle.',why:'Going from 5 to 7 minutes per cycle reduces output by ~25% at most plants.',calc:'Score penalties subtracted from production base score: Fast (<5 min) = 0 pts. Normal (5–7 min) = −5 pts. Slow (7–10 min) = −14 pts. Very slow (>10 min) = −22 pts. Example: utilization score of 84 with slow cycle → 84 − 14 = 70. Applied before confidence weighting.'}},
  {id:'batch_calibration',label:'When was the batch plant\'s weighing and dosing equipment last professionally calibrated?',
   hint:'Uncalibrated equipment drifts ±3–8% on cement dosing — meaning excess cement cost or quality risk on every batch.',
   field:'Ask the batch plant operator — check for a calibration certificate near the control panel.',
   howto:'Ask the batch plant operator to show you the calibration certificate. It should be posted near the control panel or kept in the maintenance file. Note the date and who performed it. A reputable calibration is done by the equipment manufacturer or a certified metrology firm — not just a self-check by the operator. If no certificate exists, that is a significant finding. Best practice: calibration every 6–12 months.',
   type:'opts',
   opts:['Within the last 12 months — certificate available','1 to 2 years ago','More than 2 years ago','Never calibrated — original factory settings only'],
   info:{what:'How recently weighing and dosing equipment was professionally calibrated.',why:'Cement dosing drift of ±5% on a plant producing 3,000 m³/month at $38/m³ cement cost = $5,700/month in excess cement or a quality risk if under-dosing.',calc:'Qualitative risk flag. If "More than 2 years ago" or "Never": flagged as finding. Estimated monthly exposure if cement_cost entered: cement_cost × 0.05 × monthly_m3 (conservative 5% drift assumption). Combined with mix_design_review context.'}},
  {id:'stops_freq',label:'How many times did production stop unexpectedly in the past 7 days?',
   hint:'Unplanned stops only — not prayer breaks, planned maintenance, or end-of-shift shutdowns.',
   howto:'Ask the batch plant operator directly — not the manager. Ask: \'How many times did the plant stop unexpectedly this week?\'  Then ask what caused each stop. If there is a maintenance log, count corrective entries from the last 7 days. Operators remember stops better than managers because they are the ones who have to restart the plant.',
   type:'opts',
   opts:['None — no unplanned stops','1 to 2 stops','3 to 5 stops','More than 5 stops'],
   info:{what:'Unplanned production stoppages in the past 7 days.',why:'More than 2 per week signals a reliability problem.',calc:'Score penalties: None = 0 pts. 1–2 stops = −3 pts. 3–5 stops = −10 pts. More than 5 = −20 pts. Applied after batch cycle penalty, before confidence weighting. Example: base 84, slow cycle −14, 3–5 stops −10, confidence 90% → (84−14−10) × 0.90 = 54.'}},
  {id:'high_strength_price',label:'If you produce high-strength concrete (C35+), what is the price premium over standard C25? (optional)',
   hint:'Example: C25 at $65/m³, C35 at $78/m³ → premium is $13/m³. If you do not produce C35+, leave blank.',
   howto:'Ask to see a recent invoice for a C35+ delivery and a C25 delivery from the same period. The price difference per m³ is the premium. If both are not readily available, ask the plant manager or sales person what premium they charge for high-strength mixes over standard C25.',
   type:'num',unit:'USD premium per m³ over C25',
   info:{what:'Price uplift per m³ for high-strength concrete vs. standard C25.',why:'A plant producing 30% C35+ at $12 premium = material margin improvement without any operational change. Quantifying this allows a concrete recommendation on mix optimisation.',calc:'Blended margin = base margin + (this premium × HS production fraction). Fractions: mostly HS (>70%) = 0.75, balanced = 0.45, mostly standard = 0.15. Monthly uplift = (blended − base) × monthly m³. Example: $18 base, $11 premium, 15% HS share → blended = $18 + ($11 × 0.15) = $19.65/m³. On 23,000 m³/month = +$37,950/month additional margin.'}},
  {id:'mix_design_review',label:'When were the current mix designs last reviewed and optimised by a qualified engineer?',
   hint:'Mix designs not reviewed in 3+ years almost always carry excess cement — the most expensive ingredient.',
   field:'Ask to see the mix design documents — check the date and engineer signature.',
   howto:'Ask the batch plant operator or plant manager to show you the current mix design sheets. Look for the date of last revision and whether a qualified engineer signed off. Mix designs that have not been reviewed in over 3 years are almost always carrying excess cement content — particularly if admixture technology has improved since the original design. Flag this as a cost optimisation opportunity.',
   type:'opts',
   opts:['Within the last 12 months','1 to 3 years ago','More than 3 years ago','Never formally reviewed — original designs still in use'],
   info:{what:'How recently mix designs were professionally reviewed and optimised.',why:'Conservative mix designs over-dose cement by 10–20 kg/m³. At 3,000 m³/month and $120/tonne cement, 15 kg excess = $5,400/month wasted.',calc:'Qualitative risk flag. If mix_design_review is "More than 3 years ago" or "Never", flagged as cost optimisation finding. Estimated saving shown if cement_cost is entered: potential saving = cement_cost × 0.05 × monthly_m3 (conservative 5% reduction assumption). Shown as $/month alongside admix_strategy context.'}},
  {id:'admix_strategy',label:'What is the primary purpose of chemical admixtures in this plant\'s mix designs?',
   hint:'Admixtures used only for workability = missed opportunity to reduce cement content and cut costs.',
   field:'Ask the batch plant operator — he knows how the mix is actually dosed.',
   howto:'Ask the batch plant operator: "Do you use admixtures to reduce the amount of cement in the mix, or mainly to make the concrete easier to place?" The answer reveals the plant\'s sophistication. A plant using admixtures only for workability is almost certainly over-cementing. If cement cost per m³ is known, a 10% cement reduction typically saves $3–8 per m³ — present this as a finding.',
   type:'opts',
   opts:['Cement reduction — admixtures used to maintain strength at lower cement content','Workability only — admixtures used to improve flow and placement','Both equally','Admixtures not used'],
   info:{what:'Whether admixtures are used strategically to reduce cement content or only for workability.',why:'Admixtures cost $3–10/m³ but can replace $8–20/m³ of cement. Plants using them only for workability are paying twice — once for the admixture, once for excess cement.',calc:'Combined with mix_design_review. If admix_strategy is "Workability only" or "Admixtures not used" AND mix_design_review is over 3 years or never: cement optimisation finding shown with estimated monthly saving = cement_cost × 0.08 × monthly_m3 (8% reduction assumption). If mix recently reviewed, finding is amber not red.'}},
]},
{id:'dispatch',label:'4. Dispatch coordination',qs:[
  {id:'dispatch_tool',label:'How do your dispatchers manage truck assignments and deliveries?',
   hint:'How does the team decide which truck goes to which site at what time?',
   field:'Observe the dispatch office for 10 minutes before asking.',howto:'Spend 10 minutes in the dispatch office before asking any questions. Watch how orders come in and how trucks are assigned. What you see is more reliable than what they tell you. Look for: whiteboards, phones, screens, paper lists. The tool they actually use is usually visible within 2 minutes.',
   type:'opts',
   opts:['Dedicated dispatch software with real-time tracking','Spreadsheet combined with WhatsApp','WhatsApp messages only — no spreadsheet','Phone calls and a whiteboard or paper list'],
   info:{what:'Method used to assign trucks, track locations, and sequence deliveries.',why:'WhatsApp-only dispatch = no visibility, no route optimisation, no data. Each step up adds 10–20 score points.',calc:'Dispatch score component (15% of total dispatch score): software=100 pts, spreadsheet+WhatsApp=65, WhatsApp only=35, paper/whiteboard=10. Weighted with 3 other inputs: order-to-dispatch time (40%), route clustering (25%), plant idle for trucks (20%). Total dispatch score = weighted sum ÷ sum of weights of answered questions.'}},
  {id:'order_notice',label:'How much advance notice do customers typically give before a concrete delivery is required?',
   hint:'This determines what dispatch improvements are actually achievable — a plant with 2-hour notice cannot optimise routes the same way as one with 24-hour schedules.',
   field:'Ask the dispatcher — they handle the calls and know the pattern.',
   howto:'Ask the dispatcher: "When customers call to order concrete, how far in advance do they usually call?" Then ask: "What was the shortest notice you got last week?" The shortest notice reveals the real constraint. If notice varies significantly by customer type — large contractors vs. small builders — note both. This directly affects which dispatch recommendations are realistic.',
   type:'opts',
   opts:['Under 4 hours — same day calls only','4 to 24 hours — day-of or day-before','1 to 3 days ahead','Formal schedule — weekly or project-based'],
   info:{what:'How far in advance customers typically place orders.',why:'Dispatch optimisation recommendations must match the planning horizon. Route clustering and zone scheduling require at least 4–8 hours notice. Recommending formal route planning to a plant running on 1-hour calls is unrealistic and damages credibility.',calc:'Used to qualify dispatch recommendations in the report. If "Under 4 hours": dispatch recommendations focus on rapid response protocols, not route optimisation. If "1 to 3 days" or "Formal schedule": full route clustering and zone scheduling recommendations apply. Does not affect dispatch score — it contextualises it.'}},
  {id:'order_to_dispatch',label:'How long from a confirmed order to the first loaded truck leaving the gate?',
   hint:'Start: dispatcher accepts the order. Stop: loaded truck exits the gate. Best practice: under 15 minutes.',
   field:'Time 3 real orders yourself.',howto:'Ask the dispatcher to notify you when the next order is confirmed. Start your timer at that moment. Stop it when you see the loaded truck exit the gate. Do this for at least 3 orders. If you cannot observe departures directly, ask the dispatcher to show you the last 5 orders in the system and compare the order timestamp to the departure timestamp.',
   type:'opts',
   opts:['Under 15 minutes — fast response','15 to 25 minutes — acceptable','25 to 40 minutes — slow','Over 40 minutes — critical bottleneck'],
   req:true,
   info:{what:'Time from order confirmation to first loaded truck exiting the plant.',why:'25 extra minutes × 20 orders/day = over 8 hours of fleet idle time accumulated daily.',calc:'Largest single component of dispatch score (40% weight): <15 min=100 pts, 15–25 min=70, 25–40 min=40, >40 min=10. Combined with tool (15%), clustering (25%), idle (20%). If only this question is answered, dispatch score = this value only. Missing inputs reduce total weight — remaining weights are normalised to sum to 100%.'}},
  {id:'route_clustering',label:'Are deliveries to nearby sites grouped together and sent in sequence?',
   hint:'Clustering = consecutive trucks go to the same area before moving elsewhere. Reduces total driving by 15–30%.',
   field:'Ask to see today’s delivery schedule. Are consecutive deliveries going to nearby sites?',
   howto:'Ask to see the delivery schedule or dispatch log for today or yesterday. Look at the sequence — are consecutive deliveries going to nearby sites, or are trucks crossing the city randomly? If no written schedule exists, ask the dispatcher to describe the last 5 deliveries in sequence.',
   type:'opts',
   opts:['Always — formal zone system in place','Usually — informal grouping most of the time','Sometimes — depends on the dispatcher','Rarely or never'],
   info:{what:'Whether deliveries are sequenced so trucks serve nearby sites consecutively.',why:'Unoptimised routing adds 20–40 min per cycle in urban Saudi/Bahrain.',calc:'Dispatch score component (25% weight): Always=100 pts, Usually=75, Sometimes=45, Rarely or never=15. Combined with order-to-dispatch (40%), idle (20%), tool (15%). Not answering this question reduces total weight but does not block the score — remaining answered inputs are re-normalised.'}},
  {id:'plant_idle',label:'Does the plant ever sit ready to produce but have no truck available to load?',
   hint:'Happens when all trucks are out and the plant must wait. If regular, fleet/turnaround is the bottleneck — not production.',
   field:'Ask the batch plant operator: "Do you ever have concrete ready but no truck to load it into?"',howto:'Ask the batch plant operator, not the manager or dispatcher. Operators are more likely to give an honest answer. Ask: "In a typical busy day, does the mixer ever sit waiting for a truck?" Follow up: "How long does it usually wait?" A one-minute wait is fine. A 10-minute wait signals a real bottleneck.',
   type:'opts',
   opts:['Never — a truck is always available','Occasionally — a few times per week','Regularly — most busy periods','Every day — always waiting for trucks'],
   info:{what:'Whether the plant is ready but no truck is available.',why:'The clearest bottleneck signal. Plant waiting for trucks = logistics bottleneck. Trucks waiting for plant = production/dispatch bottleneck.',calc:'Dispatch score component (20% weight): Never=100 pts, Occasionally=70, Regularly=40, Every day=10. This is the most diagnostic input: plant idle = fleet/turnaround bottleneck. Trucks idle = production/dispatch bottleneck. Combined with order-to-dispatch (40%), clustering (25%), tool (15%).'}},
]},
{id:'quality',label:'5. Quality & maintenance',qs:[
  {id:'maint_programme',label:'Does this plant follow a scheduled preventive maintenance programme for mixer trucks?',
   hint:'A formal programme means service intervals are defined, logged, and followed — not just done when something breaks.',
   field:'Ask to see the maintenance log or service schedule.',
   howto:'Ask the workshop supervisor to show you the maintenance log or service schedule. A formal programme will have scheduled service intervals per truck — typically every 5,000–10,000 km or monthly. If no log exists, that is itself a significant finding. Do not accept a verbal "yes we do maintenance" — ask to see the document.',
   type:'opts',
   opts:['Yes — formal schedule, logged and followed','Informal — some checks but no written programme','Reactive only — trucks are repaired when they break down','No maintenance programme'],
   info:{what:'Whether a structured preventive maintenance programme exists for the mixer truck fleet.',why:'Reactive-only maintenance costs 3–5× more over a fleet\'s lifetime and causes unpredictable downtime. A truck breakdown during peak demand can cost a full day\'s revenue on that unit.',calc:'Used in conjunction with truck_breakdowns. If maint_programme is "Reactive only" or "No programme" AND truck_breakdowns > 2/month: flagged as high-priority finding. If programme is informal and breakdowns are 2–3: amber flag. Estimated monthly breakdown cost shown if data allows: avg downtime per breakdown × deliveries_day/trucks × mixer_cap × contrib.'}},
  {id:'truck_breakdowns',label:'How many unplanned mixer truck breakdowns occurred last month?',
   hint:'Unplanned only — not scheduled services. Count from the workshop repair log.',
   field:'Check the workshop repair log — count corrective entries for trucks only, last month.',
   howto:'Ask the workshop supervisor for the repair log or work order book. Count entries from last month marked as unplanned or corrective — exclude scheduled services. If no log exists, ask the senior mechanic directly. Separate truck breakdowns from batch plant stoppages — they are tracked separately in this assessment.',
   type:'num',unit:'breakdowns / month',
   info:{what:'Number of unplanned mixer truck failures requiring repair last month.',why:'Each breakdown removes a truck from service for hours or days. On a tight fleet, one breakdown can drop daily capacity by 10–15%.',calc:'Monthly breakdown cost estimated as: truck_breakdowns × (op_hours × 0.5) × (deliveries_day ÷ trucks) × mixer_cap × contrib. Assumes average 50% of a working day lost per breakdown. Combined with maint_programme: reactive maintenance + high breakdowns = priority finding. Also used to refine truck availability context.'}},
  {id:'return_liability',label:'When a load is returned or rejected, who bears the cost of the wasted material?',
   hint:'The answer determines whether reject_pct is a full loss to the plant or partially recoverable.',
   field:'Ask the plant manager or sales person — then ask to see a recent example in the invoicing system.',
   howto:'Ask the plant manager: "When a truck returns with unused concrete, who pays for the wasted material?" Then ask to see a recent example in the invoicing system. A verbal "contractor pays" that cannot be shown in an actual invoice is a finding in itself — it means the policy exists on paper but is not enforced.',
   type:'opts',
   opts:['Contractor always pays — formal policy enforced','Contractor sometimes pays — handled case by case','Plant always absorbs the cost','No clear policy'],
   info:{what:'Whether the plant or the contractor bears the financial cost of returned or rejected loads.',why:'If the plant absorbs all reject costs, the reject loss calculation uses full price. If contractor pays, the plant loss is limited to re-batching cost and truck time only.',calc:'Modifies rejectLeakMonthly calculation. If "Plant always absorbs" or "No clear policy": loss = reject% × deliveries × mixer_cap × price × (op_days÷12) — full write-off. If "Contractor always pays": loss = reject% × deliveries × mixer_cap × (cement_cost+agg_cost+admix_cost) × (op_days÷12) — materials only. If "Sometimes": loss uses 60% of full price as blended estimate.'}},
  {id:'demurrage_policy',label:'Does this plant charge contractors for excessive waiting time at site?',
   hint:'Demurrage = a fee charged when the truck is held at site beyond the agreed unloading window.',
   field:'Ask to see a recent invoice where demurrage was actually charged.',
   howto:'Ask the plant manager or sales person: "Do your contracts include a waiting time charge if the truck is held at site beyond the agreed window?" If yes, ask to see a recent invoice where it was actually charged. A policy that exists on paper but never appears on invoices is a significant revenue leak — flag it as such.',
   type:'opts',
   opts:['Yes — formal charge, consistently invoiced','Clause exists but rarely enforced','No demurrage charge in contracts','Not sure'],
   info:{what:'Whether the plant formally charges contractors for excessive site waiting time.',why:'Site wait time is often outside the plant\'s control. Without demurrage, the plant absorbs the entire cost of contractor delays through lost truck capacity.',calc:'Combined with site_wait_time. If site_wait_time > 45 min AND demurrage is not enforced: flagged as revenue recovery opportunity. Estimated monthly exposure = MAX(0, site_wait_time − 40) ÷ turnaround × deliveries_day × mixer_cap × contrib × (op_days÷12). Shown as potential monthly recovery if demurrage were enforced at $X per excess minute (user can set rate, default $2/min).'}},
  {id:'top_customer_pct',label:'What percentage of this plant\'s monthly volume goes to the single largest customer?',
   hint:'Above 40% is a concentration risk. Above 60% is critical — losing that customer would be existential.',
   field:'Open invoicing system — find top customer by volume last month.',
   howto:'Ask to see last month\'s delivery volume broken down by customer. Identify the single largest customer and calculate their share of total volume. If the system cannot produce this breakdown, ask the plant manager or sales person for their best estimate — flag it as unverified. Above 40% is a concentration risk worth flagging in the report.',
   type:'num',unit:'% of monthly volume',
   info:{what:'Revenue concentration in the single largest customer.',why:'High concentration = high revenue risk. A plant supplying 70% of volume to one Aramco subcontractor can lose half its revenue overnight if that contract ends.',calc:'Risk flag only — not scored. Under 30%: no flag. 30–50%: amber — note in report. Above 50%: red — flagged as strategic risk with estimated monthly revenue at risk = top_customer_pct% × deliveries_day × mixer_cap × price × (op_days÷12).'}},
  {id:'quality_control',label:'How consistently are quality checks applied before each truck leaves — slump test and water-cement ratio?',
   hint:'Slump checks workability. W/C ratio controls strength. Both should be logged every batch.',
   howto:'Ask to observe the next truck being loaded. Watch whether a slump test is performed before dispatch. Ask to see the quality log — it should have an entry per batch with slump reading and water-cement ratio. If the log is blank or not updated, that answers the question.',
   type:'opts',req:true,
   opts:['Both logged every batch — enforced strictly','Usually done — most trucks, informal recording','Sometimes — depends on operator or shift','Rarely or never — no systematic quality checks'],
   info:{what:'Consistency of pre-dispatch quality checks.',why:'Uncontrolled loads lead to rejections and contractor trust erosion.',calc:'Qualitative. In issues list alongside reject_pct.'}},
  {id:'reject_pct',label:'What percentage of loads were rejected by the contractor or returned last month?',
   hint:'Rejected at site or returned to plant = 100% loss — all costs, zero revenue.',
   field:'Look up last month in your system. If not tracked, note it — that is itself a significant finding.',
   howto:'Ask to see the dispatch log or quality records and search for returns or rejections last month. In most systems there will be a rejected or returned flag on delivery records. If they cannot find it in 2 minutes, that is itself a finding — enter their verbal estimate and flag it as unverified in the data quality section.',
   type:'num',unit:'% of total deliveries',
   info:{what:'Percentage of loads rejected or returned last month.',why:'3% on 30 deliveries/day = nearly one full load lost every day.',calc:'Monthly reject cost = (reject % ÷ 100) × deliveries/day × mixer capacity × selling price × (op days ÷ 12). Uses selling price (not margin) because a rejected load is a total write-off: all variable costs are already spent, all revenue is lost. Example: 4% reject × 38 del × 7 m³ × $65 × 25 days = $17,290/month.'}},
  {id:'reject_cause',label:'What is the most common reason loads are rejected or returned?',
   hint:'The cause determines the fix — a stiffening problem needs a different solution than a site readiness problem.',
   howto:'Ask the plant manager or dispatcher: "When a truck comes back with unused concrete, what is usually the reason?" Then ask the batch plant operator the same question separately — the answers often differ. If rejections are not tracked, that is itself a finding. The most common GCC causes are heat-related stiffening, site unreadiness, and pump failures.',
   type:'opts',
   opts:['Heat and stiffening during transit','Quality control failure at plant','Site not ready — pump or crew unavailable','Customer dispute or specification change','Rejection not tracked — unknown'],
   info:{what:'Primary cause of load rejections and returns.',why:'The same reject rate requires a completely different intervention depending on cause. Heat stiffening → retarder dosage. Site unreadiness → demurrage enforcement. QC failure → pre-dispatch testing.',calc:'Used to steer the recommendation attached to the reject issue. Does not change the dollar figure — rejectLeakMonthly is cause-independent. If "Rejection not tracked — unknown": additional flag added noting that untracked rejections cannot be managed or reduced.'}},
  {id:'surplus_concrete',label:'On average, how much concrete is left over and wasted per truck trip — returned to plant but not counted as a formal rejection?',
   hint:'This is structural waste — not a quality failure, just over-batching or customer order changes at site.',
   field:'Ask the batch plant operator or drivers — they know this better than the manager.',
   howto:'Ask the batch plant operator: "When trucks return with leftover concrete that is not a rejection — how much is typically left?" This is separate from formal returns. It includes over-batching buffers, small order shortfalls, and last-truck residuals. Drivers usually know this number well. If the plant recycles returned concrete into new batches, ask how often and how much — recycled surplus is not wasted but degrades quality control.',
   type:'opts',
   opts:['Under 0.2 m³ — minimal waste','0.2 to 0.5 m³ — moderate','0.5 to 1.0 m³ — significant','Over 1.0 m³ — serious problem'],
   info:{what:'Average volume of concrete returned per trip as structural over-batch waste — separate from formal rejections.',why:'0.5 m³ surplus per trip on 38 deliveries/day = 19 m³/day wasted. At $65/m³ selling price that is $1,235/day or ~$30,000/month in raw material cost thrown away.',calc:'Surplus midpoints: <0.2=0.1, 0.2–0.5=0.35, 0.5–1.0=0.75, >1.0=1.2 m³. Monthly surplus cost = midpoint × delDay × price × (opD÷12). Uses selling price not margin — surplus concrete has already consumed all variable costs. Shown separately from rejectLeakMonthly.'}},
  {id:'summer_cooling',label:'Does this plant actively cool concrete during summer months — chilled water, ice, or cooled aggregates?',
   hint:'In GCC summers above 40°C, concrete without active cooling stiffens 30–40% faster — directly increasing reject rate and reducing effective production time.',
   field:'Ask the batch plant operator — look for a chiller unit near the water tank.',
   howto:'Ask the batch plant operator: "In summer, do you use chilled water or ice in the mix?" Look for a chiller unit near the water storage tank. Ask whether aggregates are stored under shade or sprayed with water before batching. In GCC summer conditions, concrete temperature at discharge should not exceed 32°C — without active cooling this is very difficult to achieve above 38°C ambient. Note whether the plant is currently in summer operating mode or not.',
   type:'opts',
   opts:['Yes — chilled water system in operation','Partial — cold tap water or shaded aggregate storage only','No — no active cooling measures','Not applicable — plant operates in a mild climate year-round'],
   info:{what:'Whether the plant uses active cooling to control concrete temperature in summer.',why:'GCC summer temperatures of 42–50°C accelerate concrete stiffening by 30–40%. Plants without active cooling experience significantly higher reject rates and reduced effective production hours during June–September.',calc:'Qualitative risk flag combined with isSummer. If "No active cooling" and country is Saudi Arabia, UAE, Kuwait, Qatar, or Bahrain: flagged as seasonal risk. If reject_pct is also elevated (>2%): both findings cross-referenced. No dollar estimate — cooling investment cost varies widely.'}},
  {id:'breakdowns',label:'How many times did the batch plant itself break down unexpectedly last month — excluding truck breakdowns?',

   field:'Ask the batch plant operator and check the maintenance log — count batch plant corrective entries only.',
   howto:'Ask for the maintenance log or work order book. Count entries from last month marked as unplanned or corrective for the batch plant equipment only — mixer, weigh hopper, aggregate conveyor, cement screw, control panel. Exclude truck repairs — those are already captured separately. If there is no log, ask the batch plant operator directly. They remember stoppages well because they are the ones who have to restart.',
   type:'opts',
   opts:['0 to 1 — very reliable','2 to 3 — acceptable','4 to 6 — too frequent','More than 6 — serious problem'],
   info:{what:'Unplanned batch plant failures last month — separate from truck breakdowns.',why:'A batch plant stoppage halts all production immediately. Unlike a truck breakdown which reduces capacity by one unit, a batch plant failure takes the entire plant offline.',calc:'Used qualitatively alongside maint_programme and truck_breakdowns. If batch plant breakdowns are 4+ per month: flagged as high-priority finding regardless of maintenance programme. Cross-referenced with batch_calibration — uncalibrated equipment correlates with higher stoppage frequency.'}},

{id:'datacheck',label:'6. Data quality',qs:[
  {id:'typical_month',label:'Was last month a typical production month for this plant?',
   hint:'Atypical months — Ramadan, project completions, seasonal peaks — make all dollar figures misleading if not flagged.',
   howto:'Ask the plant manager: "Was last month a normal month for you, or was it unusually busy or slow?" Then ask what made it different if not typical. Common GCC causes: Ramadan, a large project starting or finishing, summer slowdown, public holiday clusters. If the month was atypical, all monthly figures should be treated as directional only — flag this clearly when presenting.',
   type:'opts',
   opts:['Yes — normal month, representative of typical operations','Partially — one or two unusual weeks but broadly typical','No — unusually high demand','No — unusually low demand','No — Ramadan or public holiday period'],
   info:{what:'Whether last month was representative of normal plant operations.',why:'All dollar figures in this report are extrapolated from last month. A Ramadan month or a project-completion month can be 30–50% above or below normal — making every calculation misleading if not flagged.',calc:'If anything other than "Yes" or "Partially": all monthly dollar figures shown in the report receive an amber flag with the note: "Based on atypical month — verify against a normal month before presenting to plant owner." Does not change calculations — flags them for review.'}},
  {id:'prod_data_source',label:'Where did the production and delivery figures above come from?',
   hint:'This adjusts how much weight the system gives to your scores. System records are much more reliable than estimates.',
   howto:'Reflect on how you obtained the production and delivery figures in the previous sections. Did you read them from a screen? Were they calculated from reports? Or did the plant manager tell you from memory? Choose the option that most accurately describes the primary source for the majority of figures entered.',
   type:'opts',req:true,
   opts:['System records — read from batch computer or dispatch system','Calculated from monthly reports or delivery tickets','Estimated by plant manager or dispatcher','Rough estimates — not based on records'],
   info:{what:'Whether key figures entered are confirmed records or estimates.',why:'Managers typically overestimate peak output and underestimate turnaround by 10–25%.',calc:'Source weight: System = 1.0, Monthly reports = 0.90, Estimated = 0.70, Rough = 0.60.'}},
  {id:'data_freshness',label:'How recent are the figures you just entered?',
   hint:"Figures from today or this week are far more reliable than last month's recollection.",
   howto:'Consider when the figures you entered were generated. If you read last month\'s batch report, those figures are 2–4 weeks old. If you read today\'s dispatch log, those are from today. Choose the option that best reflects the most recently generated figure you used — not your visit date.',
   type:'opts',req:true,
   opts:["Today's operation — figures from this visit","This week — within the last 7 days","This month — within the last 30 days","Older or unsure"],
   info:{what:'How current the data is.',why:'Output and turnaround times fluctuate. Month-old figures may not reflect current conditions.',calc:'Freshness weight: Today = 1.0, This week = 0.95, This month = 0.85, Older = 0.70.'}},
  {id:'data_observed',label:'Did you personally see the key figures, or were they told to you?',
   hint:"There's a big difference between reading a number off a screen and being told 'roughly 38 per day'.",
   howto:'Reflect honestly on how you collected the figures. Did you read numbers off a screen yourself? Did you read printed documents? Or did you ask questions and write down what the plant manager told you? Choose the option that best describes how most of the key figures were collected.',
   type:'opts',req:true,
   opts:['Seen on screen — batch computer, dispatch system, or printout','Seen on paper — delivery tickets, reports, or invoices','Told verbally — by plant manager or dispatcher','Mix of observed and verbal'],
   info:{what:'Whether you directly observed figures or received them verbally.',why:'Verbal estimates are typically 10–30% off. Seeing the number yourself is significantly more reliable.',calc:'Observation weight: Screen = 1.0, Paper = 0.95, Verbal = 0.75, Mixed = 0.85.'}},
  {id:'data_crosscheck',label:'Were any figures cross-checked against a second source?',
   hint:'E.g. turnaround time confirmed by both dispatcher and a delivery ticket.',
   howto:'Consider whether you verified any single figure against two independent sources. For example: did you compare the dispatcher\'s verbal turnaround estimate against the delivery log timestamps? Did you cross-check daily deliveries against both the dispatch count and the invoicing system? Choose the option that best reflects what you actually did.',
   type:'opts',req:true,
   opts:['Yes — two or more independent sources confirmed the same figure','Partially — one or two figures cross-checked','No — single source for all figures','Not possible — no second source available'],
   info:{what:'Whether figures were independently verified.',why:'A single unchecked source can be wrong without anyone knowing.',calc:'Cross-check weight: Full = 1.0, Partial = 0.90, None/Not possible = 0.80.'}},
  {id:'data_confidence_self',label:'Overall — how confident are you in the figures entered today?',
   hint:'Your gut feeling matters. If something felt off, flag it here.',
   howto:'Step back from the individual figures and assess the overall quality of this data collection visit. Were you able to see the key figures on screen? Were the records well-maintained? Did the numbers add up when you cross-checked them? Choose the option that reflects your honest overall assessment.',
   type:'opts',req:true,
   opts:["High — I would present these to the plant owner without hesitation","Medium — reasonable but I'd verify one or two before presenting","Low — significant uncertainty, treat dollar figures as directional only","Very low — data quality was poor, findings are indicative only"],
   info:{what:'Your own assessment of data reliability for this visit.',why:'The analyst on-site judgement is the most important data quality signal. Overrides mechanical weights when Low or Very Low.',calc:'Self-assessment caps: High = no cap. Medium = max 85%. Low = max 65% + amber warning. Very Low = max 50% + red warning on all dollar figures.'}},
  {id:'summer_prod_drop',label:'Compared to peak season, how much lower is production during summer months?',
   hint:'GCC summer (June–September) typically sees 20–35% lower output due to heat, reduced construction activity, and shorter effective hours.',
   howto:'Ask the plant manager to compare last summer\'s monthly average to a normal peak-season month. If they cannot give a specific number, ask: "Is summer roughly 20% less, 30% less, or more?" Most GCC plants see a measurable drop. If the analyst is visiting in summer, this helps adjust scores to approximate peak-season equivalent.',
   type:'opts',
   opts:['Under 10% — minimal seasonal impact','10 to 20% — moderate drop','20 to 35% — significant summer slowdown','Over 35% — severe seasonal reduction','Not sure — no seasonal comparison available'],
   info:{what:'Estimated production volume drop during summer vs. peak season.',why:'Summer assessments tend to understate plant capability. Adjusting for this gives a fairer score that approximates what the plant can do in peak season.',calc:'If season is summer and this answer is provided: production score is boosted by dividing by the drop factor (e.g., 20-35% drop → score ÷ 0.72). This approximates what the plant would score in peak season. A note is added to the report. If season is peak, this question is informational only.'}},

   info:{what:'Whether all key figures are from the same reporting period.',why:'Mixing a high-demand month\'s production with a low-demand month\'s delivery count distorts utilization and financial calculations.',calc:'Reduces overall data confidence score. "Mostly" = 5% penalty. "No" = 15% penalty on all dollar figures + amber warning in report.'}},

const fmt=n=>'$'+Math.round(n).toLocaleString('en-US');

// ── CALC ──────────────────────────────────────────────────────────────────────
function calc(){
  const a=S.answers;
  const price=+a.price_m3||0,cement=+a.cement_cost||0,agg=+a.aggregate_cost||0,admix=+a.admix_cost||0;
  // Margin warning: if aggregate and admixture not entered, margin is overstated
  const marginIncomplete=price>0&&cement>0&&(+a.aggregate_cost===0||a.aggregate_cost===undefined||a.aggregate_cost==='')&&(+a.admix_cost===0||a.admix_cost===undefined||a.admix_cost==='');
  // Use cement-only margin as floor; warn user if aggregates not entered
  const contrib=Math.max(0,price-cement-agg-admix);
  const marginRatio=price>0?contrib/price:0.35;
  // Mix-weighted margin: adjust contrib using high-strength price premium + mix_split fraction
  const hsPremium=+a.high_strength_price||0;
  const hsFraction={'Mostly high strength — over 70% is C35 and above':0.75,'Balanced mix — roughly equal split across strength classes':0.45,'Mostly standard strength — over 70% is C20 to C30':0.15,'Not sure — no visibility on production mix by strength class':0}[a.mix_split]||0;
  const mixWeightedContrib=hsPremium>0&&hsFraction>0?contrib+hsPremium*hsFraction:contrib;
  const mixMarginLift=Math.round((mixWeightedContrib-contrib)*100)/100;

  const cap=+a.plant_cap||0,opH=+a.op_hours||10,opD=+a.op_days||300;
  // actual_prod is total monthly m³ — convert to average hourly rate using actual working days
  const monthlyM3=+a.actual_prod||0;
  const workingDaysMonth=+a.working_days_month||Math.round(opD/12); // use actual days if available, else annual average
  const hoursPerMonth=opH*workingDaysMonth;
  const actualAvgRate=hoursPerMonth>0?monthlyM3/hoursPerMonth:0; // m³/hr average
  const actual=actualAvgRate; // keep variable name for compatibility
  const util=cap>0?actual/cap:0;
  const unusedCapAnnual=Math.max(0,(cap-actual)*opH*opD);
  const capLeakMonthly=Math.round(unusedCapAnnual*contrib/12);
  const trucks=+a.n_trucks||0,ta=+a.turnaround||0,mixCap=+a.mixer_capacity||7;
  const delDay=+a.deliveries_day||0;
  const radius=+a.delivery_radius||0;
  const TARGET_TA=radius>0?Math.min(110,Math.max(65,Math.round(60+radius*1.5))):80;
  const FLEET_UTIL_TARGET=0.85; // GCC best practice fleet utilisation

  // Truck availability rate
  const truckAvail=+a.truck_availability||0;
  const availRate=(truckAvail>0&&trucks>0)?Math.min(1,truckAvail/trucks):1;
  const operativeTrucks=truckAvail>0?truckAvail:trucks;

  // Qualified drivers — real capacity ceiling (must be defined before realisticMaxDel)
  const qualifiedDrivers=+a.qualified_drivers||0;
  const effectiveUnits=qualifiedDrivers>0?Math.min(operativeTrucks,qualifiedDrivers):operativeTrucks;
  const driverConstrained=qualifiedDrivers>0&&qualifiedDrivers<operativeTrucks*0.85;

  const maxDelDay=effectiveUnits>0&&ta>0?Math.floor(effectiveUnits*(opH*60/ta)):0;
  // Realistic target: best-practice turnaround at 85% utilisation — capped by MIN(operativeTrucks, qualifiedDrivers)
  const realisticMaxDel=effectiveUnits>0?Math.floor(effectiveUnits*(opH*60/TARGET_TA)*FLEET_UTIL_TARGET):0;
  // Sanity check: if gap > operative trucks×3, flag as low confidence but keep the number
  const rawHidden=Math.max(0,realisticMaxDel-delDay);
  const hiddenSuspect=operativeTrucks>0&&rawHidden>operativeTrucks*3;
  const hiddenDel=rawHidden;
  const hiddenConfidence=hiddenSuspect?'low':'high';
  const hiddenRevMonthly=Math.round(hiddenDel*mixCap*contrib*(opD/12));
  const excessMin=Math.max(0,ta-TARGET_TA);
  // Turnaround leak: based on realistic deliveries at target TA, not theoretical max
  const turnaroundLeakMonthly=ta>0&&effectiveUnits>0?Math.round(excessMin/ta*realisticMaxDel*mixCap*contrib*(opD/12)):0;

  // Fuel cost
  const fuelPerDel=+a.fuel_per_delivery||0;
  const fuelPerM3=fuelPerDel>0&&mixCap>0?fuelPerDel/mixCap:0;
  const fuelMonthly=fuelPerDel>0&&delDay>0?Math.round(fuelPerDel*delDay*(opD/12)):0;
  const fuelMarginImpact=fuelPerM3>0&&contrib>0?fuelPerM3/contrib:0;

  // Typical month flag
  const atypicalMonth=a.typical_month&&a.typical_month!=='Yes — normal month, representative of typical operations'&&a.typical_month!=='Partially — one or two unusual weeks but broadly typical';

  // Fuel-adjusted contribution margin
  // Water cost
  const waterCost=+a.water_cost||0;

  // Fuel+water adjusted contribution margin
  const contribFuelAdj=Math.max(0,contrib-(fuelPerM3>0?fuelPerM3:0)-waterCost);

  // Batch calibration cost exposure
  const calibrationExposure=(
    (a.batch_calibration==='More than 2 years ago'||a.batch_calibration==='Never calibrated — original factory settings only')&&
