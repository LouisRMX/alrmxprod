<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Al-Cem — Plant Intelligence</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap');
:root{
  --green:#0F6E56;--green-mid:#1D9E75;--green-light:#E1F5EE;--green-pale:#F0FAF6;
  --red:#C0392B;--red-light:#FDEDEC;--amber:#D68910;--amber-light:#FEF9E7;
  --gray-900:#1a1a1a;--gray-700:#3d3d3d;--gray-500:#6b6b6b;
  --gray-300:#c8c8c8;--gray-100:#f4f4f4;--gray-50:#fafafa;--white:#fff;
  --border:rgba(0,0,0,0.08);--font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  --radius:10px;--radius-lg:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--gray-50);color:var(--gray-900);min-height:100vh;overflow-x:hidden}
.app-shell{display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--green);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:52px;flex-shrink:0}
.topbar-logo{color:#fff;font-size:15px;font-weight:500;display:flex;align-items:center;gap:10px}
.topbar-dot{width:8px;height:8px;border-radius:50%;background:#5DCAA5}
.topbar-meta{font-size:11px;color:rgba(255,255,255,.5);font-family:var(--mono)}
.mode-tabs{background:var(--white);border-bottom:1px solid var(--border);display:flex;padding:0 24px}
.mode-tab{padding:13px 20px;font-size:13px;color:var(--gray-500);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;white-space:nowrap}
.mode-tab.active{color:var(--green);border-bottom-color:var(--green);font-weight:500}
.view{display:none;flex:1}.view.active{display:flex;flex-direction:column}
.diag-layout{display:flex;flex:1;overflow:hidden}
.sidebar{width:200px;flex-shrink:0;background:var(--white);border-right:1px solid var(--border);padding:12px 0;overflow-y:auto}
.si{padding:8px 16px;font-size:13px;color:var(--gray-500);cursor:pointer;display:flex;align-items:center;gap:8px;border-left:2px solid transparent;transition:all .12s}
.si:hover{background:var(--gray-50)}.si.active{background:var(--green-pale);color:var(--green);border-left-color:var(--green);font-weight:500}.si.done{color:var(--green-mid)}
.si-check{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--gray-300);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px}
.si.done .si-check{background:var(--green-mid);border-color:var(--green-mid);color:#fff}
.diag-main{flex:1;overflow-y:auto;padding:24px}
/* MOBILE */
@media(max-width:640px){
  /* ── Layout ── */
  .sidebar{position:fixed;left:-220px;top:52px;bottom:0;z-index:200;width:220px;transition:left .22s;box-shadow:2px 0 12px rgba(0,0,0,.1)}
  .sidebar.open{left:0}
  .sb-overlay{display:none;position:fixed;inset:0;top:52px;background:rgba(0,0,0,.3);z-index:199}
  .sb-overlay.show{display:block}
  .hamburger{display:flex!important}
  .diag-main{padding:12px;max-width:100%}
  .mode-tab{padding:11px 12px;font-size:12px}
  .setup-card{padding:20px 16px}
  .f-row{grid-template-columns:1fr}
  .result-wrap{padding:12px;padding-bottom:80px}

  /* ── Inputs — full width, larger touch targets ── */
  .q-inp{width:100%;font-size:16px!important} /* 16px prevents iOS zoom */
  .opt{padding:10px 14px;font-size:13px;min-height:44px;display:flex;align-items:center} /* 44px min touch target */
  .obs-area{font-size:16px!important}
  .f-inp{font-size:16px!important}

  /* ── Report: meta bar ── */
  .result-meta{flex-direction:column!important;align-items:flex-start!important;gap:4px!important;font-size:11px!important}

  /* ── Chips: wrap and shrink ── */
  .chip-row{flex-wrap:wrap!important;gap:6px!important}
  .chip-top{font-size:14px!important}

  /* ── Info panels: fixed to bottom of screen, never overflow ── */
  .info-panel{position:fixed!important;left:12px!important;right:12px!important;top:auto!important;bottom:0!important;z-index:400!important;max-width:calc(100vw - 24px)!important;max-height:60vh!important;overflow-y:auto!important;box-shadow:0 -4px 24px rgba(0,0,0,.2)!important;border-radius:12px 12px 0 0!important;padding:16px!important;margin:0!important}

  /* ── Score rows ── */
  .score-meta-row{flex-direction:column!important;align-items:flex-start!important;gap:4px!important}

  /* ── Buttons: full width ── */
  .next-steps-btn{width:100%!important;justify-content:center!important}
  .start-btn{font-size:15px;padding:14px}

  /* ── Cost of inaction ── */
  .coi-number{font-size:32px!important}

  /* ── Portfolio ── */
  .kpi-grid{grid-template-columns:1fr 1fr}
  .hidden-grid{grid-template-columns:1fr 1fr}
  .pc-metrics{grid-template-columns:1fr 1fr!important}
  .dash-wrap{padding:12px}

  /* ── Delta cards: stack KPI boxes vertically ── */
  .delta-kpi-row{flex-direction:column!important;gap:8px!important}

  /* ── Next steps card buttons: stack ── */
  .next-steps-btns{flex-direction:column!important}

  /* ── Sticky topbar in report: smaller ── */
  #diag-result>div:first-child{padding:6px 12px!important}
  #diag-result>div:first-child button{padding:5px 12px!important;font-size:11px!important}

  /* ── Fold-out toggles: easier to tap ── */
  #n2-toggle-btn,#n3-toggle-btn{padding:13px 16px!important;font-size:13px!important}

  /* ── N3 panel: flex column already, gap adjust ── */
  #n3-panel{gap:6px!important}

  /* ── Action checklist items: easier tap ── */
  [id^="cl-act"]{padding:14px!important}
}

/* Extra small — very narrow phones */
@media(max-width:375px){
  .mode-tab{padding:10px 8px;font-size:11px}
  .result-wrap{padding:10px;padding-bottom:80px}
  .diag-main{padding:10px}
}
.hamburger{display:none;background:none;border:none;cursor:pointer;padding:0 10px;flex-direction:column;gap:4px;align-items:center;justify-content:center}
.hamburger span{display:block;width:18px;height:2px;background:#fff;border-radius:1px}
.prog-bar{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:12px 18px;margin-bottom:20px;display:flex;align-items:center;gap:16px}
.prog-track{flex:1;height:4px;background:var(--gray-100);border-radius:2px}
.prog-fill{height:4px;background:var(--green-mid);border-radius:2px;transition:width .4s}
.prog-lbl{font-size:12px;color:var(--gray-500);font-family:var(--mono);white-space:nowrap}
.q-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;transition:border-color .15s}
.q-card:focus-within{border-color:var(--green-mid)}
.q-card.is-answered{border-left-width:3px;border-left-color:var(--green-mid)}
.q-head{padding:12px 16px;display:flex;gap:10px;align-items:flex-start;border-bottom:1px solid var(--gray-50)}
.q-idx{font-size:10px;font-family:var(--mono);color:var(--gray-300);margin-top:2px;min-width:24px}
.q-label{font-size:13px;font-weight:500;flex:1;line-height:1.4}
.q-req{color:var(--red);margin-left:2px}
.q-hint{font-size:11px;color:var(--gray-500);margin-top:3px;line-height:1.45;font-weight:400}
.q-field{font-size:11px;color:#7a5c00;margin-top:4px;line-height:1.4;padding:5px 8px;background:#fffbf0;border-radius:5px;border-left:2px solid var(--amber)}
.q-body{padding:10px 16px 12px}
.q-inp{padding:8px 11px;border:1px solid var(--gray-300);border-radius:8px;font-size:15px;font-weight:500;font-family:var(--font);background:var(--gray-50);color:var(--gray-900);width:160px;transition:border-color .15s}
.q-inp:focus{outline:none;border-color:var(--green-mid);background:var(--white)}
.q-unit{font-size:11px;color:var(--gray-500);margin-top:4px}
.opts{display:flex;flex-wrap:wrap;gap:7px}
.opt{padding:6px 14px;border:1px solid var(--gray-300);border-radius:20px;font-size:12px;cursor:pointer;background:var(--white);color:var(--gray-700);font-family:var(--font);transition:all .12s}
.opt:hover{border-color:var(--green-mid);color:var(--green)}
.opt.sel{background:var(--green-light);border-color:var(--green-mid);color:var(--green);font-weight:500}
.obs-area{width:100%;padding:9px 11px;border:1px solid var(--gray-300);border-radius:8px;font-size:13px;font-family:var(--font);color:var(--gray-900);background:var(--gray-50);min-height:60px;resize:none;line-height:1.5}
.obs-area:focus{outline:none;border-color:var(--green-mid);background:var(--white)}
.live-box{background:var(--green-light);border:1px solid #9FE1CB;border-radius:8px;padding:8px 12px;margin-top:8px;display:none}
.live-lbl{font-size:10px;color:var(--green);font-weight:500;text-transform:uppercase;letter-spacing:.4px}
.live-val{font-size:13px;font-weight:500;color:var(--green);margin-top:2px;line-height:1.5}
.score-live{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:16px}
.score-lbl{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.5px;color:var(--gray-300);margin-bottom:10px}
.score-row{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.score-name{font-size:12px;color:var(--gray-500);width:80px;flex-shrink:0}
.score-track{flex:1;height:8px;background:var(--gray-100);border-radius:4px;overflow:hidden}
.score-bar{height:8px;border-radius:4px;transition:width .5s,background .4s}
.score-val{font-size:12px;font-weight:500;font-family:var(--mono);width:38px;text-align:right}
.bn-tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;background:var(--red-light);color:var(--red);margin-top:6px}
.nav-row{display:flex;gap:10px;margin-top:6px;padding-bottom:40px}
.btn-back{padding:10px 18px;border:1px solid var(--gray-300);border-radius:8px;font-size:13px;cursor:pointer;background:var(--white);color:var(--gray-500);font-family:var(--font)}
.btn-next{flex:1;padding:11px;background:var(--green);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font)}
.btn-next:hover{background:var(--green-mid)}
.setup-wrap{flex:1;display:flex;align-items:flex-start;justify-content:center;padding:40px 24px}
.setup-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px;width:100%;max-width:460px}
.setup-title{font-size:18px;font-weight:500;margin-bottom:4px}
.setup-sub{font-size:13px;color:var(--gray-500);line-height:1.5;margin-bottom:22px}
.f-wrap{margin-bottom:14px}
.f-label{font-size:11px;font-weight:500;color:var(--gray-500);margin-bottom:5px;display:block}
.f-inp{width:100%;padding:9px 12px;border:1px solid var(--gray-300);border-radius:8px;font-size:13px;font-family:var(--font);color:var(--gray-900);background:var(--gray-50)}
.f-inp:focus{outline:none;border-color:var(--green-mid);background:var(--white)}
.f-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.start-btn{width:100%;padding:12px;background:var(--green);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;font-family:var(--font)}
.result-wrap{padding:24px;padding-bottom:60px}
.result-meta{font-size:11px;color:var(--gray-500);font-family:var(--mono);margin-bottom:16px}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.kpi-box{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.kpi-box.red{background:var(--red-light);border-color:#f5c6c2}
.kpi-box.green{background:var(--green-light);border-color:#9FE1CB}
.kpi-box.amber{background:var(--amber-light);border-color:#f9e4a0}
.kpi-lbl{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.5px;color:var(--gray-500);margin-bottom:4px}
.kpi-box.red .kpi-lbl{color:var(--red)}.kpi-box.green .kpi-lbl{color:var(--green)}.kpi-box.amber .kpi-lbl{color:var(--amber)}
.kpi-num{font-size:26px;font-weight:500;line-height:1;font-family:var(--mono)}
.kpi-box.red .kpi-num{color:var(--red)}.kpi-box.green .kpi-num{color:var(--green)}.kpi-box.amber .kpi-num{color:var(--amber)}
.kpi-sub{font-size:11px;color:var(--gray-500);margin-top:3px}
.scorecard{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:12px}
.sc-title{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.5px;color:var(--gray-300);margin-bottom:10px}
/* AI REPORT */
.ai-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:12px}
.ai-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.ai-head-left{display:flex;align-items:center;gap:10px}
.ai-head-title{font-size:13px;font-weight:500}
.ai-badge{font-size:10px;font-weight:500;padding:2px 8px;border-radius:20px}
.ai-badge.generated{background:var(--green-light);color:var(--green)}
.ai-badge.edited{background:var(--amber-light);color:var(--amber)}
.ai-head-btns{display:flex;gap:8px}
.ai-btn{padding:5px 12px;border:1px solid var(--gray-300);border-radius:6px;font-size:11px;cursor:pointer;background:var(--white);color:var(--gray-500);font-family:var(--font);transition:background .12s}
.ai-btn:hover{background:var(--gray-50)}
.ai-btn.primary{background:var(--green);color:#fff;border-color:var(--green)}
.ai-btn.primary:hover{background:var(--green-mid)}
.ai-tabs{display:flex;border-bottom:1px solid var(--border);padding:0 16px;gap:0}
.ai-tab{padding:8px 14px;font-size:12px;border:none;background:none;cursor:pointer;color:var(--gray-500);border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;font-family:var(--font)}
.ai-tab.active{color:var(--green);border-bottom-color:var(--green);font-weight:500}
.ai-body{padding:16px}
.ai-section{display:none}.ai-section.active{display:block}
.ai-text{font-size:13.5px;line-height:1.9;color:var(--gray-700)}
.ai-text strong,.ai-text b{color:var(--gray-900);font-weight:600}
.ai-sec-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--green);margin:14px 0 4px}
.ai-textarea{width:100%;padding:12px;border:1px solid var(--green-mid);border-radius:8px;font-size:13px;font-family:var(--font);color:var(--gray-900);background:var(--white);line-height:1.75;resize:vertical;min-height:160px}
.ai-textarea:focus{outline:none}
.ai-loading{padding:20px 0;display:flex;align-items:center;gap:10px;font-size:13px;color:var(--gray-500)}
.ai-dot{width:6px;height:6px;border-radius:50%;background:var(--green-mid);animation:pulse 1.2s ease-in-out infinite}
.ai-dot:nth-child(2){animation-delay:.2s}.ai-dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,80%,100%{opacity:.2}40%{opacity:1}}
.ai-hint{font-size:11px;color:var(--gray-500);margin-top:8px;font-style:italic}
/* AI COPILOT */
.copilot-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:12px}
.copilot-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px}
.copilot-head-left{display:flex;align-items:center;gap:10px}
.copilot-title{font-size:13px;font-weight:500}
.copilot-badge{font-size:10px;font-weight:500;padding:2px 8px;border-radius:20px;background:var(--green-light);color:var(--green)}
.copilot-toggle{padding:4px 10px;border:1px solid var(--gray-300);border-radius:6px;font-size:11px;cursor:pointer;background:var(--white);color:var(--gray-500);font-family:var(--font);transition:all .12s}
.copilot-toggle:hover{background:var(--gray-50)}
.copilot-body{display:none;flex-direction:column}
.copilot-body.open{display:flex}
.copilot-msgs{padding:12px 16px;display:flex;flex-direction:column;gap:10px;min-height:60px;max-height:380px;overflow-y:auto}
.copilot-msg{display:flex;gap:8px;align-items:flex-start}
.copilot-msg.user{flex-direction:row-reverse}
.copilot-bubble{padding:9px 13px;border-radius:10px;font-size:13px;line-height:1.6;max-width:88%}
.copilot-msg.assistant .copilot-bubble{background:var(--gray-50);border:1px solid var(--border);color:var(--gray-900)}
.copilot-msg.user .copilot-bubble{background:var(--green);color:#fff}
.copilot-streaming .copilot-bubble::after{content:'▋';animation:blink .7s step-end infinite}
@keyframes blink{50%{opacity:0}}
.copilot-avatar{width:24px;height:24px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;margin-top:2px}
.copilot-msg.assistant .copilot-avatar{background:var(--green-light);color:var(--green)}
.copilot-msg.user .copilot-avatar{background:var(--green);color:#fff}
.copilot-suggestions{padding:0 16px 10px;display:flex;flex-wrap:wrap;gap:6px}
.copilot-sug{padding:6px 12px;border:1px solid var(--border);border-radius:20px;font-size:11px;cursor:pointer;background:var(--white);color:var(--gray-700);font-family:var(--font);transition:all .12s;text-align:left}
.copilot-sug:hover{border-color:var(--green-mid);color:var(--green);background:var(--green-pale)}
.copilot-input-row{padding:10px 12px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:flex-end}
.copilot-inp{flex:1;padding:8px 11px;border:1px solid var(--gray-300);border-radius:8px;font-size:13px;font-family:var(--font);color:var(--gray-900);background:var(--gray-50);resize:none;min-height:38px;max-height:120px;line-height:1.5;overflow-y:auto}
.copilot-inp:focus{outline:none;border-color:var(--green-mid);background:var(--white)}
.copilot-send{padding:8px 14px;background:var(--green);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font);flex-shrink:0;transition:background .12s;height:38px}
.copilot-send:hover{background:var(--green-mid)}
.copilot-send:disabled{opacity:.4;cursor:default}
/* ISSUES */
.issues-box{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:12px}
.issues-header{padding:10px 16px;border-bottom:1px solid var(--border);font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.5px;color:var(--gray-300)}
.issue-row{padding:12px 16px;border-bottom:1px solid var(--gray-50);display:flex;gap:10px;align-items:flex-start}
.issue-row:last-child{border-bottom:none}
.issue-n{width:20px;height:20px;border-radius:50%;font-size:10px;font-weight:500;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.n-red{background:var(--red-light);color:var(--red)}.n-amb{background:var(--amber-light);color:var(--amber)}
.issue-t{font-size:13px;font-weight:500;margin-bottom:2px}
.issue-r{font-size:11px;color:var(--gray-500);line-height:1.45}
.issue-usd{font-size:15px;font-weight:600;color:var(--red);white-space:nowrap;margin-left:auto;font-family:var(--mono);align-self:flex-start;padding-top:1px}
.quote-box{background:var(--gray-50);border-left:4px solid var(--green-mid);border-radius:0 var(--radius) var(--radius) 0;padding:14px 18px;margin-bottom:12px}
.quote-lbl{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.5px;color:var(--gray-300);margin-bottom:5px}
.quote-text{font-size:14px;font-style:italic;color:var(--gray-700);line-height:1.65}
.hidden-box{background:var(--amber-light);border:1px solid #f9e4a0;border-radius:var(--radius);padding:14px 16px;margin-bottom:12px}
.hidden-title{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.5px;color:var(--amber);margin-bottom:10px}
.hidden-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.hidden-item{background:rgba(255,255,255,.7);border-radius:8px;padding:8px 10px}
.hidden-num{font-size:17px;font-weight:500;color:var(--amber);font-family:var(--mono)}
.hidden-lbl{font-size:10px;color:#6b5000;margin-top:1px}
.export-btn{width:100%;padding:13px;background:var(--green);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;font-family:var(--font);margin-top:4px}
.new-btn{width:100%;padding:11px;background:var(--white);color:var(--gray-700);border:1px solid var(--gray-300);border-radius:8px;font-size:13px;cursor:pointer;font-family:var(--font);margin-top:8px}
#back-to-top{position:fixed;bottom:24px;right:16px;background:var(--green);color:#fff;border:none;border-radius:50%;width:40px;height:40px;font-size:18px;cursor:pointer;display:none;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.18);z-index:100;line-height:1}
#back-to-top.visible{display:flex}
/* DASHBOARD */
.dash-wrap{flex:1;overflow-y:auto;padding:24px}
.dash-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;gap:12px}
.dash-title{font-size:20px;font-weight:500}.dash-sub{font-size:12px;color:var(--gray-500);margin-top:2px}
.add-btn{padding:8px 16px;background:var(--green);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font);white-space:nowrap}
.sum-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:20px}
.sum-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.sum-label{font-size:11px;color:var(--gray-500);margin-bottom:6px}
.sum-val{font-size:22px;font-weight:500;line-height:1}
.sum-sub{font-size:11px;color:var(--gray-500);margin-top:4px}
.plant-grid{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.plant-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;cursor:pointer;transition:border-color .15s}
.plant-card:hover,.plant-card.expanded{border-color:var(--green-mid)}
.pc-top{display:flex;align-items:center;gap:12px}
.pc-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.dot-r{background:var(--red)}.dot-a{background:var(--amber)}.dot-g{background:#27ae60}
.pc-name{font-size:14px;font-weight:500;flex:1}.pc-country{font-size:11px;color:var(--gray-500)}
.pc-score{font-family:var(--mono);font-size:14px;font-weight:600}
.pc-loss{font-family:var(--mono);font-size:15px;font-weight:600;color:var(--red)}
.pc-metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:14px;padding-top:14px;border-top:1px solid var(--gray-50)}
.pcm-lbl{font-size:10px;color:var(--gray-500);margin-bottom:2px}
.pcm-val{font-size:13px;font-weight:500;font-family:var(--mono)}
.pc-detail{margin-top:12px;padding:10px 12px;background:var(--gray-50);border-radius:8px;display:none}
.pci-item{font-size:12px;color:var(--gray-700);padding:3px 0;display:flex;gap:8px}
.bar-section{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:10px}
.bar-sec-title{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.5px;color:var(--gray-300);margin-bottom:12px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:12px}
.bar-name{width:120px;color:var(--gray-500);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0}
.bar-track{flex:1;height:8px;background:var(--gray-100);border-radius:4px;position:relative}
.bar-fill{height:8px;border-radius:4px}
.bar-target{position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--green-mid);border-radius:1px}
.bar-val{font-family:var(--mono);font-size:12px;font-weight:500;min-width:44px;text-align:right}
.empty-state{text-align:center;padding:60px 20px;color:var(--gray-500)}
.empty-title{font-size:15px;font-weight:500;color:var(--gray-700);margin-bottom:6px}
.empty-sub{font-size:13px;line-height:1.5}
/* INFO BUTTON */
.info-btn{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--gray-300);background:none;cursor:pointer;font-size:10px;font-weight:500;color:var(--gray-400);display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;margin-left:6px;vertical-align:middle;transition:all .12s;font-family:var(--mono);line-height:1}
.info-btn:hover{border-color:var(--green-mid);color:var(--green);background:var(--green-light)}
.info-panel{display:none;background:#F8FFFE;border:1px solid #9FE1CB;border-radius:8px;padding:10px 12px;margin-top:8px;font-size:12px;color:var(--gray-700);line-height:1.6}
.info-panel.open{display:block}
.info-panel b{font-weight:500;color:var(--gray-900)}
.info-section{margin-bottom:5px}
/* KPI FLOATING TOOLTIP */
#kpi-tooltip{
  position:fixed;z-index:9999;width:264px;
  background:#fff;border:1px solid rgba(0,0,0,0.10);border-radius:12px;
  box-shadow:0 8px 32px rgba(0,0,0,0.14),0 2px 8px rgba(0,0,0,0.07);
  padding:14px 16px;font-family:var(--font);font-size:12px;
  color:var(--gray-700);line-height:1.55;
  display:none;
  max-height:calc(100vh - 24px);
  overflow-y:auto;
}
#kpi-tooltip.kpi-tt-visible{display:block;}
#kpi-tooltip-arrow{
  position:absolute;left:50%;width:10px;height:10px;background:#fff;
  border-left:1px solid rgba(0,0,0,0.10);border-top:1px solid rgba(0,0,0,0.10);
}
#kpi-tooltip-arrow.arr-up{top:-6px;transform:translateX(-50%) rotate(45deg);}
#kpi-tooltip-arrow.arr-down{bottom:-6px;transform:translateX(-50%) rotate(225deg);}
.kpi-tt-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.kpi-tt-name{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--green);}
.kpi-tt-score{font-size:11px;font-weight:700;font-family:var(--mono);padding:2px 7px;border-radius:20px;}
.kpi-tt-close{width:20px;height:20px;border-radius:50%;background:var(--gray-100);border:none;cursor:pointer;font-size:11px;color:var(--gray-500);display:flex;align-items:center;justify-content:center;transition:background .12s;flex-shrink:0;}
.kpi-tt-close:hover{background:var(--gray-300);}
.kpi-tt-divider{height:1px;background:var(--gray-100);margin:0 0 10px;}
.kpi-tt-row{margin-bottom:8px;}
.kpi-tt-row:last-child{margin-bottom:0;}
.kpi-tt-key{font-size:10px;font-weight:600;color:var(--gray-900);margin-bottom:2px;display:flex;align-items:center;gap:5px;}
.kpi-tt-key::before{content:'';width:3px;height:3px;border-radius:50%;background:var(--green-mid);flex-shrink:0;}
.kpi-tt-val{font-size:11.5px;color:#555;line-height:1.5;padding-left:8px;}
.info-section:last-child{margin-bottom:0}
.info-section-label{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.4px;color:var(--green);margin-bottom:2px}
/* ── FIELD TRANSLATOR ── */
.ft-bar{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.ft-bar-label{font-size:11px;font-weight:500;color:var(--gray-500);text-transform:uppercase;letter-spacing:.4px;white-space:nowrap;flex-shrink:0}
.ft-pills{display:flex;gap:5px;flex-wrap:wrap;flex:1}
.ft-pill{padding:4px 11px;border:1px solid var(--gray-300);border-radius:20px;font-size:11px;cursor:pointer;background:var(--white);color:var(--gray-700);font-family:var(--font);transition:all .12s;display:flex;align-items:center;gap:4px}
.ft-pill:hover{border-color:var(--green-mid);color:var(--green)}
.ft-pill.active{background:var(--green-light);border-color:var(--green-mid);color:var(--green);font-weight:500}
.ft-pill-flag{font-size:13px}
.ft-btn{display:flex;align-items:center;gap:6px;padding:5px 12px;background:none;border:1px solid var(--gray-300);border-radius:6px;font-size:11px;font-weight:500;color:var(--green);cursor:pointer;font-family:var(--font);transition:all .12s;margin-top:6px;white-space:nowrap}
.ft-btn:hover{background:var(--green-pale);border-color:var(--green-mid)}
.ft-btn:disabled{opacity:.4;cursor:default}
.ft-panel{background:var(--green-pale);border:1px solid #b8e8d4;border-radius:8px;padding:11px 14px;margin-top:6px;display:none}
.ft-panel.open{display:block}
.ft-lang-tag{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--green);margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
.ft-text{font-size:14px;font-weight:500;color:var(--gray-900);line-height:1.55;margin-bottom:10px}
.ft-text.rtl{direction:rtl;text-align:right;font-size:15px}
.ft-actions{display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.ft-speak-btn{display:flex;align-items:center;gap:5px;padding:5px 13px;background:var(--green);color:#fff;border:none;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;font-family:var(--font);transition:background .12s}
.ft-speak-btn:hover{background:var(--green-mid)}
.ft-speak-btn.speaking{background:var(--red);animation:ft-pulse 1s infinite}
@keyframes ft-pulse{0%,100%{opacity:1}50%{opacity:.7}}
.ft-rec-btn{display:flex;align-items:center;gap:5px;padding:5px 13px;background:var(--white);border:1.5px solid var(--gray-300);border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;font-family:var(--font);color:var(--gray-700);transition:all .12s}
.ft-rec-btn:hover{border-color:var(--green-mid);color:var(--green)}
.ft-rec-btn.recording{background:var(--red-light);border-color:var(--red);color:var(--red);animation:ft-pulse 1.2s infinite}
.ft-answer-box{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-top:8px}
.ft-orig{font-size:11px;color:var(--gray-500);margin-bottom:5px;font-style:italic}
.ft-orig.rtl{direction:rtl;text-align:right}
.ft-trans{font-size:12px;color:var(--gray-700);margin-bottom:8px}
.ft-suggestion{padding:7px 10px;background:var(--green-light);border-radius:6px;border-left:3px solid var(--green-mid);margin-bottom:8px}
.ft-sug-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--green);margin-bottom:3px}
.ft-sug-text{font-size:12px;color:var(--gray-700);font-weight:500}
.ft-sug-why{font-size:11px;color:var(--gray-500);margin-top:2px}
.ft-accept-row{display:flex;gap:7px}
.ft-accept{flex:1;padding:7px;background:var(--green);color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;font-family:var(--font)}
.ft-retry{padding:7px 12px;background:var(--white);border:1px solid var(--gray-300);border-radius:6px;font-size:11px;cursor:pointer;font-family:var(--font);color:var(--gray-500)}
.ft-spinner{width:11px;height:11px;border:1.5px solid var(--gray-300);border-top-color:var(--green-mid);border-radius:50%;animation:ft-spin .6s linear infinite;display:inline-block}
@keyframes ft-spin{to{transform:rotate(360deg)}}
/* PRINT — professional PDF layout */
@media print{
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  .topbar,.mode-tabs,.sidebar,.nav-row,.btn-back,.btn-next,.ai-head-btns,.ai-tabs,
  .add-btn,.export-btn,.new-btn,.info-btn,.info-panel,.prog-bar,
  #view-analyst-btn,#view-owner-btn,.result-switcher{display:none!important}
  .diag-layout,.view{display:block!important}
  .diag-main{max-width:100%;padding:0}
  body{background:#fff;font-family:'DM Sans',sans-serif}
  .app-shell{display:block}
  .result-wrap{padding:0;max-width:100%}
  #result-analyst{display:none!important}
  #result-owner{display:block!important}
  /* Cover-style header */
  .print-cover{display:flex!important}
  .kpi-grid{grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
  .kpi-box{padding:10px 14px}
  .kpi-num{font-size:22px}
  .ai-card{break-inside:avoid;border:1px solid #e0e0e0}
  .ai-section{display:block!important}
  .ai-tabs{display:none!important}
  .issues-box,.scorecard,.hidden-box{break-inside:avoid}
  /* Show all formula details in print */
  [id^="kc-"]{display:block!important}
  .info-panel{display:block!important}
  .kpi-box.red{background:#FDEDEC!important}
  .kpi-box.amber{background:#FEF9E7!important}
  .kpi-box.green{background:#E1F5EE!important}
  .kpi-box.amber .kpi-num{color:#D68910!important}
  .score-bar{-webkit-print-color-adjust:exact!important}
  .issue-row{break-inside:avoid}
  /* Page numbers */
  @page{margin:15mm 15mm 20mm;size:A4}
  .result-meta{font-size:10px;color:#888;margin-bottom:8px}
}

/* ── GUIDED MODE ──────────────────────────────────────────────────────────── */
.gm-phase-bar{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px}
.gm-phase-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.gm-phase-dot.active{background:var(--green);color:#fff}
.gm-phase-dot.done{background:var(--green-light);color:var(--green)}
.gm-phase-dot.pending{background:var(--gray-100);color:var(--gray-400)}
.gm-phase-label{font-size:12px;font-weight:500;color:var(--gray-700)}
.gm-phase-sub{font-size:11px;color:var(--gray-500)}
.gm-phase-sep{flex:1;height:1px;background:var(--border)}
.gm-q-counter{font-size:11px;font-weight:600;font-family:var(--mono);color:var(--green);background:var(--green-light);padding:3px 10px;border-radius:20px;margin-bottom:14px;display:inline-block}
.gm-trigger-group{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden}
.gm-trigger-head{padding:14px 16px;display:flex;align-items:center;gap:10px;cursor:pointer}
.gm-trigger-icon{font-size:16px}
.gm-trigger-title{font-size:13px;font-weight:500;color:var(--gray-900);flex:1}
.gm-trigger-count{font-size:11px;color:var(--gray-500);font-family:var(--mono)}
.gm-trigger-why{font-size:11px;color:var(--red);font-weight:500;padding:0 16px 10px 42px}
.gm-trigger-qs{padding:0 16px 12px;display:none}
.gm-trigger-qs.open{display:block}
.gm-skip-btn{font-size:11px;color:var(--gray-400);background:none;border:none;cursor:pointer;font-family:var(--font);padding:8px 0;width:100%;text-align:center;border-top:1px solid var(--gray-50);margin-top:8px}
.gm-skip-btn:hover{color:var(--gray-600)}
.gm-transition{background:var(--green-pale);border:1px solid #9FE1CB;border-radius:var(--radius);padding:20px 22px;margin-bottom:16px}
.gm-transition-title{font-size:16px;font-weight:500;color:var(--gray-900);margin-bottom:6px}
.gm-transition-sub{font-size:13px;color:var(--gray-600);margin-bottom:16px;line-height:1.5}
.gm-btn-primary{padding:11px 22px;background:var(--green);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font)}
.gm-btn-secondary{padding:9px 18px;background:var(--white);color:var(--gray-600);border:1px solid var(--gray-300);border-radius:8px;font-size:12px;cursor:pointer;font-family:var(--font);margin-left:8px}
.gm-view-all{display:block;text-align:center;font-size:11px;color:var(--gray-400);padding:16px 0 4px;text-decoration:none;cursor:pointer;background:none;border:none;font-family:var(--font);width:100%}
.gm-view-all:hover{color:var(--green)}
.gm-live-preview{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:12px}
.gm-live-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--gray-400);margin-bottom:12px}
.gm-live-finding{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--gray-50)}
.gm-live-finding:last-child{border-bottom:none}
.gm-live-sev{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.gm-live-sev.red{background:var(--red)}
.gm-live-sev.amber{background:var(--amber)}
.gm-live-text{font-size:12px;color:var(--gray-700);flex:1;line-height:1.4}
.gm-live-usd{font-size:13px;font-weight:600;color:var(--red);font-family:var(--mono);white-space:nowrap}
</style>
</head>
<body>
<div class="app-shell">
<button id="back-to-top" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="Back to top">↑</button>
<div class="topbar">
  <button id="topbar-back" onclick="handleBack()" style="display:none;background:none;border:none;color:#fff;font-size:13px;cursor:pointer;font-family:var(--font);padding:0 12px 0 0;opacity:0.8;flex-shrink:0">← Back</button>
  <button class="hamburger" id="hamburger-btn" onclick="toggleSidebar()" aria-label="Menu"><span></span><span></span><span></span></button>
  <div class="topbar-logo"><div class="topbar-dot"></div>Al-Cem Plant Intelligence</div>
  <div style="display:flex;align-items:center;gap:10px">
    <div id="beta-badge" style="display:none;background:rgba(255,255,255,0.15);color:#fff;font-size:10px;font-weight:500;padding:3px 10px;border-radius:20px;letter-spacing:.4px">BETA</div>
    <div class="topbar-meta" id="topbar-meta"></div>
  </div>
</div>
<div class="mode-tabs">
  <button class="mode-tab active" onclick="switchMode('diagnostic',this)">Assessment</button>
  <button class="mode-tab" onclick="switchMode('report',this)">Report</button>
  <button class="mode-tab" onclick="switchMode('simulator',this)">Simulator</button>
  <button class="mode-tab" onclick="switchMode('dashboard',this)">Portfolio</button>
</div>
<div class="view active" id="view-diagnostic">
  <div id="diag-setup" class="setup-wrap">
    <div class="setup-card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div style="display:flex;align-items:center;gap:8px">
          <div style="width:28px;height:28px;border-radius:8px;background:var(--green);display:flex;align-items:center;justify-content:center;flex-shrink:0"><div style="width:8px;height:8px;border-radius:50%;background:#5DCAA5"></div></div>
          <div style="font-size:11px;color:var(--gray-500);line-height:1.3"><strong style="color:var(--green);font-weight:500">Al-Cem Plant Intelligence</strong><br>Ready-mix operational assessment &amp; financial diagnostics</div>
        </div>
        <button onclick="switchMode('dashboard',document.querySelectorAll('.mode-tab')[1])" style="font-size:11px;color:var(--green);background:none;border:none;cursor:pointer;font-family:var(--font);padding:0;white-space:nowrap">Portfolio →</button>
      </div>
      <div class="setup-title">New plant assessment</div>

      <div class="f-row">
        <div class="f-wrap">
          <label class="f-label">Plant name / ID <span class="q-req">*</span></label>
          <input class="f-inp" id="s-pl" placeholder="Plant 1 — Riyadh North" oninput="clearFieldError('s-pl')">
          <div id="err-s-pl" style="display:none;font-size:11px;color:var(--red);margin-top:4px">Required</div>
        </div>
        <div class="f-wrap">
          <label class="f-label">Country <span class="q-req">*</span></label>
          <input class="f-inp" id="s-ct" placeholder="Saudi Arabia" oninput="clearFieldError('s-ct')">
          <div id="err-s-ct" style="display:none;font-size:11px;color:var(--red);margin-top:4px">Required</div>
        </div>
      </div>
      <button class="start-btn" onclick="startDiag()" style="margin-bottom:10px">Start guided assessment →</button>
      <div style="text-align:center;margin-top:4px">
        <button onclick="startDiag();setTimeout(switchToFullMode,50)" style="font-size:11px;color:var(--gray-400);background:none;border:none;cursor:pointer;font-family:var(--font)">Open full question set instead →</button>
      </div>
      <div id="extra-fields-toggle" onclick="toggleExtraFields()" style="text-align:center;font-size:12px;color:var(--gray-400);cursor:pointer;padding:4px;user-select:none">+ Add details (company, analyst, date, season)</div>
      <div id="extra-fields" style="display:none;margin-top:10px;border-top:1px solid var(--gray-100);padding-top:12px">
        <div class="f-row">
          <div class="f-wrap"><label class="f-label">Company</label><input class="f-inp" id="s-co" placeholder="Al-Cem Readymix"></div>
          <div class="f-wrap"><label class="f-label">Your name</label><input class="f-inp" id="s-an" placeholder="Louis Hellmann"></div>
        </div>
        <div class="f-row">
          <div class="f-wrap"><label class="f-label">Date <span style="color:var(--gray-400);font-weight:400">(auto)</span></label><input class="f-inp" type="date" id="s-dt"></div>
          <div class="f-wrap"><label class="f-label">Season <span style="color:var(--gray-400);font-weight:400">(auto)</span></label>
            <select class="f-inp" id="s-season" style="cursor:pointer">
              <option value="peak">Peak season (Sep–May)</option>
              <option value="summer">Summer (Jun–Aug) — reduced activity</option>
            </select>
          </div>
        </div>
      </div>

    </div>
  </div>
  <div id="diag-walk" style="display:none" class="diag-layout">
    <div class="sb-overlay" id="sb-overlay" onclick="toggleSidebar()"></div>
    <div class="sidebar" id="diag-sidebar"></div>
    <div style="flex:1;display:flex;flex-direction:column;overflow:hidden">
