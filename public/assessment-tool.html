  )?Math.round(+a.cement_cost*0.05*monthlyM3):0;
  const partialLoad=+a.partial_load_size||0;
  const partialRatio=partialLoad>0&&mixCap>0?partialLoad/mixCap:1;
  const partialLeakMonthly=(partialLoad>0&&partialLoad<mixCap*0.80&&delDay>0&&contrib>0)?
    Math.round((mixCap-partialLoad)*delDay*contrib*(opD/12)):0;

  // Surplus concrete waste
  const surplusMap={'Under 0.2 m³ — minimal waste':0.1,'0.2 to 0.5 m³ — moderate':0.35,'0.5 to 1.0 m³ — significant':0.75,'Over 1.0 m³ — serious problem':1.2};
  const surplusMid=surplusMap[a.surplus_concrete]||0;
  const surplusLeakMonthly=surplusMid>0&&delDay>0&&price>0?
    Math.round(surplusMid*delDay*price*(opD/12)):0;
  const siteWait=+a.site_wait_time||0;
  const washoutMap={'Under 10 minutes — fast':7,'10 to 20 minutes — standard':15,'20 to 30 minutes — slow':25,'Over 30 minutes — significant bottleneck':35};
  const washoutMin=washoutMap[a.washout_time]||0;
  const transitEst=radius>0?Math.round(radius*2*1.5):0;
  const taExplained=siteWait+washoutMin+transitEst;
  const taUnexplained=ta>0&&taExplained>0?Math.max(0,ta-taExplained):0;

  // Reject leak — adjusted by return_liability
  const rejectPct=+a.reject_pct||0;
  const liabilityMap={'Contractor always pays — formal policy enforced':{factor:0,base:'materials'},
    'Contractor sometimes pays — handled case by case':{factor:0.6,base:'price'},
    'Plant always absorbs the cost':{factor:1,base:'price'},
    'No clear policy':{factor:1,base:'price'}};
  const liab=liabilityMap[a.return_liability]||{factor:1,base:'price'};
  const rejectBase=liab.base==='materials'?(+a.cement_cost||0)+(+a.aggregate_cost||0)+(+a.admix_cost||0):price;
  const rejectLeakMonthly=Math.round(rejectPct/100*delDay*mixCap*rejectBase*liab.factor*(opD/12));

  // Demurrage opportunity
  const demurrageOpportunity=(siteWait>45&&(a.demurrage_policy==='Clause exists but rarely enforced'||a.demurrage_policy==='No demurrage charge in contracts'||a.demurrage_policy==='Not sure'))?
    Math.round(Math.max(0,siteWait-40)/ta*realisticMaxDel*mixCap*contrib*(opD/12)):0;

  // Truck breakdown cost estimate
  const truckBreakdowns=+a.truck_breakdowns||0;
  const breakdownCostMonthly=truckBreakdowns>0&&operativeTrucks>0?
    Math.round(truckBreakdowns*(opH*0.5)*(delDay/operativeTrucks)*mixCap*contrib):0;

  // Customer concentration risk
  const topCustPct=+a.top_customer_pct||0;
  const concentrationRisk=topCustPct>0?Math.round(topCustPct/100*delDay*mixCap*price*(opD/12)):0;

  // Cement optimisation opportunity
  const cementOptOpp=(
    (a.mix_design_review==='More than 3 years ago'||a.mix_design_review==='Never formally reviewed — original designs still in use')&&
    (a.admix_strategy==='Workability only — admixtures used to improve flow and placement'||a.admix_strategy==='Admixtures not used')&&
    (+a.cement_cost||0)>0&&monthlyM3>0
  )?Math.round(+a.cement_cost*0.08*monthlyM3):0;
  // Seasonal adjustment note (summer = flag only, no score change — data entered reflects real conditions)
  const isSummer=S.meta?.season==='summer';

  // Production score: utilization base + batch cycle penalty + stops penalty + confidence weight
  let utilScore=actual>0?Math.max(0,Math.min(100,Math.round(util/0.92*100))):null;
  if(utilScore!==null){
    // Batch cycle penalty from options
    const bcMap={'Fast — under 5 min':0,'Normal — 5 to 7 min':5,'Slow — 7 to 10 min':14,'Very slow — over 10 min':22};
    const batchPenalty=bcMap[a.batch_cycle]||0;
    utilScore=Math.max(0,utilScore-batchPenalty);
    // Stops penalty
    const stopsPenalty={'None \u2014 no unplanned stops':0,'1 to 2 stops':3,'3 to 5 stops':10,'More than 5 stops':20}[a.stops_freq]||0;
    utilScore=Math.max(0,utilScore-stopsPenalty);
    // Unified confidence weight from prod_data_source — same scale for all scores
    const confWeight={'System records \u2014 read from batch computer or dispatch system':1,'Calculated from monthly reports or delivery tickets':0.95,'Estimated by plant manager or dispatcher':0.75,'Rough estimates \u2014 not based on records':0.55}[a.prod_data_source]||1;
    utilScore=Math.round(utilScore*confWeight);
  }

  // Turnaround score — uses same unified confidence weight as production
  const confWeight2={'System records \u2014 read from batch computer or dispatch system':1,'Calculated from monthly reports or delivery tickets':0.95,'Estimated by plant manager or dispatcher':0.75,'Rough estimates \u2014 not based on records':0.55}[a.prod_data_source]||1;
  const taScore=ta>0?Math.max(0,Math.min(100,Math.round((100-(excessMin/TARGET_TA)*80)*confWeight2))):null;

  // Dispatch score: weighted components
  const dMap={'Under 15 minutes \u2014 fast response':100,'15 to 25 minutes \u2014 acceptable':70,'25 to 40 minutes \u2014 slow':40,'Over 40 minutes \u2014 critical bottleneck':10};
  const cMap={'Always \u2014 formal zone system in place':100,'Usually \u2014 informal grouping most of the time':75,'Sometimes \u2014 depends on the dispatcher':45,'Rarely or never':15};
  const idleMap={'Never \u2014 a truck is always available':100,'Occasionally \u2014 a few times per week':70,'Regularly \u2014 most busy periods':40,'Every day \u2014 always waiting for trucks':10};
  const toolMap={'Dedicated dispatch software with real-time tracking':100,'Spreadsheet combined with WhatsApp':65,'WhatsApp messages only \u2014 no spreadsheet':35,'Phone calls and a whiteboard or paper list':10};
  // Order notice: short notice limits dispatch optimization — contributes to dispatch score
  const noticeMap={'Under 4 hours \u2014 same day calls only':20,'4 to 24 hours \u2014 day-of or day-before':55,'1 to 3 days ahead':85,'Formal schedule \u2014 weekly or project-based':100};
  const dWeighted=[
    {v:dMap[a.order_to_dispatch],w:0.35},
    {v:cMap[a.route_clustering],w:0.22},
    {v:idleMap[a.plant_idle],w:0.18},
    {v:toolMap[a.dispatch_tool],w:0.13},
    {v:noticeMap[a.order_notice],w:0.12}
  ].filter(x=>x.v!==undefined);
  const dTotalW=dWeighted.reduce((s,x)=>s+x.w,0);
  const dispScore=dWeighted.length?Math.round(dWeighted.reduce((s,x)=>s+x.v*x.w,0)/dTotalW):null;

  // Logistics score: turnaround (50%) + truck availability (25%) + qualified drivers (15%) + washout (10%)
  const availScore=availRate>0?Math.max(0,Math.min(100,Math.round(availRate/0.95*100))):null;
  const driverScore=(qualifiedDrivers>0&&operativeTrucks>0)?Math.max(0,Math.min(100,Math.round(Math.min(qualifiedDrivers/operativeTrucks,1)/0.95*100))):null;
  const washoutScore=washoutMin>0?({'Under 10 minutes — fast':100,'10 to 20 minutes — standard':75,'20 to 30 minutes — slow':40,'Over 30 minutes — significant bottleneck':10}[a.washout_time]||null):null;
  const logisticsWeighted=[
    {v:taScore,w:0.50},
    {v:availScore,w:0.25},
    {v:driverScore,w:0.15},
    {v:washoutScore,w:0.10}
  ].filter(x=>x.v!==null);
  const logisticsTotalW=logisticsWeighted.reduce((s,x)=>s+x.w,0);
  const logisticsScore=logisticsWeighted.length?Math.round(logisticsWeighted.reduce((s,x)=>s+x.v*x.w,0)/logisticsTotalW):null;

  // Quality score: reject_pct (50%) + quality_control (25%) + batch_calibration (15%) + surplus_concrete (10%)
  // Reject ×12: 0%=100, 2%=76, 3%=64, 5%=40, 8.3%=0. In GCC ready-mix: <1% excellent, 1-3% acceptable, 3-5% poor, >5% critical.
  const rejectScore=rejectPct>=0?Math.max(0,Math.min(100,Math.round(100-rejectPct*12))):null;
  const qcMap={'Both logged every batch — enforced strictly':100,'Usually done — most trucks, informal recording':70,'Sometimes — depends on operator or shift':35,'Rarely or never — no systematic quality checks':5};
  const qcScore=a.quality_control?qcMap[a.quality_control]??null:null;
  const calibScore={'Within the last 12 months — certificate available':100,'1 to 2 years ago':70,'More than 2 years ago':35,'Never calibrated — original factory settings only':10}[a.batch_calibration]||null;
  const surplusScore={'Under 0.2 m³ — minimal waste':100,'0.2 to 0.5 m³ — moderate':70,'0.5 to 1.0 m³ — significant':35,'Over 1.0 m³ — serious problem':10}[a.surplus_concrete]||null;
  const qualityWeighted=[
    {v:rejectScore,w:0.50},
    {v:qcScore,w:0.25},
    {v:calibScore,w:0.15},
    {v:surplusScore,w:0.10}
  ].filter(x=>x.v!==null);
  const qualityTotalW=qualityWeighted.reduce((s,x)=>s+x.w,0);
  const qualityScore=qualityWeighted.length?Math.round(qualityWeighted.reduce((s,x)=>s+x.v*x.w,0)/qualityTotalW):null;

  // Summer adjustment: boost production score to approximate peak-season equivalent
  let summerAdjusted=false;
  if(isSummer&&a.summer_prod_drop&&utilScore!==null){
    const dropMap={'Under 10% — minimal seasonal impact':0.95,'10 to 20% — moderate drop':0.85,'20 to 35% — significant summer slowdown':0.72,'Over 35% — severe seasonal reduction':0.60,'Not sure — no seasonal comparison available':0.80};
    const summerFactor=dropMap[a.summer_prod_drop]||1;

  const daysMismatchPenalty=daysMismatch==='Mostly — one or two figures from a different period'?0.95:daysMismatch==='No — figures come from different time periods'?0.85:1;

  const valid=[utilScore,dispScore,logisticsScore,qualityScore].filter(v=>v!==null);
  const overall=valid.length?Math.round(valid.reduce((s,v)=>s+v,0)/valid.length):null;
  let bottleneck=null;
  if(valid.length>=2){
    const scores={Production:utilScore,Dispatch:dispScore,Logistics:logisticsScore,Quality:qualityScore};
    const validScores=Object.entries(scores).filter(([,v])=>v!==null);

// ── DATA CONFIDENCE ───────────────────────────────────────────────────────────
function calcDataConfidence(){
  if(!S||!S.answers)return null;
  const a=S.answers;
  const sourceW={'System records \u2014 read from batch computer or dispatch system':1.0,'Calculated from monthly reports or delivery tickets':0.90,'Estimated by plant manager or dispatcher':0.70,'Rough estimates \u2014 not based on records':0.60}[a.prod_data_source]||null;
  const freshW={"Today's operation \u2014 figures from this visit":1.0,"This week \u2014 within the last 7 days":0.95,"This month \u2014 within the last 30 days":0.85,"Older or unsure":0.70}[a.data_freshness]||null;
  const obsW={'Seen on screen \u2014 batch computer, dispatch system, or printout':1.0,'Seen on paper \u2014 delivery tickets, reports, or invoices':0.95,'Told verbally \u2014 by plant manager or dispatcher':0.75,'Mix of observed and verbal':0.85}[a.data_observed]||null;
  const crossW={'Yes \u2014 two or more independent sources confirmed the same figure':1.0,'Partially \u2014 one or two figures cross-checked':0.90,'No \u2014 single source for all figures':0.80,'Not possible \u2014 no second source available':0.80}[a.data_crosscheck]||null;
  const selfCap={"High \u2014 I would present these to the plant owner without hesitation":1.0,"Medium \u2014 reasonable but I'd verify one or two before presenting":0.85,"Low \u2014 significant uncertainty, treat dollar figures as directional only":0.65,"Very low \u2014 data quality was poor, findings are indicative only":0.50}[a.data_confidence_self]||null;

  const weights=[sourceW,freshW,obsW,crossW].filter(v=>v!==null);
  if(!weights.length)return null;
  let raw=weights.reduce((s,v)=>s+v,0)/weights.length;
  if(selfCap!==null)raw=Math.min(raw,selfCap);
  const pct=Math.round(raw*100);
  const level=pct>=90?'high':pct>=75?'medium':pct>=60?'low':'very-low';
  const color=pct>=90?'var(--green-mid)':pct>=75?'var(--amber)':'var(--red)';
  const label=pct>=90?'High confidence':pct>=75?'Medium confidence':pct>=60?'Low confidence':'Very low confidence';
  return{pct,level,color,label,sourceW,freshW,obsW,crossW,selfCap};
}

// ── PER-KPI DATA CONFIDENCE ───────────────────────────────────────────────────
function calcKpiConfidence(){
  if(!S||!S.answers)return{dispatch:null,prod:null,fleet:null};
  const dc=calcDataConfidence();
  if(!dc)return{dispatch:null,prod:null,fleet:null};

  const s=dc.sourceW||0.75;
  const f=dc.freshW||0.85;
  const o=dc.obsW||0.80;
  const c=dc.crossW||0.80;
  const cap=dc.selfCap||1.0;

  // Dispatch: driven by direct on-site observation — obs + cross-check dominate
  const dispPct=Math.round(Math.min((o*0.45)+(c*0.25)+(s*0.15)+(f*0.15),cap)*100);
  // Production: driven by monthly m³ from batch computer — source + freshness dominate
  const prodPct=Math.round(Math.min((s*0.40)+(f*0.30)+(o*0.20)+(c*0.10),cap)*100);
  // Logistics: turnaround often told verbally — obs + source dominate
  const fleetPct=Math.round(Math.min((o*0.35)+(s*0.30)+(c*0.20)+(f*0.15),cap)*100);

  const band=p=>p>=85?{label:'Reliable',color:'var(--green-mid)'}:p>=70?{label:'Acceptable',color:'var(--amber)'}:{label:'Low — treat score as indicative',color:'var(--red)'};
  return{
    dispatch:{pct:dispPct,...band(dispPct)},
    prod:{pct:prodPct,...band(prodPct)},
    fleet:{pct:fleetPct,...band(fleetPct)},
  };
}

// ── CONSISTENCY CHECKER ───────────────────────────────────────────────────────
function calcConsistency(r,a){
  if(!a)a=S.answers||{};
  const flags=[];
  // 1. Deliveries exceed theoretical max
  if(r.ta>0&&r.trucks>0&&r.opH>0&&r.delDay>0){
    const theoMax=Math.floor(r.trucks*(r.opH*60/r.ta));
    if(r.delDay>theoMax)
      flags.push({sev:'red',msg:`Deliveries/day (${r.delDay}) exceeds the theoretical maximum (${theoMax}) for ${r.trucks} trucks at ${r.ta} min turnaround. One of these figures is likely wrong.`});
  }
  // 2. High utilisation + slow batch cycle
  if(r.util>0.88&&(a.batch_cycle==='Slow \u2014 7 to 10 min'||a.batch_cycle==='Very slow \u2014 over 10 min'))
    flags.push({sev:'amber',msg:`Utilisation ${Math.round(r.util*100)}% is high but batch cycle is reported as slow. High-utilisation plants need fast batch cycles — verify both figures.`});
  // 3. High utilisation + many stops
  if(r.util>0.85&&a.stops_freq==='More than 5 stops')
    flags.push({sev:'amber',msg:`Utilisation ${Math.round(r.util*100)}% is high but more than 5 unplanned stops are reported per day. Frequent stops typically suppress utilisation below 75%.`});
  // 4. High margin without aggregate costs
  if(r.contrib>50&&(!a.aggregate_cost||+a.aggregate_cost===0))
    flags.push({sev:'amber',msg:`Contribution margin $${Math.round(r.contrib)}/m³ is very high. Aggregate and admixture costs may not be included — actual margin is likely $12–20/m³ lower.`});
  // 5. Short radius + long turnaround
  if(r.radius>0&&r.radius<10&&r.ta>90)
    flags.push({sev:'amber',msg:`Delivery radius is ${r.radius} km but turnaround is ${r.ta} min — the target for this radius is ${r.TARGET_TA} min. This suggests significant non-travel delays: site waiting or plant queuing.`});
  // 6. Hidden deliveries suspect
  if(r.hiddenSuspect)
    flags.push({sev:'red',msg:`Hidden delivery gap is unusually large relative to fleet size. Verify that turnaround time, operating hours, and daily deliveries are from the same time period.`});
  // 7. High rejects + good QC
  if(r.rejectPct>5&&(a.quality_control==='Always done \u2014 every truck, formally recorded'||a.slump_protocol==='Every truck \u2014 formal slump test before dispatch'))
    flags.push({sev:'amber',msg:`Reject rate ${r.rejectPct}% is high but quality control is reported as consistently applied. Above 3% with full QC usually indicates a mix design or water-cement ratio problem — not a process gap.`});
  // 8. Monthly production exceeds theoretical max
  if(r.monthlyM3>0&&r.cap>0&&r.opH>0){
    const thMax=r.cap*r.opH*(r.opD/12);
    if(r.monthlyM3>thMax*1.05)
      flags.push({sev:'red',msg:`Monthly production (${r.monthlyM3.toLocaleString()} m³) exceeds the theoretical maximum (${Math.round(thMax).toLocaleString()} m³) based on capacity × hours × days. Verify these figures are consistent.`});
  }
  return flags;
}

      show('deliveries_day',[`Best practice target: ${r.realisticMaxDel} deliveries/day (${r.trucks} trucks at 85% utilisation, ${r.TARGET_TA}-min turnaround)`,`Current: ${r.delDay} — gap of ${r.hiddenDel} deliveries/day`,dollarLine]);
    }else{

    }

  if(id==='reject_pct'&&r.rejectPct>0){

    show('reject_pct',[
      r.rejectLeakMonthly>0?`Full write-off cost: ${fmt(r.rejectLeakMonthly)}/month`:'Enter economics data for dollar estimate',
      perPct>0?`Each 1% reduction saves ${fmt(perPct)}/month`:''
    ]);
  }

  if(['price_m3','cement_cost','aggregate_cost','admix_cost'].includes(id)&&r.price>0){
    const el=document.getElementById('li-price_m3');const vl=document.getElementById('liv-price_m3');
    if(el&&vl){
      el.style.display='block';
      const lines=[`Contribution margin: ${fmt(r.contrib)}/m³ (${Math.round(r.marginRatio*100)}% of selling price)`];
      if(r.marginIncomplete) lines.push(`Warning: aggregate and admixture costs not entered — actual margin is likely $8–15/m³ lower than shown. All margin figures are overstated until these are added.`);
      else if(r.contrib<12) lines.push(`Warning: margin below $12/m³ — verify all material costs are entered correctly.`);
      else if(r.contrib>55) lines.push(`Note: margin above $55/m³ — confirm this excludes fixed overhead costs.`);
      else lines.push(`Margin looks realistic for ready-mix in this region.`);
      vl.innerHTML=lines.join('<br>');
    }
  }

  // order_to_dispatch: only show impact if actually above target
  if(id==='order_to_dispatch'){
    const delayMap={'Under 15 min':0,'15–25 min':10,'25–40 min':27,'Over 40 min':42};
    const ex=delayMap[a.order_to_dispatch];
    if(ex===0){

    }else if(ex>0){
      show('order_to_dispatch',[`~${ex} min above 15-min target — enter economics data for dollar estimate`]);
    }
  }
}

      hasQuality?`Quality & Waste (score ${r.scores.quality}/100 — GCC benchmark: reject rate <1.5%, QC every batch)`:null,
    ].filter(Boolean);
    return GCC_CONTEXT+CONTEXT+`

TASK: Write the Operational Diagnosis section of a consulting report for ${m.plant}.

Structure — use ONLY these sub-headings (skip any where data is absent):
${activeSections.map((s,i)=>`${i+1}. ${s}`).join('\n')}

Rules for each section:
- Pattern: Observed metric [with actual number] → vs GCC benchmark [state the benchmark number] → operational implication → impact on the primary bottleneck (${r.bottleneck||'as determined from scores'})
- Always state the actual number AND the benchmark in the same sentence. Example: "Turnaround of ${r.ta} min is ${r.excessMin} min above the ${r.TARGET_TA}-min regional benchmark for a ${r.radius}-km delivery radius."
- ${hasProd?`Production: reference actual utilisation (${Math.round(r.util*100)}%) vs 92% GCC target. Note batch cycle and stop frequency impact.`:''}
- ${hasFleet?`Fleet: explain turnaround excess in operational terms — what causes trucks to be away longer than the target.`:''}
- ${hasDispatch?`Dispatch: name the weakest sub-factor and connect it to the turnaround and idle-time findings.`:''}
- Apply GCC context (heat, site readiness, WhatsApp culture, contractor behaviour) only where the data directly supports it
- If data confidence is flagged as low, note this as a data gap in the relevant section
- No recommendations in this section — diagnosis only
- Maximum 280 words total`;
  }
  if(type==='actions'){
    const totalMonthly=issues.filter(i=>i.loss>0).reduce((s,i)=>s+i.loss,0);
    return GCC_CONTEXT+CONTEXT+`

TASK: Write the Improvement Actions section for ${m.plant}.

Format — exactly 3 actions, using this structure for each:

**[Action title — 5 words max]**
What: [One specific, observable action — not a process, a thing someone does]
Who: [Role, not name — e.g. "Dispatcher", "Plant manager", "Batch operator"]
When: [Week 1 / Weeks 2–4 / Ongoing — pick one]
Impact: [Dollar figure from the data if available, otherwise operational outcome]

Rules:
- Action 1 must directly address the primary bottleneck: ${r.bottleneck||'as determined from scores'}
- Action 2 must be the fastest thing that can be started this week with no capital investment
- Action 3 should address data quality or a secondary finding — something that sets up the next visit
- Be GCC-specific: account for language barriers in dispatch (WhatsApp voice notes, visual checklists), contractor site readiness culture, heat impact on scheduling
- Do not invent dollar figures not in the data. If the impact is not calculable, state the operational outcome instead
- Complexity is implicit in the "When" field — do not add a separate complexity label
- Total: maximum 200 words`;
  }
}

async function callAI(prompt){
  // Embedded mode — proxy through Next.js API
  if(window.parent!==window&&S._assessmentId){
    return callAIStream(prompt,()=>{});
  }
  const resp=await fetch('https://api.anthropic.com/v1/messages',{

  });
  if(!resp.ok){const e=await resp.json().catch(()=>({}));throw new Error(e.error?.message||'API error');}
  const reader=resp.body.getReader();const dec=new TextDecoder();let full='';
  while(true){
    const{done,value}=await reader.read();if(done)break;
    const chunk=dec.decode(value,{stream:true});
    for(const line of chunk.split('\n')){
      if(!line.startsWith('data:'))continue;
      const raw=line.slice(5).trim();if(raw==='[DONE]')continue;

}

        const raw=line.slice(5).trim();if(raw==='[DONE]')continue;
        try{const ev=JSON.parse(raw);if(ev.error)throw new Error(ev.error);if(ev.text){full+=ev.text;onToken(full);}}catch(e){if(e.message&&e.message!=='Unexpected end of JSON input')throw e;}

  });
  if(!resp.ok){const e=await resp.json().catch(()=>({}));throw new Error(e.error?.message||'API error');}
  const reader=resp.body.getReader();const dec=new TextDecoder();let full='';
  while(true){
    const{done,value}=await reader.read();if(done)break;
    const chunk=dec.decode(value,{stream:true});
    for(const line of chunk.split('\n')){
      if(!line.startsWith('data:'))continue;
      const raw=line.slice(5).trim();if(raw==='[DONE]')continue;
      try{const ev=JSON.parse(raw);if(ev.type==='content_block_delta'&&ev.delta?.text){full+=ev.delta.text;onToken(full);}}catch(e){}
    }
  }
  return full;
}

PLANT: ${m.plant} | ${m.company||'—'} | ${m.country} | ${m.date||'—'} | Analyst: ${m.analyst||'—'}${m.season==='summer'?' | SUMMER assessment':''}

SCORES (authoritative — do not recalculate):
- Production: ${r.scores.prod!==null?r.scores.prod+'/100':'n/a'} | Dispatch: ${r.scores.dispatch!==null?r.scores.dispatch+'/100':'n/a'} | Logistics: ${r.scores.logistics!==null?r.scores.logistics+'/100':'n/a'} | Quality: ${r.scores.quality!==null?r.scores.quality+'/100':'n/a'} | Overall: ${r.overall!==null?r.overall+'/100':'n/a'}
- Primary bottleneck: ${r.bottleneck||'not determined'}

FINANCIALS:
- Selling price: ${r.price>0?'$'+r.price+'/m³':'not provided'} | Contribution margin: ${r.contrib>0?'$'+Math.round(r.contrib)+'/m³':'not provided'}
- Monthly opportunity: ${totalMonthly>0?fmt(totalMonthly)+'/month':'not calculable'}
- Hidden deliveries: ${r.hiddenDel>0?r.hiddenDel+'/day = '+fmt(r.hiddenRevMonthly)+'/month':'none detected'}
- Hidden revenue from existing fleet (no new trucks needed): ${r.hiddenRevMonthly>0?fmt(r.hiddenRevMonthly)+'/month':'not calculable'}

PRODUCTION:
- Designed capacity: ${a.plant_cap||'?'} m³/hr | Actual avg: ${r.actual>0?r.actual.toFixed(1)+' m³/hr':'?'} | Utilisation: ${r.actual>0?Math.round(r.util*100)+'%':'?'} (target: 92%)
- Batch cycle: ${a.batch_cycle||'not provided'} | Unplanned stops: ${a.stops_freq||'not provided'}
- Production last month: ${a.actual_prod||'?'} m³ | Operating: ${a.op_hours||'?'} hr/day × ${Math.round((a.op_days||300)/12)} days/month

FLEET & DISPATCH:
- Trucks: ${a.n_trucks||'?'} × ${a.mixer_capacity||7} m³ | Turnaround: ${a.turnaround||'?'} min | Target: ${r.TARGET_TA} min | Excess: ${r.excessMin>0?'+'+r.excessMin+' min':'none'}

QUALITY & SUPPLY:

- Cement silo: ${a.silo_days||'not provided'} | Ramadan schedule: ${a.ramadan_schedule||'not provided'}

TOP FINDINGS:
${issues.slice(0,4).map((iss,i)=>`${i+1}. ${iss.t}${iss.loss>0?' — '+fmt(iss.loss)+'/month':''}`).join('\n')}

MANAGER'S OWN WORDS: "${a.biggest_pain||'not recorded'}"

// Copilot state per report instance — keyed by plantId
const _copilotStates={};

function buildProactiveOpening(r,issues,m){
  const totalMonthly=issues.filter(i=>i.loss>0).reduce((s,i)=>s+i.loss,0);
  if(r.bottleneck&&totalMonthly>0)
    return`${r.bottleneck} bottleneck · ${r.overall}/100 overall · ${fmt(totalMonthly)}/month gap. What do you want to dig into?`;
  if(r.overall)
    return`Overall score ${r.overall}/100. Ask me anything about this plant.`;
  return`Ask me anything about this plant.`;
}


function buildDynamicSuggestions(r,issues,m,asked){
  const a=S.answers||{};
  const candidates=[
    r.bottleneck==='Dispatch'?`What would it take to get dispatch from ${r.scores.dispatch} to 80 — and how long?`:null,
    r.bottleneck==='Fleet'&&r.excessMin>0?`If we cut turnaround by ${Math.min(r.excessMin,15)} min, what does that recover per month?`:null,
    r.hiddenDel>0?`What exactly needs to change to unlock the ${r.hiddenDel} hidden deliveries per day?`:null,
    r.scores.dispatch!==null&&r.scores.dispatch<65?`Which dispatch factor is weakest and what do we fix first?`:null,
    a.reject_pct>1.5?`The ${a.reject_pct}% reject rate — what's the fastest fix?`:null,
    a.silo_days==='Under 2 days — high supply risk'?`How serious is the cement stock situation right now?`:null,
    `Write a 3-line message to the plant owner about the most important finding`,
    `What are the 2 most important things to do before next month?`,
    `Compare these scores to GCC best practice — where do we stand?`,
    issues.length>1?`Is finding #2 connected to finding #1, or is it independent?`:null,
    r.bottleneck==='Production'?`What is the fastest way to close the capacity gap?`:null,
  ].filter(s=>s&&!asked.has(s));
  return candidates.slice(0,4);
}

function initCopilot(plantId,r,issues,m){
  if(_copilotStates[plantId])return;
  if(plantId==='portfolio')return;
  const opening=buildProactiveOpening(r,issues,m);
  _copilotStates[plantId]={history:[],r,issues,m,busy:false,opening,askedSugs:new Set()};
}

async function copilotSend(plantId,userMsg){
  const state=_copilotStates[plantId];
  if(!state||state.busy||!userMsg.trim())return;
  state.busy=true;

  const msgs=document.getElementById('copilot-msgs-'+plantId);
  const inp=document.getElementById('copilot-inp-'+plantId);
  const btn=document.getElementById('copilot-send-'+plantId);
  const sugs=document.getElementById('copilot-sugs-'+plantId);
  if(inp)inp.value='';
  if(btn)btn.disabled=true;
  if(sugs)sugs.style.display='none';

  // Render user bubble
  if(msgs){
    const ub=document.createElement('div');
    ub.className='copilot-msg user';
    ub.innerHTML=`<div class="copilot-avatar">U</div><div class="copilot-bubble">${escHtml(userMsg)}</div>`;
    msgs.appendChild(ub);msgs.scrollTop=msgs.scrollHeight;
  }

  // Add to history
  state.history.push({role:'user',content:userMsg});

  // Render streaming assistant bubble
  let aDiv=null;
  let aBubble=null;
  if(msgs){
    aDiv=document.createElement('div');
    aDiv.className='copilot-msg assistant copilot-streaming';
    aDiv.innerHTML=`<div class="copilot-avatar">AI</div><div class="copilot-bubble"></div>`;
    msgs.appendChild(aDiv);msgs.scrollTop=msgs.scrollHeight;
    aBubble=aDiv.querySelector('.copilot-bubble');
  }

  try{
    const systemPrompt=state.isPortfolio
      ? (state.portfolioContext||buildPortfolioCopilotContext())
      : buildCopilotSystemPrompt(state.r,state.issues,state.m);
    const isEmbedded=window.parent!==window&&S._assessmentId;
    const fetchUrl=isEmbedded?'/api/ai-stream':'https://api.anthropic.com/v1/messages';
    const fetchHeaders=isEmbedded
      ?{'Content-Type':'application/json'}
      :{'Content-Type':'application/json','anthropic-version':'2023-06-01','x-api-key':ANTHROPIC_API_KEY};
    const fetchBody=isEmbedded
      ?{messages:state.history,system:systemPrompt,max_tokens:900}
      :{model:'claude-sonnet-4-20250514',max_tokens:900,stream:true,system:systemPrompt,messages:state.history};
    const resp=await fetch(fetchUrl,{
      method:'POST',
      headers:fetchHeaders,
      body:JSON.stringify(fetchBody)
    });
    if(!resp.ok)throw new Error('API error');
    const reader=resp.body.getReader();const dec=new TextDecoder();let full='';
    while(true){
      const{done,value}=await reader.read();if(done)break;
      const chunk=dec.decode(value,{stream:true});
      for(const line of chunk.split('\n')){
        if(!line.startsWith('data:'))continue;
        const raw=line.slice(5).trim();if(raw==='[DONE]')continue;
        try{const ev=JSON.parse(raw);
          if(isEmbedded){if(ev.text){full+=ev.text;if(aBubble)aBubble.innerHTML=mdToHtml(full);if(msgs)msgs.scrollTop=msgs.scrollHeight;}}
          else{if(ev.type==='content_block_delta'&&ev.delta?.text){full+=ev.delta.text;if(aBubble)aBubble.innerHTML=mdToHtml(full);if(msgs)msgs.scrollTop=msgs.scrollHeight;}}
        }catch(e){}
      }
    }
    if(aDiv)aDiv.classList.remove('copilot-streaming');
    state.history.push({role:'assistant',content:full});
    // Trim history to last 10 turns (20 messages) to avoid token bloat
    if(state.history.length>20)state.history=state.history.slice(-20);
    // Refresh dynamic suggestions after each reply
    if(!state.isPortfolio){
      const sugsEl=document.getElementById('copilot-sugs-'+plantId);
      if(sugsEl){
        const newSugs=buildDynamicSuggestions(state.r,state.issues,state.m,state.askedSugs||new Set());
        if(newSugs.length>0){
          sugsEl.innerHTML=newSugs.map(s=>`<button class="copilot-sug" onclick="copilotClickSug('${plantId}',this)">${escHtml(s)}</button>`).join('');
          sugsEl.style.display='flex';
        } else {
          sugsEl.style.display='none';
        }
      }
    }
  }catch(err){
    if(aBubble)aBubble.textContent='Could not connect — check internet.';
    if(aDiv)aDiv.classList.remove('copilot-streaming');
  }
  state.busy=false;
  if(btn)btn.disabled=false;
  if(inp){inp.focus();}
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function mdToHtml(s,scores){
  // Bold: **text**
  s=s.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
  // Score section headers — detect score/100 and color based on distance from benchmark
  s=s.replace(/(^|\n)((Production|Fleet[^\n&]*|Dispatch[^\n]*)\s*[\(\—–][^\n]+)/gm,function(match,pre,header){
    // Extract score number from header
    const scoreMatch=header.match(/(\d+)\/100/);
    const score=scoreMatch?parseInt(scoreMatch[1]):null;
    // Determine benchmark: Production=85, Fleet/Dispatch=80
    const isProd=/production/i.test(header);
    const benchmark=isProd?85:80;
    const color=score===null?'var(--gray-400)':score>=benchmark?'var(--green)':score>=benchmark-15?'var(--amber)':'var(--red)';
    return pre+`<div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:${color};margin:14px 0 5px">${header}</div>`;
  });
  // Action numbers
  s=s.replace(/(^|\n)(\d+\.) ([^\n]+)/g,'$1<div style="font-size:13px;font-weight:600;color:var(--gray-900);margin:14px 0 6px">$2 $3</div>');
  // Action field labels (What/Who/When/Impact)
  s=s.replace(/(^|\n)(What|Who|When|Impact):/g,'$1<span style="font-size:11px;font-weight:600;color:var(--gray-400);text-transform:uppercase;letter-spacing:.3px">$2:</span>');
  // Paragraphs
  s=s.replace(/\n\n/g,'</p><p style="margin:10px 0 0">');
  s=s.replace(/\n/g,'<br>');
  return '<p style="margin:0">'+s+'</p>';
}

function scoreLabelHtml(label, score, benchmark, benchmarkLabel){
  // score vs benchmark: green if at/above, amber if within 15pts, red if more than 15 below
  const color = score === null ? 'var(--gray-400)' :
    score >= benchmark ? 'var(--green)' :
    score >= benchmark - 15 ? 'var(--amber)' : 'var(--red)';
  return `<div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:${color};margin-bottom:6px">${label} — ${score !== null ? score+'/100' : '—'} <span style="font-weight:400;color:var(--gray-400)">${benchmarkLabel}</span></div>`;
}

function setTabContent(tabId,text,editable){
  const body=document.getElementById('ai-body-'+tabId);
  if(!body)return;
  if(editable){
    body.innerHTML=`<textarea class="ai-textarea" id="ai-ta-${tabId}">${text}</textarea><div class="ai-hint">Edit freely — your changes are preserved</div>`;
  }else{
    body.innerHTML=`<div class="ai-text">${text}</div>`;
  }
}

let _aiCtx={};

async function generateAll(r,issues,m){
  // Always set context so Regenerate works
  _aiCtx={r,issues,m};
  // Skip generation if report text already loaded
  if(S.report['executive']&&S.report['executive'].length>100){
    updateAIBadge(false);
    return;
  }
  updateAIBadge(false);
  for(const t of['executive','diagnosis','actions']){
    const ab=document.getElementById('ai-body-'+t+'-a');
    if(ab&&t!=='executive')ab.innerHTML=`<div class="ai-loading"><div class="ai-dot"></div><div class="ai-dot"></div><div class="ai-dot"></div><span>Generating…</span></div>`;
    const ownerEl=t==='executive'?document.getElementById('ai-body-executive'):null;
    if(ownerEl)ownerEl.innerHTML=`<div class="ai-loading"><div class="ai-dot"></div><div class="ai-dot"></div><div class="ai-dot"></div><span>Generating…</span></div>`;
    try{
      // Create a text node we update live
      let streamEl=null;
      if(t==='executive'&&ownerEl){ownerEl.innerHTML='<div class="ai-text" id="ai-stream-executive"></div>';streamEl=document.getElementById('ai-stream-executive');}
      if(ab){ab.innerHTML='<div class="ai-text" id="ai-stream-'+t+'-a"></div>';if(t!=='executive')streamEl=document.getElementById('ai-stream-'+t+'-a');}
      const text=await callAIStream(buildPrompt(t,r,issues,m),partial=>{
        if(t==='executive'){
          const el=document.getElementById('ai-stream-executive');
          if(el)el.innerHTML=mdToHtml(partial);
        }
        const ela=document.getElementById('ai-stream-'+t+'-a');
        if(ela)ela.innerHTML=mdToHtml(partial);
      });
      S.report[t]=text;S.edited[t]=false;
      saveReportToParent();
      // Final render — apply markdown formatting
      if(t==='executive'){const el=document.getElementById('ai-stream-executive');if(el)el.innerHTML=mdToHtml(text);}
      const ela=document.getElementById('ai-stream-'+t+'-a');if(ela)ela.innerHTML=mdToHtml(text);
    }catch(e){
      const ownerElE=document.getElementById('ai-body-executive');
      if(t==='executive'&&ownerElE)ownerElE.innerHTML=`<div class="ai-text" style="color:var(--gray-500)">Could not generate — check internet connection. Use Edit to write manually.</div>`;
      const analystEl=document.getElementById('ai-body-'+t+'-a');
      if(analystEl)analystEl.innerHTML=`<div class="ai-text" style="color:var(--gray-500)">Could not generate. Use Edit to write manually.</div>`;
    }
  }
}

function saveReportToParent(){
  if(window.parent!==window&&S._assessmentId&&S.report){
    window.parent.postMessage({type:'ALRMX_SAVE_REPORT',payload:{report:S.report}},'*');
  }
}

function updateAIBadge(anyEdited){
  const badge=document.getElementById('ai-main-badge');
  if(badge){badge.textContent=anyEdited?'AI + edited':'AI generated';badge.className='ai-badge '+(anyEdited?'edited':'generated');}
}

function currentAITab(){return document.querySelector('.ai-tab.active')?.dataset?.tab||'executive';}

function switchAITab(tab){
  document.querySelectorAll('.ai-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.ai-section').forEach(s=>s.classList.remove('active'));
  document.querySelector('.ai-tab[data-tab="'+tab+'"]')?.classList.add('active');
  ['a','b'].forEach(v=>{const sec=document.getElementById('ai-sec-'+tab+'-'+v);if(sec)sec.classList.add('active');});
  if(S.report[tab]&&!S.edited[tab]){
    const el=document.getElementById('ai-body-'+tab+'-a');
    if(el)el.innerHTML=`<div class="ai-text">${S.report[tab]}</div>`;
  }
}

function editTab(tab){
  if(!S.report[tab])return;
  const suffix='-a';
  const bodyId='ai-body-'+tab+suffix;
  const el=document.getElementById(bodyId);
  if(el){el.innerHTML=`<textarea class="ai-textarea" id="ai-ta-${tab}">${S.report[tab]}</textarea><div class="ai-hint">Edit freely — your changes are preserved</div>`;}
  S.edited[tab]=true;updateAIBadge(true);
}

function saveTab(tab){
  const ta=document.getElementById('ai-ta-'+tab);
  if(ta){
    S.report[tab]=ta.value;
    // Update both views
    const ownerEl=document.getElementById('ai-body-executive');
    if(tab==='executive'&&ownerEl)ownerEl.innerHTML=`<div class="ai-text">${ta.value}</div>`;
    const analystEl=document.getElementById('ai-body-'+tab+'-a');
    if(analystEl)analystEl.innerHTML=`<div class="ai-text">${ta.value}</div>`;
  }
}

function regenTab(tab){
  if(S.edited[tab]){if(!confirm('This will replace your edits with a new AI-generated version. Continue?'))return;}
  if(!_aiCtx.r)return;
  const analystEl=document.getElementById('ai-body-'+tab+'-a');
  if(analystEl)analystEl.innerHTML='<div class="ai-loading"><div class="ai-dot"></div><div class="ai-dot"></div><div class="ai-dot"></div><span>Regenerating…</span></div>';
  // Create streaming target
  if(analystEl){analystEl.innerHTML='<div class="ai-text" id="ai-regen-stream-'+tab+'"></div>';}
  callAIStream(buildPrompt(tab,_aiCtx.r,_aiCtx.issues,_aiCtx.m),partial=>{
    const el=document.getElementById('ai-regen-stream-'+tab);
    if(el)el.textContent=partial;
  }).then(text=>{
    S.report[tab]=text;S.edited[tab]=false;saveReportToParent();
    if(tab==='executive'){const el=document.getElementById('ai-body-executive');if(el)el.innerHTML=`<div class="ai-text">${mdToHtml(text)}</div>`;}
    const el=document.getElementById('ai-body-'+tab+'-a');if(el)el.innerHTML=`<div class="ai-text">${mdToHtml(text)}</div>`;
    updateAIBadge(Object.values(S.edited).some(Boolean));
  }).catch((err)=>{console.error('Regeneration error:',err);const el=document.getElementById('ai-body-'+tab+'-a');if(el)el.innerHTML='<div class="ai-text" style="color:var(--gray-500)">Regeneration failed: '+(err.message||'Unknown error')+'. Try again.</div>';});
}

// ── UI ────────────────────────────────────────────────────────────────────────
function switchMode(mode,btn){
  // Warn only for real (non-demo) mid-assessment when switching away
  if(mode!=='diagnostic'&&!S.isDemo&&Object.keys(S.answers).length>0&&document.getElementById('diag-walk').style.display==='flex'){
    if(!confirm('You are mid-assessment. Your answers are auto-saved. Switch away?'))return;
  }
  // Hide diag sub-views before switching
  const walk=document.getElementById('diag-walk');
  const result=document.getElementById('diag-result');
  const setup=document.getElementById('diag-setup');
  if(mode!=='diagnostic'&&mode!=='report'){
    if(walk)walk.style.display='none';
    if(result)result.style.display='none';
    if(setup)setup.style.display='none';
  }
  document.querySelectorAll('.mode-tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  if(btn)btn.classList.add('active');
  // Handle report tab — show diag-result directly
  if(mode==='report'){
    document.getElementById('view-diagnostic').classList.add('active');
    const result=document.getElementById('diag-result');
    const walk=document.getElementById('diag-walk');
    const setup=document.getElementById('diag-setup');
    // If there is a report to show, go to it
    if(result&&(S.report?.executive||S.report?.diagnosis||Object.keys(S.answers).length>0||(S.demo&&S.overall))){
      if(setup)setup.style.display='none';
      if(walk)walk.style.display='none';
      if(result)result.style.display='block';
      setBack(true);
      if((Object.keys(S.answers).length>0||(S.demo&&S.overall))&&!S.report?.executive){showResult();}
    } else {
      // No report yet — show a clear empty state, not the setup form
      if(setup)setup.style.display='none';
      if(walk)walk.style.display='none';
      if(result)result.style.display='none';
      setBack(false);
      let placeholder=document.getElementById('report-empty-state');
      if(!placeholder){
        placeholder=document.createElement('div');
        placeholder.id='report-empty-state';
        placeholder.style.cssText='display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:48px 24px;text-align:center';
        placeholder.innerHTML=`
          <div style="width:48px;height:48px;border-radius:14px;background:var(--green-light);display:flex;align-items:center;justify-content:center;margin-bottom:20px">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          </div>
          <div style="font-size:15px;font-weight:600;color:var(--gray-700);margin-bottom:8px">No report yet</div>
          <div style="font-size:13px;color:var(--gray-500);max-width:280px;line-height:1.5;margin-bottom:24px">Complete a plant assessment first. The report generates automatically when you finish.</div>
          <button onclick="switchMode('diagnostic',document.querySelectorAll('.mode-tab')[0])" style="padding:11px 24px;background:var(--green);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font)">Start assessment →</button>
          <button onclick="startGuidedDemo()" style="margin-top:10px;padding:8px 16px;background:none;color:var(--green);border:1px solid var(--green-mid);border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;font-family:var(--font)">Try the demo instead</button>
        `;
        document.getElementById('view-diagnostic').appendChild(placeholder);
      }
      placeholder.style.display='flex';
    }
    return;
  }
  document.getElementById('view-'+mode).classList.add('active');
  if(mode==='simulator'){renderSimulator();setBack(false);}
  if(mode==='dashboard'){renderDashboard();setBack(false);}
  if(mode==='diagnostic'){
    const result=document.getElementById('diag-result');
    const walk=document.getElementById('diag-walk');
    const setup=document.getElementById('diag-setup');
    // Embedded mode with answers — always go to questions
    if(S._assessmentId&&Object.keys(S.answers).length>0){
      if(setup)setup.style.display='none';
      if(result)result.style.display='none';
      if(walk)walk.style.display='flex';
      setBack(true);renderSec();
    }
    // If mid-assessment (walk visible) — stay there
    else if(walk&&walk.style.display==='flex'){
      setBack(true);
    }
    // No active assessment
    else {
      // If demo context — restart guided demo directly
      if(S.isDemo){
        setTimeout(()=>startGuidedDemo(),0);
      } else {
        // Real user — show setup screen to enter plant details
        if(setup)setup.style.display='block';
        if(walk)walk.style.display='none';
        if(result)result.style.display='none';
        setBack(false);
      }
    }
  }
}

function startDiag(){
  const pl=document.getElementById('s-pl').value.trim();
  const ct=document.getElementById('s-ct').value.trim();
  let valid=true;
  if(!pl){document.getElementById('err-s-pl').style.display='block';document.getElementById('s-pl').style.borderColor='var(--red)';valid=false;}
  if(!ct){document.getElementById('err-s-ct').style.display='block';document.getElementById('s-ct').style.borderColor='var(--red)';valid=false;}
  if(!valid){if(!pl)document.getElementById('s-pl').focus();return;}
  const season=document.getElementById('s-season')?.value||'peak';

  // Check if a baseline exists for this plant name
  const stored=JSON.parse(localStorage.getItem('alcem_v4')||'[]');
  const baseline=stored.find(a=>a.plant===pl&&a.isBaseline&&a.answers);

  const prevId=S._assessmentId;S={sec:0,answers:{},meta:{company:document.getElementById('s-co').value.trim(),plant:pl,country:ct,analyst:document.getElementById('s-an').value.trim(),date:document.getElementById('s-dt').value,season},report:{},edited:{},visited:{},baseline:baseline||null};if(prevId)S._assessmentId=prevId;

  localStorage.removeItem('alcem_draft');
  document.getElementById('topbar-meta').textContent=pl+' — '+ct;
  document.getElementById('diag-setup').style.display='none';
  document.getElementById('diag-walk').style.display='flex';
  setBack(true);

  if(baseline){
    // Show re-visit banner in sidebar area briefly
    const main=document.getElementById('diag-main');
    main.innerHTML=`<div style="background:var(--green-pale);border:1px solid #9FE1CB;border-radius:var(--radius-lg);padding:20px 22px;margin-bottom:16px">
      <div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--green);margin-bottom:6px">Re-visit detected</div>
      <div style="font-size:15px;font-weight:500;color:var(--gray-900);margin-bottom:4px">${pl}</div>
      <div style="font-size:12px;color:var(--gray-500);margin-bottom:14px">Baseline from ${baseline.date?new Date(baseline.date).toLocaleDateString('en-GB'):'previous visit'} · Previous score: ${baseline.overall||'—'}/100</div>
      <div style="font-size:13px;color:var(--gray-700);margin-bottom:16px">Previous answers are shown as hints in each field. Enter the new values — any differences will appear in the delta report.</div>
      <button onclick="startGuidedMode()" style="padding:10px 20px;background:var(--green);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font)">Start guided re-visit →</button>
      <button onclick="renderSec()" style="padding:8px 16px;background:var(--white);color:var(--gray-600);border:1px solid var(--gray-300);border-radius:8px;font-size:12px;cursor:pointer;font-family:var(--font);margin-left:8px">Full question set</button>
    </div>`;
  } else {
    startGuidedMode();
  }
}

function renderSec(){
  if(!S.visited)S.visited={};
  S.visited[S.sec]=true;
  renderSidebar();
  const sec=SECTIONS[S.sec];
  const visQs=getVisibleQs(sec);
  // Skip sections with no visible questions in current phase
  if(visQs.length===0){
    const dir=S._lastDir||1;
    if(dir>0&&S.sec<SECTIONS.length-1){S.sec++;renderSec();return;}
    if(dir<0&&S.sec>0){S.sec--;renderSec();return;}
  }
  const visTotal=getVisibleTotal();
  const answered=Object.keys(S.answers).filter(k=>S.answers[k]!==undefined&&S.answers[k]!=='').length;
  const visAnswered=visQs.filter(q=>S.answers[q.id]!==undefined&&S.answers[q.id]!=='').length;
  const allVisAnswered=SECTIONS.reduce((s,sec)=>s+getVisibleQs(sec).filter(q=>S.answers[q.id]!==undefined&&S.answers[q.id]!=='').length,0);
  const isLast=S.sec===SECTIONS.length-1;
  const phase=S._phase||'full';
  const phaseLabel=phase==='workshop'?' — Pre-assessment (remote)':phase==='onsite'?' — On-site diagnostic':'';
  const nextLabel=isLast?(phase==='workshop'?'Complete pre-assessment →':'Generate report →'):'Next section →';
  const main=document.getElementById('diag-main');
  main.scrollTop=0;window.scrollTo(0,0);
  main.innerHTML=`
    ${phaseLabel?`<div style="margin-bottom:12px;padding:6px 12px;background:${phase==='workshop'?'#EBF5FB':'#FEF9E7'};border:1px solid ${phase==='workshop'?'#AED6F1':'#F9E79F'};border-radius:8px;font-size:12px;color:${phase==='workshop'?'#2471A3':'#B7950B'};font-weight:500">${phase==='workshop'?'📋 Phase 1: Pre-assessment — data collection (remote)':'🏭 Phase 2: On-site diagnostic — plant observation & validation'}</div>`:''}
    <div class="prog-bar"><div class="prog-track"><div class="prog-fill" id="pf" style="width:${Math.round(allVisAnswered/visTotal*100)}%"></div></div><div class="prog-lbl" id="prog-lbl">${allVisAnswered} / ${visTotal}</div></div>
    <div style="margin-bottom:16px"><div style="font-size:18px;font-weight:500;margin-bottom:3px">${sec.label}</div><div style="font-size:13px;color:var(--gray-500)">${visQs.length} questions${visQs.some(q=>q.field)?' — field notes shown in amber':''}</div></div>
    ${visQs.map((q,i)=>renderQ(q,i)).join('')}
    <div id="score-live-wrap"></div>
    <div class="nav-row"><button class="btn-back" style="display:${S.sec===0?'none':'block'}" onclick="goBack()">← Back</button><button class="btn-next" onclick="goNext()">${nextLabel}</button></div>`;
  updateLiveScores();
}

function renderSidebar(){
  const sb=document.getElementById('diag-sidebar');sb.innerHTML='';
  if(S.guidedMode){
    sb.innerHTML=`<div style="padding:12px 8px;font-size:11px;color:var(--gray-400);text-align:center;line-height:1.5">Guided<br>visit mode</div>
    <button onclick="switchToFullMode()" style="width:100%;padding:7px 8px;font-size:10px;color:var(--green);background:none;border:1px solid var(--green-mid);border-radius:6px;cursor:pointer;font-family:var(--font);margin-top:4px">Full set →</button>`;
    return;
  }
  SECTIONS.forEach((sec,i)=>{
    const visQs=getVisibleQs(sec);
    if(visQs.length===0)return; // Hide sections with no visible questions
    const done=secDone(i);const d=document.createElement('div');
    d.className=`si ${i===S.sec?'active':''} ${done&&i!==S.sec?'done':''}`;
    d.innerHTML=`<div class="si-check">${done?'✓':''}</div><span>${sec.label}</span>`;
    d.onclick=()=>{S.sec=i;renderSec();};sb.appendChild(d);
  });
}

function secDone(i){
  if(!S.visited)S.visited={};
  if(!S.visited[i])return false;
  return getVisibleQs(SECTIONS[i]).filter(q=>q.req).every(q=>S.answers[q.id]!==undefined&&S.answers[q.id]!=='');
}

function renderQ(q,i){
  const val=S.answers[q.id];
  const prev=S.baseline?.answers?.[q.id];
  const hasPrev=prev!==undefined&&prev!=='';
  let inp='';
  if(q.type==='num'){
    const changed=hasPrev&&val!==undefined&&val!==''&&parseFloat(val)!==parseFloat(prev);
    const delta=changed?parseFloat(val)-parseFloat(prev):null;
    inp=`<input class="q-inp" type="number" id="inp-${q.id}" value="${val||''}" placeholder="—" oninput="save('${q.id}',this.value)" data-qid="${q.id}" inputmode="decimal">
    <div class="q-unit">${q.unit}${hasPrev?` <span style="color:var(--gray-300);font-size:10px;margin-left:8px">Last visit: <strong style="color:${changed?(delta>0?'var(--red)':'var(--green-mid)'):'var(--gray-400)'}">${prev}</strong>${delta!==null?' ('+( delta>0?'+':'')+delta+')':''}</span>`:''}</div>
    <div class="val-warn" id="vw-${q.id}" style="display:none;margin-top:5px;padding:5px 9px;background:var(--amber-light);border:1px solid #f9e4a0;border-radius:6px;font-size:11px;color:#7a5c00"></div>
    <div class="live-box" id="li-${q.id}"><div class="live-lbl">Live impact</div><div class="live-val" id="liv-${q.id}"></div></div>`;
  }else if(q.type==='opts'){
    inp=`<div class="opts">${q.opts.map(o=>{
      const isSelected=val===o;
      const wasPrev=hasPrev&&prev===o;
      return`<button class="opt ${isSelected?'sel':''}" onclick="saveOpt('${q.id}','${o}',this)" style="${wasPrev&&!isSelected?'border-style:dashed;color:var(--gray-400)':''}" title="${wasPrev?'Last visit: '+o:''}">${o}${wasPrev&&!isSelected?' ↩':''}</button>`;
    }).join('')}</div>
    ${hasPrev&&val&&val!==prev?`<div style="font-size:11px;color:var(--gray-400);margin-top:4px">Last visit: <em>${prev}</em></div>`:''}
    <div class="live-box" id="li-${q.id}"><div class="live-lbl">Live impact</div><div class="live-val" id="liv-${q.id}"></div></div>`;
  }else{
    inp=`<textarea class="obs-area" id="inp-${q.id}" placeholder="Write their exact words — do not paraphrase…" oninput="save('${q.id}',this.value)">${val||''}</textarea>
    ${hasPrev?`<div style="font-size:11px;color:var(--gray-400);margin-top:4px">Last visit: <em>"${prev}"</em></div>`:''}`;
  }
  const infoBtn=q.info?`<button class="info-btn" onclick="toggleInfo('${q.id}')" title="More info" aria-label="More information about this question">i</button>`:''
;  const infoPanel=q.info?`<div class="info-panel" id="ip-${q.id}">
    <div class="info-section"><div class="info-section-label">What</div>${q.info.what}</div>
    <div class="info-section"><div class="info-section-label">Why it matters</div>${q.info.why}</div>
    <div class="info-section"><div class="info-section-label">${q.info.calc.startsWith('Not')||q.info.calc.startsWith('Qualitative')?'How used':'Calculation'}</div>${q.info.calc}</div>
  </div>`:'';
  const howtoPanel=q.howto?`<div style="margin-top:6px">
    <button onclick="event.stopPropagation();toggleInfo('howto-${q.id}')" style="font-size:11px;color:var(--green);background:none;border:none;cursor:pointer;padding:0;font-family:var(--font);font-weight:500;text-align:left">How to get this number ▾</button>
    <div class="info-panel" id="ip-howto-${q.id}" style="margin-top:6px;background:var(--green-pale);border-color:#9FE1CB;font-size:12px;line-height:1.65">${q.howto}</div>
  </div>`:'';
  const answered=val!==undefined&&val!=='';
  // Build translate question text: label + hint combined, stripped of HTML
  const qTextForTranslation=(q.label+(q.hint?' — '+q.hint:'')).replace(/<[^>]*>/g,'');
  const ftBtnHtml=`<button class="ft-btn" id="ft-btn-${q.id}" onclick="ftTranslateQ('${q.id}',\`${qTextForTranslation.replace(/`/g,"'").replace(/\n/g,' ')}\`)" style="display:none">🌐 <span id="ft-btn-label-${q.id}">Translate &amp; read aloud</span></button><div class="ft-panel" id="ft-panel-${q.id}"></div>`;
  return`<div class="q-card" id="qcard-${q.id}"><div class="q-head"><div class="q-idx" style="${answered?'color:var(--green-mid)':''}">${answered?'✓':'Q'+(i+1)}</div><div style="flex:1"><div class="q-label">${q.label}${q.req?'<span class="q-req"> *</span>':''}${infoBtn}</div>${q.hint?`<div class="q-hint">${q.hint}</div>`:''}${q.field?`<div class="q-field">On-site: ${q.field}</div>`:''}</div></div><div class="q-body">${inp}${howtoPanel}${infoPanel}${ftBtnHtml}</div></div>`;
}

function toggleInfo(id){
  const target=document.getElementById('ip-'+id);
  if(!target)return;
  const isOpen=target.classList.contains('open');
  // Close all open info panels
  document.querySelectorAll('.info-panel.open').forEach(p=>p.classList.remove('open'));
  // Open the target if it was closed
  if(!isOpen)target.classList.add('open');
}

// Close all info panels when clicking outside
document.addEventListener('click',function(e){
  if(!e.target.closest('.info-btn')&&!e.target.closest('.info-panel')&&!e.target.closest('[onclick*="toggleInfo"]')){
    document.querySelectorAll('.info-panel.open').forEach(p=>p.classList.remove('open'));
  }
});

// Numeric validation rules — [min, max, warningMessage]
const NUM_RULES={
  price_m3:      [20,  200,  'Selling price outside typical GCC range ($20–$200/m³). Double-check.'],
  cement_cost:   [10,  120,  'Cement cost per m³ seems unusual. Typical: $10–$120/m³.'],
  aggregate_cost:[0,   60,   'Aggregate cost seems high. Typical GCC: $0–$60/m³.'],
  admix_cost:    [0,   25,   'Admixture cost seems high. Typical: $0–$25/m³.'],
  op_days:       [180, 365,  'Operating days should be 180–365/year for a GCC plant.'],
  n_trucks:      [1,   80,   'Truck count outside realistic range (1–80). Verify.'],
  mixer_capacity:[4,   12,   'Mixer capacity typically 4–12 m³. Default 7 m³ if unsure.'],
  turnaround:    [30,  240,  'Turnaround 30–240 min. GCC best practice: 75–90 min.'],
  deliveries_day:[1,   200,  'Deliveries/day outside realistic range (1–200). Verify.'],
  plant_cap:     [20,  500,  'Designed capacity unusual. Typical GCC batch plant: 60–300 m³/hr.'],
  op_hours:      [4,   24,   'Operating hours/day should be 4–24.'],
  actual_prod:   [100, 60000,'Monthly production outside realistic range. Check figure.'],
  reject_pct:    [0,   30,   'Reject % should be 0–30%. Above 10% is a critical signal.'],
  delivery_radius:[1,  80,   'Delivery radius should be 1–80 km. Above 30 km will significantly impact turnaround time.'],
  high_strength_price:[0,60, 'C35+ price premium typically $0-60/m³ over C25 in GCC.'],
  fuel_per_delivery:[0,80,  'Fuel cost per delivery typically $2-80. Check diesel price and trip distance.'],
  water_cost:[0,10,         'Water cost per m³ of concrete typically $0-10.'],
  truck_availability:[1,200,'Truck availability cannot exceed total fleet size.'],
  qualified_drivers:[0,200, 'Qualified drivers should not exceed total truck count significantly.'],
  site_wait_time:[0,180,    'Site wait time typically 10-120 min. Above 90 min is a critical finding.'],
  partial_load_size:[1,12,  'Average load size should be between 1 and 12 m³.'],
  truck_breakdowns:[0,50,   'Truck breakdowns per month above 20 is unusual — verify.'],
  top_customer_pct:[1,100,  'Customer concentration should be 1-100%.'],
};

function applyValidation(id,val){
  const rule=NUM_RULES[id];
  const warn=document.getElementById('vw-'+id);
  if(!rule||!warn)return;
  const n=parseFloat(val);
  if(val===''||val===undefined||isNaN(n)){warn.style.display='none';return;}
  if(n<rule[0]||n>rule[1]){warn.textContent='⚠ '+rule[2];warn.style.display='block';}
  else{warn.style.display='none';}
}

function save(id,val){
  S.answers[id]=val;
  applyValidation(id,val);
  const card=document.getElementById('qcard-'+id);
  if(card)card.classList.toggle('is-answered',val!==undefined&&val!=='');
  updateProgress();calcLive(id);updateLiveScores();autosaveDraft();
}
function saveOpt(id,val,el){

  if(card)card.classList.add('is-answered');

}
