// ── BUILD ISSUES — extracted for reuse in guided preview ─────────────────────
function buildIssues(r, a) {
  const issues=[];
  // Primary bottleneck issue always built first — pinned to top regardless of dollar value
  const bottleneckIssue=r.bottleneck;

  // Turnaround: show as standalone finding only if fleet is bottleneck
  // Otherwise it feeds into dispatch loss (already included there) — shown as context not separate finding
  if(r.ta>r.TARGET_TA&&bottleneckIssue==='Logistics'||bottleneckIssue==='Fleet'){
    issues.push({sev:'red',pin:true,t:`Truck turnaround ${r.ta} min — ${Math.round((r.ta-r.TARGET_TA)/r.TARGET_TA*100)}% above ${r.TARGET_TA}-min target`,action:`Require site readiness confirmation before trucks depart`,rec:`Trucks should only depart when the site confirms the pump crew is ready. Closing this gap recovers ${fmt(r.turnaroundLeakMonthly)}/month.`,loss:r.turnaroundLeakMonthly,formula:`(${r.excessMin} excess min ÷ ${r.ta} actual min) × ${r.realisticMaxDel} target del × ${r.mixCap} m³ × $${Math.round(r.contrib)} margin × ${Math.round(r.opD/12)} days/month`});
  }
  if(r.scores.dispatch!==null&&r.scores.dispatch<65){
    // Dispatch loss includes turnaround component — do not double-count turnaround separately
    const loss=r.turnaroundLeakMonthly+Math.round(r.capLeakMonthly*0.35);
    // Dynamic sub-score breakdown — show which dispatch factor is weakest
    const dSubScores=[
      {label:'Order to dispatch',val:{'Under 15 minutes \u2014 fast response':100,'15 to 25 minutes \u2014 acceptable':70,'25 to 40 minutes \u2014 slow':40,'Over 40 minutes \u2014 critical bottleneck':10}[a.order_to_dispatch],weight:'40%'},
      {label:'Route clustering',val:{'Always \u2014 formal zone system in place':100,'Usually \u2014 informal grouping most of the time':75,'Sometimes \u2014 depends on the dispatcher':45,'Rarely or never':15}[a.route_clustering],weight:'25%'},
      {label:'Plant idle time',val:{'Never \u2014 a truck is always available':100,'Occasionally \u2014 a few times per week':70,'Regularly \u2014 most busy periods':40,'Every day \u2014 always waiting for trucks':10}[a.plant_idle],weight:'20%'},
      {label:'Dispatch tool',val:{'Dedicated dispatch software with real-time tracking':100,'Spreadsheet combined with WhatsApp':65,'WhatsApp messages only \u2014 no spreadsheet':35,'Phone calls and a whiteboard or paper list':10}[a.dispatch_tool],weight:'15%'},
    ].filter(x=>x.val!==undefined);
    const weakest=dSubScores.length?dSubScores.slice().sort((a,b)=>a.val-b.val)[0]:null;
    const breakdown=dSubScores.map(s=>`${s.label}: ${s.val}/100 (${s.weight})`).join(' · ');
    const taSuffix=r.ta>r.TARGET_TA?' Turnaround excess of '+r.excessMin+' min is included in the dollar estimate.':'';
    const dispRec=weakest
      ?`Weakest factor: ${weakest.label} (${weakest.val}/100) — start here. Full breakdown: ${breakdown}${taSuffix}`
      :`Review dispatch process across all four factors: order-to-dispatch time, route clustering, plant idle time, and dispatch tool.${taSuffix}`;
    issues.push({sev:'red',pin:bottleneckIssue==='Dispatch',t:`Dispatch score ${r.scores.dispatch}/100 — primary bottleneck`,action:`Measure order-to-dispatch time daily — target under 15 min`,rec:dispRec,loss,formula:`Turnaround loss (${fmt(r.turnaroundLeakMonthly)}) + 35% of capacity gap (${fmt(Math.round(r.capLeakMonthly*0.35))}). Turnaround: (${r.excessMin} min ÷ ${r.ta} min) × ${r.realisticMaxDel} del × ${r.mixCap} m³ × $${Math.round(r.contrib)} × ${Math.round(r.opD/12)} days`});
    // Show turnaround as a supporting finding (no separate dollar amount to avoid double-count)
    if(r.ta>r.TARGET_TA&&bottleneckIssue!=='Fleet'){
      issues.push({sev:'amber',pin:false,t:`Truck turnaround ${r.ta} min — ${Math.round((r.ta-r.TARGET_TA)/r.TARGET_TA*100)}% above ${r.TARGET_TA}-min target (included in dispatch estimate)`,action:`Require site readiness confirmation before trucks depart`,rec:`Trucks should only depart when the site confirms readiness. Fastest lever inside the dispatch bottleneck.`,loss:0});
    }
  } else if(r.ta>r.TARGET_TA){
    issues.push({sev:'red',pin:bottleneckIssue==='Logistics'||bottleneckIssue==='Fleet',t:`Truck turnaround ${r.ta} min — ${Math.round((r.ta-r.TARGET_TA)/r.TARGET_TA*100)}% above ${r.TARGET_TA}-min target`,action:`Require site readiness confirmation before trucks depart`,rec:`Trucks should only depart when the site confirms the pump crew is ready. Closing this gap recovers ${fmt(r.turnaroundLeakMonthly)}/month.`,loss:r.turnaroundLeakMonthly,formula:`(${r.excessMin} excess min ÷ ${r.ta} actual min) × ${r.realisticMaxDel} target del × ${r.mixCap} m³ × $${Math.round(r.contrib)} margin × ${Math.round(r.opD/12)} days/month`});
  }
  if(r.util<0.82&&r.actual>0){issues.push({sev:'red',pin:bottleneckIssue==='Production',t:`Plant running at ${Math.round(r.util*100)}% — ${Math.round((0.92-r.util)*100)} points below 92% target`,action:`Map peak demand window and pre-stage batching 30 min before`,rec:'Check batch cycle time and aggregate feed rate. Pre-staging batching before peak hours is the fastest lever.',loss:r.capLeakMonthly,formula:`(${r.cap} designed − ${r.actual.toFixed(1)} actual m³/hr) × ${r.opH} hr × ${Math.round(r.opD/12)} days/month × $${Math.round(r.contrib)} margin = ${fmt(r.capLeakMonthly)}/month`});}
  if(r.hiddenDel>0){issues.push({sev:'amber',pin:false,t:`${r.hiddenDel} deliveries/day unrealised — fleet target ${r.realisticMaxDel}, actual ${r.delDay}`,action:`Fix dispatch and turnaround first — no new trucks needed`,rec:`No new trucks needed. Gap closes when turnaround hits ${r.TARGET_TA} min target and dispatch is at 85% fleet utilisation.`,loss:r.hiddenRevMonthly,formula:`${r.trucks} trucks × (${r.opH} hr × 60 ÷ ${r.TARGET_TA} min target) × 85% = ${r.realisticMaxDel} del. Gap: ${r.realisticMaxDel} − ${r.delDay} = ${r.hiddenDel} × ${r.mixCap} m³ × $${Math.round(r.contrib)} × ${Math.round(r.opD/12)} days`});}
  if(r.rejectPct>1.5){issues.push({sev:'amber',pin:false,t:`${r.rejectPct}% of loads rejected — every rejection is a 100% write-off`,action:`Run slump test on every load before dispatch`,rec:'Calibrate water-cement ratio sensors monthly. One rejected load costs the full selling price, not just margin.',loss:r.rejectLeakMonthly,formula:`${r.rejectPct}% ÷ 100 × ${r.delDay} del/day × ${r.mixCap} m³ × $${r.price} selling price × ${Math.round(r.opD/12)} days (uses price not margin: rejected load = 100% write-off)`});}
  if(a.mix_split==='Not sure — no visibility on production mix by strength class'){issues.push({sev:'amber',pin:false,t:'No visibility on production mix by strength class',action:'Map monthly volume by strength class: C20, C25, C30, C35+',rec:'The split between standard and high-strength concrete determines real margin. Without this data, contribution margin calculations are approximate.',loss:0});}
  if(a.mix_split==='Mostly standard strength — over 70% is C20 to C30'&&r.contrib>0&&r.contrib<20){issues.push({sev:'amber',pin:false,t:'Over 70% standard-grade production — margin improvement available',action:'Get one price quote for C35+ from your top 3 customers',rec:'C35+ mixes command 15–30% price premium with moderate cement cost increase. Shifting 20% of production could materially improve margin.',loss:0});}
  if(r.mixMarginLift>0.5){issues.push({sev:'amber',pin:false,t:`Mix opportunity — C35+ premium adds ${fmt(Math.round(r.mixMarginLift*r.monthlyM3))}/mo at current volume`,action:`Verify C35+ demand with top customers before shifting production mix`,rec:`Current blended margin: $${Math.round(r.mixWeightedContrib)}/m³. Shifting to ${Math.round(r.hsFraction*100)}% C35+ at $${a.high_strength_price}/m³ premium adds +$${r.mixMarginLift.toFixed(2)}/m³. Confirm market demand before committing.`,loss:0});}
  if(a.silo_days==='Under 2 days — high supply risk'){issues.push({sev:'red',pin:false,t:'Cement stock under 2 days — one missed delivery stops the plant',action:`Call your cement supplier today — negotiate a standing delivery schedule`,rec:'A single missed delivery at this stock level halts production entirely. Target: 5-day minimum buffer.',loss:0});}
  if(a.silo_days==='2 to 5 days — tight, supply-sensitive'){issues.push({sev:'amber',pin:false,t:'Cement stock 2–5 days — vulnerable to supply disruption',action:`Increase reorder point — extend to 7+ days before Ramadan and public holidays`,rec:'Irregular delivery schedules around public holidays and Ramadan create real stoppage risk at this buffer level.',loss:0});}
  if((a.ramadan_schedule==='No — same schedule year-round')&&(S.meta?.country==='Saudi Arabia'||S.meta?.country==='Bahrain'||S.meta?.country==='UAE'||S.meta?.country==='Kuwait'||S.meta?.country==='Qatar')){
    const ramadanLoss=r.delDay>0&&r.contrib>0?Math.round(r.delDay*r.mixCap*r.contrib*(30/365)*0.20):0;
    issues.push({sev:'amber',pin:false,t:'No Ramadan schedule — missing the early-morning peak window',action:`Shift first dispatch to 05:30, complete major pours before 11:00`,rec:'Plants without a Ramadan schedule typically lose 15–25% of Ramadan revenue through mid-morning idle time.',loss:ramadanLoss,formula:`${r.delDay} del/day × ${r.mixCap} m³ × $${Math.round(r.contrib)} margin × 30 days × 20% missed morning window = ${fmt(ramadanLoss)} (conservative estimate)`});
  }




  // Truck availability
  if(r.availRate<0.85&&r.operativeTrucks>0&&r.trucks>0){
    const offRoad=r.trucks-r.operativeTrucks;
    issues.push({sev:r.availRate<0.70?'red':'amber',pin:false,
      t:`Fleet availability ${Math.round(r.availRate*100)}% — ${offRoad} truck${offRoad>1?'s':''} regularly off-road`,
      action:`Set daily availability target of 90%+ — track off-road trucks on a whiteboard`,
      rec:`Effective fleet is ${r.operativeTrucks} trucks, not ${r.trucks}. All capacity figures are based on operative fleet. Improving availability to 90% adds ${Math.floor(r.trucks*0.9)-r.operativeTrucks} trucks back to daily capacity.`,
      loss:r.hiddenRevMonthly>0?Math.round((1-r.availRate)*r.hiddenRevMonthly):0});
  }

  // Washout time
  if(a.washout_time==='20 to 30 minutes — slow'||a.washout_time==='Over 30 minutes — significant bottleneck'){
    const wMin=a.washout_time==='Over 30 minutes — significant bottleneck'?35:25;
    const wLoss=r.operativeTrucks>0&&r.contrib>0?Math.round((wMin-15)/60*r.operativeTrucks*r.delDay/r.operativeTrucks*r.mixCap*r.contrib*(r.opD/12)):0;
    issues.push({sev:'amber',pin:false,
      t:`Washout takes ${a.washout_time.split(' —')[0].toLowerCase()} — recoverable idle time`,
      action:`Install dedicated washout bay with high-pressure water supply`,
      rec:`Reducing washout to 10–15 min frees ${wMin-15} min per truck per cycle. On ${r.operativeTrucks} trucks this adds meaningful daily capacity.`,
      loss:wLoss});
  }

  // Site wait time + demurrage
  if(r.siteWait>45){
    issues.push({sev:'amber',pin:false,
      t:`Site wait time ${r.siteWait} min — trucks held ${r.siteWait-40} min above 40-min target`,
      action:`Require site readiness confirmation before dispatching — implement a pre-pour checklist`,
      rec:`Trucks should only depart when the site confirms pump crew and foreman are ready. Each ${r.siteWait-40} excess minutes per delivery costs real capacity.`,
      loss:r.demurrageOpportunity>0?r.demurrageOpportunity:0,
      formula:r.demurrageOpportunity>0?`MAX(0, ${r.siteWait}−40 min) ÷ ${r.ta} min × ${r.realisticMaxDel} del × ${r.mixCap} m³ × $${Math.round(r.contrib)} × ${Math.round(r.opD/12)} days`:''});
  }
  if(r.demurrageOpportunity>0&&(a.demurrage_policy==='Clause exists but rarely enforced')){
    issues.push({sev:'amber',pin:false,
      t:`Demurrage clause exists but not enforced — ${fmt(r.demurrageOpportunity)}/month unrecovered`,
      action:`Start invoicing demurrage on all site delays over 40 minutes`,
      rec:`The clause is in your contracts. You are absorbing the full cost of contractor delays. Enforcing it consistently recovers revenue and changes contractor behaviour.`,
      loss:r.demurrageOpportunity});
  }
  if(r.demurrageOpportunity>0&&(a.demurrage_policy==='No demurrage charge in contracts'||a.demurrage_policy==='Not sure')){
    issues.push({sev:'amber',pin:false,
      t:`No demurrage policy — site delays absorbed entirely by plant`,
      action:`Add a demurrage clause to all new and renewed contracts`,
      rec:`Estimated monthly exposure from site wait time above 40 min: ${fmt(r.demurrageOpportunity)}. A standard clause of $2/min beyond the agreed window is common in GCC ready-mix contracts.`,
      loss:r.demurrageOpportunity});
  }

  // Truck breakdowns + maintenance
  if(r.truckBreakdowns>2||(a.maint_programme==='Reactive only — trucks are repaired when they break down'||a.maint_programme==='No maintenance programme')){
    const bSev=r.truckBreakdowns>4?'red':'amber';
    issues.push({sev:bSev,pin:false,
      t:r.truckBreakdowns>0?`${r.truckBreakdowns} truck breakdown${r.truckBreakdowns>1?'s':''} last month — reactive maintenance costing ${fmt(r.breakdownCostMonthly)}/month`:'Reactive-only maintenance — breakdown risk unquantified',
      action:`Implement monthly truck service schedule — tyres, drum, hydraulics, engine`,
      rec:`Reactive maintenance costs 3–5× more over a fleet's lifetime. A basic monthly service schedule reduces unplanned downtime by 50–70%. At ${r.truckBreakdowns} breakdowns last month, estimated monthly capacity loss: ${fmt(r.breakdownCostMonthly)}.`,
      loss:r.breakdownCostMonthly});
  }

  // Return liability
  if(r.rejectPct>1.5&&(a.return_liability==='Plant always absorbs the cost'||a.return_liability==='No clear policy')){
    issues.push({sev:'amber',pin:false,
      t:`Plant absorbs all reject costs — no contractor liability for returns`,
      action:`Add material cost recovery clause to all delivery contracts`,
      rec:`At ${r.rejectPct}% reject rate, the plant bears 100% of material costs on every returned load. A standard liability clause shifts provable contractor-caused returns to the contractor.`,
      loss:0});
  }

  // Operator backup risk
  if(a.operator_backup==='No — only one person can run the batch plant'||a.operator_backup==='Not sure'){
    const dailyRev=r.delDay>0&&r.price>0?Math.round(r.delDay*r.mixCap*r.price):0;
    issues.push({sev:'red',pin:false,
      t:'Single-operator dependency — plant cannot run if batch operator is absent',
      action:`Train a backup operator within 30 days — target: fully independent within 60`,
      rec:`Daily revenue at risk if operator is absent: ${fmt(dailyRev)}. This is one of the most common causes of unplanned multi-day shutdowns in GCC plants. No additional cost — train the most experienced loader or mixer hand.`,
      loss:0});
  }

  // Customer concentration
  if(r.topCustPct>50){
    issues.push({sev:'red',pin:false,
      t:`${r.topCustPct}% of volume from single customer — critical revenue concentration`,
      action:`Begin active outreach to 3 new contractors this month`,
      rec:`Monthly revenue at risk if this customer is lost: ${fmt(r.concentrationRisk)}. A single contract dispute, project completion, or competitor price cut would be existential. Diversification is the only mitigation.`,
      loss:0});
  } else if(r.topCustPct>30){
    issues.push({sev:'amber',pin:false,
      t:`${r.topCustPct}% of volume from single customer — concentration risk`,
      action:`Identify and pursue 2–3 alternative contractors`,
      rec:`Monthly revenue from top customer: ${fmt(r.concentrationRisk)}. Not critical yet, but worth actively diversifying over the next 6 months.`,
      loss:0});
  }

  // Cement optimisation
  if(r.cementOptOpp>0){
    issues.push({sev:'amber',pin:false,
      t:`Mix designs not reviewed in ${a.mix_design_review==='Never formally reviewed — original designs still in use'?'years (never formally reviewed)':a.mix_design_review.toLowerCase()} — likely excess cement cost`,
      action:`Commission a mix design review from a qualified concrete technologist`,
      rec:`Plants using admixtures only for workability typically carry 8–15% excess cement. At your current volumes, an 8% cement reduction saves an estimated ${fmt(r.cementOptOpp)}/month. A mix design review typically costs $2,000–5,000 and pays back within weeks.`,
      loss:r.cementOptOpp,
      formula:`${(+a.cement_cost||0).toFixed(2)} cement $/m³ × 8% reduction × ${r.monthlyM3} m³/month = ${fmt(r.cementOptOpp)}/month`});
  }

  // Partial load issue
  if(r.partialLeakMonthly>0){
    issues.push({sev:'amber',pin:false,
      t:`Average load ${r.partialLoad} m³ on ${r.mixCap} m³ trucks — ${Math.round((1-r.partialRatio)*100)}% capacity unused per trip`,
      action:`Consolidate small orders — minimum batch size policy or surcharge below ${Math.round(r.mixCap*0.8)} m³`,
      rec:`Every trip below ${Math.round(r.mixCap*0.8)} m³ drives the same truck cost for less revenue. Introducing a minimum order size or small-load surcharge recovers ${fmt(r.partialLeakMonthly)}/month.`,
      loss:r.partialLeakMonthly,
      formula:`(${r.mixCap} capacity − ${r.partialLoad} avg load) × ${r.delDay} del/day × $${Math.round(r.contrib)} margin × ${Math.round(r.opD/12)} days/month`});
  }

  // Surplus concrete issue
  if(r.surplusLeakMonthly>0&&r.surplusMid>=0.35){
    issues.push({sev:r.surplusMid>=0.75?'red':'amber',pin:false,
      t:`${r.surplusMid} m³ surplus concrete wasted per trip — ${fmt(r.surplusLeakMonthly)}/month in raw material cost`,
      action:`Calibrate batch volumes to order size — train operators to batch to 102% of order, not 110%`,
      rec:`Over-batching by ${r.surplusMid} m³ per trip wastes cement, aggregates, and admixtures already consumed. Tighter batch calibration reduces this to under 0.2 m³ at most well-run plants.`,
      loss:r.surplusLeakMonthly,
      formula:`${r.surplusMid} m³ surplus × ${r.delDay} del/day × $${r.price} selling price × ${Math.round(r.opD/12)} days/month`});
  }

  // Reject cause contextual flags
  if(r.rejectPct>1.5&&a.reject_cause==='Rejection not tracked — unknown'){
    issues.push({sev:'amber',pin:false,
      t:'Rejections not tracked — cause unknown, improvement impossible',
      action:'Start logging every rejection with cause code from tomorrow',
      rec:'You cannot reduce what you do not measure. A simple cause code on each return ticket (heat, site, QC, dispute) costs nothing and reveals the fix within 30 days.',
      loss:0});
  }
  if(r.rejectPct>1.5&&a.reject_cause==='Heat and stiffening during transit'){
    issues.push({sev:'amber',pin:false,
      t:'Heat stiffening causing rejections — retarder dosage needs review',
      action:'Increase retarder dosage on loads with transit time over 45 min',
      rec:'In GCC summer conditions, concrete stiffens 30–40% faster than at 25°C. Retarder adjustment to mix design for long-haul loads is the standard fix. Review with your admixture supplier.',
      loss:0});
  }
  if(r.rejectPct>1.5&&a.reject_cause==='Site not ready — pump or crew unavailable'){
    issues.push({sev:'amber',pin:false,
      t:'Site unreadiness causing rejections — a dispatch and demurrage problem',
      action:'Implement pre-departure site readiness call — truck does not leave until site confirms ready',
      rec:'If the site is not ready when the truck arrives, the concrete stiffens and the load is rejected. The fix is not at the plant — it is in dispatch protocol and contract enforcement.',
      loss:0});
  }

  // Fuel cost issue
  if(r.fuelPerDel>0&&r.fuelMarginImpact>0.15){
    issues.push({sev:'amber',pin:false,
      t:`Fuel cost $${r.fuelPerDel}/delivery — ${Math.round(r.fuelMarginImpact*100)}% of contribution margin`,
      action:`Review delivery radius and route efficiency — fuel is eroding margin`,
      rec:`Monthly fleet fuel cost: ${fmt(r.fuelMonthly)}. At ${Math.round(r.fuelMarginImpact*100)}% of margin, fuel is a significant cost that may not be fully reflected in pricing. Review whether fuel costs are factored into your price per m³.`,
      loss:0,
      formula:`$${r.fuelPerDel} per delivery ÷ ${r.mixCap} m³ = $${r.fuelPerM3.toFixed(2)}/m³ fuel cost. ${Math.round(r.fuelMarginImpact*100)}% of $${Math.round(r.contrib)} contribution margin.`});
  }

  // Atypical month warning
  if(r.atypicalMonth){
    issues.push({sev:'amber',pin:false,
      t:`Figures based on atypical month — all dollar estimates are directional only`,
      action:`Verify key figures against a normal month before presenting to plant owner`,
      rec:`Last month was reported as: "${a.typical_month}". All monthly revenue and loss figures in this report should be cross-checked against a representative month before being presented as definitive findings.`,
      loss:0});
  }

  // Order notice — contextual dispatch flag
  if(a.order_notice==='Under 4 hours — same day calls only'&&r.scores.dispatch!==null&&r.scores.dispatch<70){
    issues.push({sev:'amber',pin:false,
      t:`Same-day orders only — route optimisation not feasible at current planning horizon`,
      action:`Focus on rapid response protocols, not route planning`,
      rec:`With under 4 hours notice, formal zone scheduling and route clustering are not achievable. Priority improvements: reduce order-to-dispatch time, ensure trucks are pre-positioned in the yard, and confirm site readiness before departure.`,
      loss:0});
  }

  // Aggregate days risk
  if(a.aggregate_days==='Under 2 days — high supply risk'){
    issues.push({sev:'red',pin:false,
      t:'Aggregate stock under 2 days — one missed delivery stops the plant',
      action:'Call your aggregate supplier today — negotiate a standing delivery schedule',
      rec:'A single missed aggregate delivery at this stock level halts production entirely. Target: 5-day minimum buffer for sand and all aggregate types.',
      loss:0});
  }
  if(a.aggregate_days==='2 to 5 days — tight, supply-sensitive'){
    issues.push({sev:'amber',pin:false,
      t:'Aggregate stock 2–5 days — vulnerable to supply disruption',
      action:'Increase reorder point — extend to 7+ days before Ramadan and public holidays',
      rec:'Aggregate supply disruptions are as common as cement disruptions in GCC markets. This buffer level creates real stoppage risk around holidays and peak season.',
      loss:0});
  }

  // Driver constraint
  if(r.driverConstrained){
    const driversShort=r.operativeTrucks-r.qualifiedDrivers;
    const driverCapLoss=Math.round(driversShort*(r.opH*60/r.TARGET_TA)*0.85*r.mixCap*r.contrib*(r.opD/12));
    issues.push({sev:'amber',pin:false,
      t:`Only ${r.qualifiedDrivers} qualified drivers for ${r.operativeTrucks} operative trucks — drivers are the bottleneck`,
      action:'Prioritise licence renewal and stagger home leave schedules',
      rec:`${driversShort} truck${driversShort>1?'s are':' is'} sitting idle due to driver shortage. Estimated monthly capacity impact: ${fmt(driverCapLoss)}. Stagger home leave so no more than 1–2 drivers are absent simultaneously.`,
      loss:driverCapLoss});
  }

  // Water cost flag
  if(r.waterCost>1){
    issues.push({sev:'amber',pin:false,
      t:`Water cost $${r.waterCost.toFixed(2)}/m³ — significant margin item not tracked by most plants`,
      action:'Include water cost in your per-m³ pricing calculation',
      rec:`Monthly water cost: ${fmt(Math.round(r.waterCost*r.monthlyM3))}. If tanker water is being used, this is a real variable cost that should be factored into pricing and margin tracking.`,
      loss:0});
  }

  // Batch calibration
  if(r.calibrationExposure>0){
    issues.push({sev:'amber',pin:false,
      t:`Batch plant not calibrated in ${a.batch_calibration==='Never calibrated — original factory settings only'?'years (never)':a.batch_calibration.toLowerCase()} — dosing accuracy at risk`,
      action:'Commission professional calibration from equipment manufacturer or certified firm',
      rec:`Uncalibrated weighing equipment typically drifts ±5% on cement dosing. Estimated monthly exposure from 5% cement drift: ${fmt(r.calibrationExposure)}. Professional calibration costs $500–2,000 and pays back within days.`,
      loss:r.calibrationExposure,
      formula:`$${+a.cement_cost||0}/m³ cement × 5% drift × ${r.monthlyM3} m³/month = ${fmt(r.calibrationExposure)}/month`});
  }

  // Summer cooling
  if(a.summer_cooling==='No — no active cooling measures'&&(S.meta?.country==='Saudi Arabia'||S.meta?.country==='UAE'||S.meta?.country==='Kuwait'||S.meta?.country==='Qatar'||S.meta?.country==='Bahrain')){
    issues.push({sev:'amber',pin:false,
      t:'No active concrete cooling — elevated reject risk during summer months',
      action:'Install chilled water system before June — or use ice addition as interim measure',
      rec:'In GCC summer conditions above 42°C, concrete without active cooling regularly exceeds 32°C at discharge — accelerating stiffening and increasing reject rate by 30–50%. A chilled water system typically pays back within one summer season.',
      loss:0});
  }

  // Sort: pinned (primary bottleneck) first, then by dollar value descending
  issues.sort((x,y)=>{
    if(x.pin&&!y.pin)return -1;
    if(!x.pin&&y.pin)return 1;
    return y.loss-x.loss;
  });
  return issues;
}

  // Build why/value context dynamically from issue data

        value:`Fixing dispatch is the single highest-leverage action available. It unlocks hidden delivery capacity (${r.hiddenDel>0?r.hiddenDel+' extra deliveries/day':'see findings'}) without any additional trucks or equipment.`
      };
    }

    // Follow up

  const checklistItems=[];

          <div class="info-panel" id="${whyId}" style="margin-top:6px;background:var(--green-pale);border-color:#9FE1CB">

            ${item.value?`<div style="border-top:1px solid #9FE1CB;padding-top:8px"><strong style="font-size:11px;color:var(--green);text-transform:uppercase;letter-spacing:.4px">What it gives you</strong><br>${item.value}</div>`:''}

  window._clBodyHTML=window._clBodyHTML||{};

    ${(a.prod_data_source==='Estimated by plant manager or dispatcher'||a.prod_data_source==='Rough estimates \u2014 not based on records')?`<div style="background:var(--amber-light);border:1px solid #f9e4a0;border-radius:var(--radius);padding:10px 16px;margin-bottom:12px;font-size:12px;color:#7a5c00;display:flex;align-items:center;gap:10px"><span style="font-size:15px">⚠</span><div><strong style="font-weight:500">Based on estimates</strong> — key figures were not pulled from system records on this visit. Dollar amounts are indicative. Re-validate from batch computer before presenting to ownership.</div></div>`:''}

    ${(()=>{

      const arrow=(n,invertGood)=>{

        +'<div style="display:flex;justify-content:flex-end;margin-top:5px"><span style="font-size:10px;color:rgba(0,0,0,0.35)">Automated &middot; 30 days post-assessment &check;&check;</span></div>'

        +'<button onclick="switchWATab(\''+plantId+'\',1,this)" id="wa-tab-btn-'+plantId+'-1" style="flex:1;padding:10px 4px;font-size:11px;font-weight:500;color:var(--gray-400);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;font-family:var(--font)">&#9313; 30-day check-in</button>'

        +'<div style="margin-top:8px"><div style="'+bubbleWrap+';font-size:12.5px;color:#333;line-height:1.55">2 out of 3 &mdash; strong start. &#128994;<br><br>Action 3 (slump test) takes 15 min with the batch operator. Want a briefing script?<br><br>Next assessment target: <b>90 days from baseline.</b><div style="font-size:10px;color:rgba(0,0,0,0.35);text-align:right;margin-top:4px">09:14 &#10003;&#10003;</div></div></div>'

        +dateLbl+'Owner initiates &mdash; any time</span></div>'
        +'<div style="display:flex;justify-content:flex-end;margin-bottom:8px"><div style="'+outBubbleWrap+'">What was our turnaround last time?<div style="font-size:10px;color:rgba(0,100,60,0.6);text-align:right;margin-top:3px">14:22 &#10003;&#10003;</div></div></div>'
        +'<div style="margin-bottom:8px"><div style="'+bubbleWrap+';font-size:12.5px;color:#333;line-height:1.55"><b>'+m.plant+'</b> &mdash; '+(m.date?new Date(m.date).toLocaleDateString('en-GB',{day:'numeric',month:'short'}):'last assessment')+':<br><br>Truck round trip: <b>'+r.ta+' min</b> (target: '+r.TARGET_TA+' min)<br>'+(r.excessMin>0?'Excess: <b style="color:#c0392b">+'+r.excessMin+' min</b> per trip<br>':'')+'Cost: <b style="color:#c0392b">'+fmt(r.turnaroundLeakMonthly)+'/month</b><div style="font-size:10px;color:rgba(0,0,0,0.35);text-align:right;margin-top:4px">14:22 &#10003;&#10003;</div></div></div>'

      <!-- NIVEAU 2 — ALLE FINDINGS, FOLD-UD -->

      <div style="margin-bottom:10px">
        <button onclick="toggleN2()" id="n2-toggle-btn" style="width:100%;padding:11px 16px;background:var(--white);border:1px solid var(--border);border-radius:var(--radius);font-size:13px;font-weight:500;color:var(--gray-700);cursor:pointer;font-family:var(--font);text-align:left;display:flex;align-items:center;justify-content:space-between;transition:border-color .15s" onmouseover="this.style.borderColor='var(--gray-300)'" onmouseout="this.style.borderColor='var(--border)'">
          <span>All findings <span style="font-size:11px;font-weight:400;color:var(--gray-400)">${issues.length} issue${issues.length!==1?'s':''} — tap to expand</span></span>
          <span id="n2-chevron" style="color:var(--gray-300);font-size:12px">▾</span>
        </button>
        <div id="n2-panel" style="display:none;margin-top:4px;background:var(--white);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">
          ${(()=>{
            if(!issues.length)return'<div style="padding:16px;font-size:13px;color:var(--gray-500)">No critical issues found — plant is above benchmark on all dimensions.</div>';
            const primary=issues.filter(i=>i.loss>0);
            const noted=issues.filter(i=>!i.loss||i.loss===0);
            const renderRow=(iss,i,total)=>`
              <div style="padding:14px 16px;border-bottom:1px solid var(--gray-50);display:flex;gap:10px;align-items:flex-start">
                <div class="issue-n ${iss.pin?'n-red':iss.sev==='red'?'n-red':'n-amb'}" style="margin-top:1px">${iss.pin?'!':i+1}</div>
                <div style="flex:1">
                  <div class="issue-t">${iss.t}${iss.pin?` <span style="font-size:10px;font-weight:600;background:var(--red-light);color:var(--red);padding:1px 6px;border-radius:4px;vertical-align:middle;margin-left:4px">Primary</span>`:''}</div>
                  <div class="issue-r" style="margin-top:4px">${iss.rec.split('.')[0]}.</div>
                </div>
                ${iss.loss>0?`<div class="issue-usd">${fmt(iss.loss)}/mo</div>`:''}
              </div>`;
            let html='';
            if(primary.length){
              html+=`<div style="padding:8px 16px;background:var(--gray-50);border-bottom:1px solid var(--border);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--gray-400)">Primary findings — quantified impact</div>`;
              html+=primary.map((iss,i)=>renderRow(iss,i,primary.length)).join('');
            }
            if(noted.length){
              html+=`<div style="padding:8px 16px;background:var(--gray-50);border-bottom:1px solid var(--border);border-top:1px solid var(--border);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--gray-400)">Also noted — no dollar figure attached</div>`;
              html+=noted.map((iss,i)=>renderRow(iss,i,noted.length)).join('');
            }
            return html;
          })()}
        </div>
      </div>

      <!-- ══════════════════════════════════════════════════════════ -->
      <!-- NIVEAU 3 — SCORES OG DATAGRUNDLAG, FOLD-UD -->
      <!-- ══════════════════════════════════════════════════════════ -->
      <div style="margin-bottom:12px">
        <button onclick="toggleN3()" id="n3-toggle-btn" style="width:100%;padding:11px 16px;background:var(--white);border:1px solid var(--border);border-radius:var(--radius);font-size:13px;font-weight:500;color:var(--gray-700);cursor:pointer;font-family:var(--font);text-align:left;display:flex;align-items:center;justify-content:space-between;transition:border-color .15s" onmouseover="this.style.borderColor='var(--gray-300)'" onmouseout="this.style.borderColor='var(--border)'">
          <span>Scores &amp; data <span style="font-size:11px;font-weight:400;color:var(--gray-400)">Overall ${r.overall??'—'}/100 · ${r.bottleneck?r.bottleneck+' bottleneck':'tap to expand'}</span></span>
          <span id="n3-chevron" style="color:var(--gray-300);font-size:12px">▾</span>
        </button>
        <div id="n3-panel" style="display:none;margin-top:4px;flex-direction:column;gap:8px">

          <!-- Score methodology now in KPI chips above -->

          ${r.hiddenSuspect?`<div style="background:var(--amber-light);border:1px solid #f9e4a0;border-radius:var(--radius);padding:12px 16px;font-size:12px;color:#6b5000"><strong style="font-weight:500">Check inputs:</strong> Fleet capacity gap seems unusually large. Verify turnaround time, operating hours, and daily deliveries.</div>`:''}

          <!-- Data confidence -->
          ${(()=>{
            const dc=calcDataConfidence();
            if(!dc)return'';
            const actionLabel=dc.pct>=90?'Figures are ready to present':dc.pct>=75?'Verify 1–2 figures before presenting to ownership':dc.pct>=65?'Re-validate before presenting to ownership':'Do not present — re-visit required';
            const example=dc.pct>=90?'Both turnaround time and daily deliveries were read directly from the dispatch system and confirmed by a second source.':dc.pct>=75?'E.g. turnaround time was told verbally — confirm against a delivery ticket before presenting the dollar figure to the plant owner.':dc.pct>=65?'E.g. figures were estimated and not cross-checked. Pull turnaround and daily deliveries from the batch computer or dispatch system before your next presentation.':'Confidence is critically low. Key figures were not observed directly and were not cross-checked. Dollar amounts should not be presented. Book a follow-up visit with access to system records.';
            const breakdown=[
              dc.sourceW!==null?`Source ${Math.round(dc.sourceW*100)}%`:null,
              dc.freshW!==null?`Freshness ${Math.round(dc.freshW*100)}%`:null,
              dc.obsW!==null?`Observation ${Math.round(dc.obsW*100)}%`:null,
              dc.crossW!==null?`Cross-check ${Math.round(dc.crossW*100)}%`:null,
              dc.selfCap!==null&&dc.selfCap<1?`Analyst cap ${Math.round(dc.selfCap*100)}%`:null,
            ].filter(Boolean).join(' · ');
            const bg=dc.pct>=90?'var(--green-pale)':dc.pct>=75?'var(--amber-light)':'var(--red-light)';
            const border=dc.pct>=90?'#9FE1CB':dc.pct>=75?'#f9e4a0':'#f5c6c2';
            const infoText=`<strong>What is data confidence?</strong><br><br>Data confidence is a score (0–100%) that reflects how reliable the figures in this assessment are — based on how they were collected, not whether the plant is performing well or badly.<br><br><strong>The four factors:</strong><br><br><strong>Source (${dc.sourceW!==null?Math.round(dc.sourceW*100)+'%':'n/a'})</strong> — Where did the figures come from? System records from a batch computer score 100%. Estimates from memory score 60–70%. The less systematic the source, the more the final dollar figures should be treated as directional.<br><br><strong>Freshness (${dc.freshW!==null?Math.round(dc.freshW*100)+'%':'n/a'})</strong> — How recent are the figures? Data from today scores 100%. Data from last month scores 85%. Turnaround times and daily deliveries can shift 20–30% between seasons or after operational changes.<br><br><strong>Observation (${dc.obsW!==null?Math.round(dc.obsW*100)+'%':'n/a'})</strong> — Did you see the figures yourself? Reading a number off a dispatch screen scores 100%. Being told "roughly 38 deliveries" scores 75%. Verbal figures are typically 10–30% off — managers tend to round to round numbers and recall peak days rather than averages.<br><br><strong>Cross-check (${dc.crossW!==null?Math.round(dc.crossW*100)+'%':'n/a'})</strong> — Were figures confirmed by a second source? A turnaround time confirmed by both the dispatcher and a delivery ticket scores 100%. A single unchecked source scores 80%.<br><br><strong>Analyst cap${dc.selfCap!==null?' ('+Math.round(dc.selfCap*100)+'%)':''}</strong> — Your own on-site judgement. If something felt off during the visit, this overrides the mechanical score. A "Low" self-assessment caps confidence at 65% regardless of the other factors.<br><br><strong>What to do at each level:</strong><br>90%+ → Present with confidence<br>75–89% → Verify the weakest figure before presenting<br>65–74% → Re-validate 2–3 figures from system records<br>Below 65% → Do not present dollar figures — book a re-visit`;
            return`<div style="background:${bg};border:1px solid ${border};border-radius:var(--radius);padding:12px 16px;position:relative">
              <div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:${dc.color};margin-bottom:8px">Data confidence <button class="info-btn" onclick="event.stopPropagation();toggleInfo('dc-info-${plantId}')" style="margin-left:4px">i</button></div>
              <div class="info-panel" id="ip-dc-info-${plantId}" style="margin-bottom:10px;font-size:12px;line-height:1.7">${infoText}</div>
              <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
                <div style="font-size:20px;font-weight:700;color:${dc.color};font-family:var(--mono);flex-shrink:0">${dc.pct}%</div>
                <div>
                  <div style="font-size:12px;font-weight:600;color:${dc.color}">${actionLabel}</div>
                  <div style="font-size:10px;color:var(--gray-400);margin-top:2px">${breakdown}</div>
                </div>
              </div>
              <div style="font-size:12px;color:var(--gray-600);line-height:1.6;border-top:1px solid ${border};padding-top:8px">${example}</div>
            </div>`;
          })()}

          <!-- Consistency checker -->
          ${(()=>{
            const flags=calcConsistency(r);
            if(!flags.length)return`<div style="background:var(--green-pale);border:1px solid #9FE1CB;border-radius:var(--radius);padding:10px 14px;font-size:12px;color:var(--green)">✓ No data inconsistencies detected — figures appear internally consistent.</div>`;
            return`<div style="background:var(--white);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">
              <div style="padding:10px 14px;border-bottom:1px solid var(--border);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--gray-300)">Consistency flags — ${flags.length} issue${flags.length!==1?'s':''}</div>
              ${flags.map(f=>`<div style="padding:10px 14px;border-bottom:1px solid var(--gray-50);display:flex;gap:10px;align-items:flex-start">
                <span style="font-size:14px;flex-shrink:0;margin-top:1px">${f.sev==='red'?'🔴':'🟡'}</span>
                <div style="font-size:12px;color:var(--gray-700);line-height:1.55">${f.msg}</div>
              </div>`).join('')}
            </div>`;
          })()}

        </div>
      </div>

        </div>

      <!-- ══ CALL TO ACTION + SHARE ══ -->
      <div style="background:var(--green-pale);border:1px solid #9FE1CB;border-radius:var(--radius-lg);padding:18px 22px;margin-bottom:10px">
        <div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--green);margin-bottom:12px">Next steps</div>
        <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:16px">
          <div style="display:flex;gap:10px;align-items:flex-start">
            <div style="width:22px;height:22px;border-radius:50%;background:var(--green-mid);color:#fff;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">1</div>
            <div style="font-size:13px;color:var(--gray-700);line-height:1.5"><strong style="font-weight:500">Share this report</strong> — send to the plant owner and operations manager within 48 hours while observations are fresh.</div>

function handleBack(){
  const setup=document.getElementById('diag-setup');
  const walk=document.getElementById('diag-walk');
  const result=document.getElementById('diag-result');
  // From result → back to walkthrough (last section) or setup
  if(result.style.display==='block'){
    result.style.display='none';
    if(Object.keys(S.answers).length>0){
      // Had a walkthrough — go back to last section
      S.sec=SECTIONS.length-1;
      walk.style.display='flex';
      renderSec();
      setBack(true);
    }else{
      // Demo report — go back to setup
      walk.style.display='none';
      setup.style.display='flex';
      S={sec:0,answers:{},meta:{},report:{},edited:{}};
      document.getElementById('topbar-meta').textContent='—';
      setBack(false);
    }
    return;
  }
  // From walkthrough → back to setup
  if(walk.style.display==='flex'){
    if(S.sec>0){
      S.sec--;renderSec();
    }else{
      walk.style.display='none';
      setup.style.display='flex';
      setBack(false);
    }
    return;
  }
}

    const sc=v=>v>=80?'var(--green)':v>=65?'var(--amber)':'var(--red)';
    const secLabel=(label,score,benchLabel)=>{
      const color=score===null?'var(--gray-400)':sc(score);
      return `<div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:${color};margin-bottom:6px">${label} — ${score!==null?score+'/100':'—'} <span style="font-weight:400;color:var(--gray-400)">${benchLabel}</span></div>`;
    };

    const prodText=rd.scores.prod!==null?`<div style="margin-bottom:18px">
      ${secLabel('Production',rd.scores.prod,'GCC benchmark: 85–95%')}
      <p style="font-size:13.5px;line-height:1.85;color:var(--gray-700);margin:0">
        Plant running at ${Math.round(rd.util*100)}% of its ${rd.cap} m³/hr designed capacity.
        ${rd.util>=0.88?'Utilisation is close to target.':'The capacity gap costs '+fmt(rd.capLeakMonthly)+'/month.'}
        Batch cycle: ${S.answers.batch_cycle||'—'}. Unplanned stops: ${S.answers.stops_freq||'—'}.
      </p>
    </div>`:'';

    const logisticsText=rd.scores.logistics!==null?`<div style="margin-bottom:18px">
      ${secLabel('Logistics',rd.scores.logistics,'GCC benchmark: turnaround 75–90 min, 90%+ truck availability')}
      <p style="font-size:13.5px;line-height:1.85;color:var(--gray-700);margin:0">
        Turnaround is ${rd.ta} min — ${rd.excessMin>0?rd.excessMin+' min above the '+rd.TARGET_TA+'-min benchmark for a '+rd.radius+' km delivery radius.':'within the '+rd.TARGET_TA+'-min benchmark.'}
        ${rd.hiddenDel>0?'The fleet could complete '+rd.realisticMaxDel+' deliveries/day; it is completing '+rd.delDay+'. The gap of '+rd.hiddenDel+' hidden deliveries/day costs <strong>'+fmt(rd.turnaroundLeakMonthly)+'/month</strong> from the existing fleet.':''}
      </p>
    </div>`:'';

    const dispText=rd.scores.dispatch!==null?`<div style="margin-bottom:4px">
      ${secLabel('Dispatch',rd.scores.dispatch,'GCC benchmark: order-to-dispatch under 15 min')}
      <p style="font-size:13.5px;line-height:1.85;color:var(--gray-700);margin:0">
        Order-to-dispatch: ${S.answers.order_to_dispatch||'—'} (benchmark: under 15 min).
        Route clustering: ${S.answers.route_clustering||'—'}.
        Tool: ${S.answers.dispatch_tool||'—'}.
        ${rd.rejectPct>1.5?'The '+rd.rejectPct+'% reject rate (benchmark: under 1.5%) adds <strong>'+fmt(rd.rejectLeakMonthly)+'/month</strong> in write-offs.':''}
      </p>
    </div>`:'';

    // Sort sections: worst score first
    const diagSections=[
      {score:rd.scores.prod, html:prodText},
      {score:rd.scores.logistics, html:logisticsText},
      {score:rd.scores.dispatch, html:dispText},
    ].filter(s=>s.html).sort((a,b)=>(a.score??101)-(b.score??101));
    const DYNAMIC_DIAGNOSIS=diagSections.map(s=>s.html).join('');

    const ownerEl=document.getElementById('ai-body-executive');
    // executive is populated by the earlier setTimeout — skip here
    const analystEl=document.getElementById('ai-body-executive-a');
    // executive is populated by the earlier setTimeout — skip here
    const diagEl=document.getElementById('ai-body-diagnosis-a');
    S.report['diagnosis']=DYNAMIC_DIAGNOSIS;
    if(diagEl)diagEl.innerHTML=DYNAMIC_DIAGNOSIS;
    const diagElB=document.getElementById('ai-body-diagnosis-b');
    if(diagElB)diagElB.innerHTML=DYNAMIC_DIAGNOSIS;
    const actEl=document.getElementById('ai-body-actions-a');
    if(actEl)actEl.innerHTML=DEMO_ACTIONS;
    const actElB=document.getElementById('ai-body-actions-b');
    if(actElB)actElB.innerHTML=DEMO_ACTIONS;
  },100);
}

function renderBeforeAfter(){
  const wrap=document.getElementById('before-after-wrap');
  if(!wrap)return;

  // Group by plant name, find pairs
  const byPlant={};
  assessments.forEach(a=>{
    const key=a.plant;
    if(!byPlant[key])byPlant[key]=[];
    byPlant[key].push(a);
  });

  const pairs=Object.entries(byPlant).filter(([,visits])=>visits.length>1);
  if(!pairs.length){wrap.style.display='none';return;}
  wrap.style.display='block';

  const rows=pairs.map(([plant,visits])=>{
    const sorted=[...visits].sort((a,b)=>new Date(a.date)-new Date(b.date));
    const first=sorted[0],last=sorted[sorted.length-1];
    const scoreDiff=(last.overall||0)-(first.overall||0);
    const ebitdaDiff=(first.ebitdaMonthly||0)-(last.ebitdaMonthly||0);
    const taDiff=(first.turnaround||0)-(last.turnaround||0);
    const arrow=n=>n>0?`<span style="color:#27ae60">▲ ${n}</span>`:`<span style="color:${n<0?'#C0392B':'#888'}">▼ ${Math.abs(n)}</span>`;
    return`<div style="padding:12px 16px;border-bottom:1px solid var(--gray-50);display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr 1fr;gap:8px;align-items:center;font-size:12px">
      <div style="font-weight:500">${plant.split('—')[0].trim()}</div>
      <div style="font-family:var(--mono)">${first.overall||'—'} → ${last.overall||'—'} ${arrow(scoreDiff)}</div>
      <div style="font-family:var(--mono)">${first.turnaround||'—'} → ${last.turnaround||'—'} min ${taDiff!==0?arrow(taDiff):''}</div>
      <div style="font-family:var(--mono);color:${ebitdaDiff>0?'#27ae60':'#C0392B'}">${ebitdaDiff>0?'−'+fmt(ebitdaDiff/1000*1000):'+'+fmt(Math.abs(ebitdaDiff))}/mo</div>
      <div style="font-size:10px;color:var(--gray-500)">${sorted.length} visits</div>
    </div>`;
  }).join('');

  wrap.innerHTML=`<div style="background:var(--white);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:12px">
    <div style="padding:10px 16px;border-bottom:1px solid var(--border);font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.5px;color:var(--gray-300)">Before / after — improvement tracking</div>
    <div style="padding:8px 16px;border-bottom:1px solid var(--gray-50);display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr 1fr;gap:8px;font-size:10px;color:var(--gray-400);font-weight:500;text-transform:uppercase;letter-spacing:.4px">
      <div>Plant</div><div>Score</div><div>Turnaround</div><div>Margin/mo</div><div>Visits</div>
    </div>
    ${rows}
  </div>`;
}

// ── SCENARIO SIMULATOR ───────────────────────────────────────────────────────
function renderSimulator(){
  const el=document.getElementById('sim-content');

  // If no assessment loaded but we have demo assessments, show plant picker
  const demoAssessments=assessments.filter(a=>a.demo&&a.overall!=null);
  if((!S.overall&&!S.demo)&&demoAssessments.length>0){
    // Auto-load first demo assessment into S
    const first=demoAssessments[0];
    Object.assign(S,first);
    S.answers=S.answers||{};
  }

  const r=calc();
  const a=S.answers||{};
  const isDemo=!!S.demo;

  // Show plant selector for demo mode
  const plantPickerHtml=demoAssessments.length>1?`
    <div style="margin-bottom:12px">
      <label style="font-size:12px;color:var(--gray-500);margin-right:8px">Select plant:</label>
      <select id="sim-plant-picker" onchange="(function(sel){const idx=+sel.value;const da=assessments.filter(a=>a.demo&&a.overall!=null);Object.assign(S,da[idx]);S.answers=S.answers||{};renderSimulator();})(this)" style="font-size:13px;padding:4px 8px;border:1px solid var(--border);border-radius:6px;font-family:var(--font)">
        ${demoAssessments.map((da,i)=>`<option value="${i}" ${da.plant===S.plant?'selected':''}>${da.plant}</option>`).join('')}
      </select>
    </div>
  `:'';

  if(!isDemo&&(!r||r.overall===null)){
    el.innerHTML=`<div style="text-align:center;padding:60px 24px">
      <div style="font-size:15px;font-weight:600;color:var(--gray-700);margin-bottom:8px">No baseline data</div>
      <div style="font-size:13px;color:var(--gray-500);max-width:320px;margin:0 auto;line-height:1.5">Complete the assessment first to unlock the scenario simulator.</div>
    </div>`;return;
  }

  // Baseline values — demo uses S properties, real uses calc() results
  const bTA=isDemo?(S.turnaround||80):(r.ta||80);
  const bTrucks=isDemo?(S.nTrucks||32):(r.trucks||0);
  const bUtil=isDemo?(S.utilPct||60):(Math.round(r.util*100)||0);
  const bPrice=isDemo?(S.price||50):(r.price||0);
  const bContrib=isDemo?(S.contrib||20):(r.contrib||0);
  const bCap=isDemo?150:(r.cap||0);
  const bOpH=isDemo?10:(r.opH||10);
  const bOpD=isDemo?300:(r.opD||300);
  const bMixCap=isDemo?7:(r.mixCap||7);
  const bDelDay=isDemo?0:(r.delDay||0);
  const bTargetTA=isDemo?80:(r.TARGET_TA||80);
  // Dispatch efficiency derived from dispatch score (not from empty answers)
  const bDispatchEff=isDemo?Math.max(0.4,Math.min(0.98,(S.scores?.dispatch||60)/100)):null;
  // Variable costs = price - contrib (for recalculating contrib when price changes)
  const bVarCosts=bPrice-bContrib;

  // Fix #1: Baseline must account for fleet constraint (not just production)
  const bProdDaily=bCap*(bUtil/100)*0.92*bOpH;
  const bDelsPerTruck=bTA>0?(bOpH*60/bTA):0;
  const bFleetDaily=bDelsPerTruck*bTrucks*bMixCap;
  const bDispEffVal=bDispatchEff||0.80;
  const bEffFleetDaily=bFleetDaily*bDispEffVal;
  const bBaselineDaily=Math.min(bProdDaily,bEffFleetDaily);
  const bAnnualVol=Math.round(bBaselineDaily*bOpD);
  const bEffUnits=isDemo?bTrucks:(r.effectiveUnits||bTrucks);

  // Override r for demo to have correct values for bottleneck/overall/cost display
  const rOverall=isDemo?S.overall:(r.overall);
  const rBottleneck=isDemo?(S.bottleneck||'—'):(r.bottleneck||'—');
  const rCapLeak=isDemo?(S.ebitdaMonthly||0):(r.capLeakMonthly||0);
  const rHiddenRev=isDemo?(S.hiddenRevMonthly||0):(r.hiddenRevMonthly||0);
  // Baseline sub-scores for estimated score calculation
  const bDispatchScore=isDemo?(S.scores?.dispatch||60):(r.scores?.dispatch||60);
  const bQualityScore=isDemo?(S.scores?.quality||60):(r.scores?.quality||60);

  function simCalc(sTA,sTrucks,sUtilPct,sPrice){
    // Production-limited daily capacity
    const sActualRate=bCap*(sUtilPct/100)*0.92;
    const prodDaily=sActualRate*bOpH;
    // Fix #5: Use actual decimal instead of Math.floor for deliveries per truck
    const delsPerTruck=sTA>0?(bOpH*60/sTA):0;
    const totalDels=delsPerTruck*sTrucks;
    const fleetDaily=totalDels*bMixCap;
    // Fix #3: Dispatch efficiency from dispatch score in demo, from answers otherwise
    const dispEff=bDispatchEff||(function(){
      const dMap={'Under 15 minutes \u2014 fast response':0.95,'15 to 25 minutes \u2014 acceptable':0.82,'25 to 40 minutes \u2014 slow':0.65,'Over 40 minutes \u2014 critical bottleneck':0.45};
      return dMap[a.order_to_dispatch]||0.80;
    })();
    const effFleetDaily=fleetDaily*dispEff;
    // Scenario output = min of constraints
    const scenarioDaily=Math.min(prodDaily,effFleetDaily);
    const scenarioAnnual=Math.round(scenarioDaily*bOpD);
    // Determine bottleneck
    const scenarioBottleneck=prodDaily<=effFleetDaily?'Production':'Fleet / Logistics';
    // Fix #2: Contribution recalculated when price changes
    const sContrib=Math.max(0,sPrice-bVarCosts);
    const deltaVol=scenarioAnnual-bAnnualVol;
    const revenueUpside=deltaVol*sPrice;
    const contribUpside=deltaVol*sContrib;
    // Fix #4: Improved score formulas with better clamping
    const sProdScore=Math.max(0,Math.min(100,Math.round((sUtilPct/92)*100)));
    const taRatio=bTargetTA>0?sTA/bTargetTA:1;
    const sFleetScore=Math.max(0,Math.min(100,Math.round(taRatio<=1?100:100-((taRatio-1)*200))));
    return{scenarioAnnual,deltaVol,revenueUpside,contribUpside,scenarioBottleneck,prodDaily,effFleetDaily,sProdScore,sFleetScore,sContrib};
  }

  function fmt(n){return n>=0?'$'+n.toLocaleString():'−$'+Math.abs(n).toLocaleString();}
  function fmtVol(n){return n.toLocaleString()+' m³';}
  function fmtShort(n){
    const abs=Math.abs(n);
    const sign=n<0?'−':'';
    if(abs>=1000000)return sign+'$'+Math.round(abs/100000)/10+'M';
    if(abs>=1000)return sign+'$'+Math.round(abs/1000)+'K';
    return sign+'$'+abs;
  }

  // Theoretical max capacity (best-case: 92% util, target turnaround, all trucks)
  const theoDaily=bCap*0.92*bOpH;
  const theoAnnual=Math.round(theoDaily*bOpD);

  function update(){
    const sTA=+document.getElementById('sim-ta').value;
    const sTrucks=+document.getElementById('sim-trucks').value;
    const sUtil=+document.getElementById('sim-util').value;
    const sPrice=+document.getElementById('sim-price').value;
    document.getElementById('sim-ta-val').textContent=sTA+' min';
    document.getElementById('sim-trucks-val').textContent=sTrucks;
    document.getElementById('sim-util-val').textContent=sUtil+'%';
    document.getElementById('sim-price-val').textContent='$'+sPrice;
    const s=simCalc(sTA,sTrucks,sUtil,sPrice);

    // Confidence & realism based on change magnitude
    const taPctChange=Math.abs(sTA-bTA)/bTA*100;
    const trPctChange=bTrucks>0?Math.abs(sTrucks-bTrucks)/bTrucks*100:0;
    const utilPctChange=Math.abs(sUtil-bUtil);
    const maxChange=Math.max(taPctChange,trPctChange,utilPctChange);
    const confidence=maxChange<15?'High':maxChange<30?'Medium':'Low';
    const confColor=confidence==='High'?'var(--green)':confidence==='Medium'?'var(--amber)':'var(--red)';
    const margin=confidence==='High'?0.10:confidence==='Medium'?0.20:0.30;
    const realism=maxChange<15?'Realistic':maxChange<30?'Moderate':'Aggressive';
    const realColor=realism==='Realistic'?'var(--green)':realism==='Moderate'?'var(--amber)':'var(--red)';

    // Range-based output
    const revLo=Math.round(s.revenueUpside*(1-margin));
    const revHi=Math.round(s.revenueUpside*(1+margin));
    const contLo=Math.round(s.contribUpside*(1-margin));
    const contHi=Math.round(s.contribUpside*(1+margin));
    const deltaColor=s.deltaVol>=0?'var(--green-mid)':'var(--red)';

    document.getElementById('sim-delta-vol').textContent=(s.deltaVol>=0?'+':'')+fmtVol(s.deltaVol);
    document.getElementById('sim-delta-vol').style.color=deltaColor;

    // Update potential bar — shows improvement (green) or degradation (red shrink)
    const baselinePct=Math.min(100,Math.round(bAnnualVol/theoAnnual*100));
    const scenarioPct=Math.min(100,Math.max(0,Math.round(s.scenarioAnnual/theoAnnual*100)));
    const gapPct=Math.max(0,100-scenarioPct);
    const barBaseline=document.getElementById('sim-bar-baseline');
    const barScenario=document.getElementById('sim-bar-scenario');
    if(scenarioPct>=baselinePct){
      // Improvement: baseline stays, green-mid shows gain
      barBaseline.style.width=baselinePct+'%';
      barScenario.style.left=baselinePct+'%';
      barScenario.style.width=(scenarioPct-baselinePct)+'%';
      barScenario.style.background='var(--green-mid)';
      barScenario.style.opacity='0.5';
    }else{
      // Degradation: baseline shrinks to scenario level, lost portion shown in red
      barBaseline.style.width=scenarioPct+'%';
      barScenario.style.left=scenarioPct+'%';
      barScenario.style.width=(baselinePct-scenarioPct)+'%';
      barScenario.style.background='var(--red)';
      barScenario.style.opacity='0.4';
    }
    document.getElementById('sim-bar-label').textContent=fmtVol(s.scenarioAnnual);
    document.getElementById('sim-bar-gap').textContent='Unrealised: '+gapPct+'%';
    document.getElementById('sim-bar-gap').style.color=gapPct<10?'var(--green)':gapPct<30?'var(--amber)':'var(--red)';

    document.getElementById('sim-rev').innerHTML=s.revenueUpside===0?'$0':fmtShort(revLo)+' – '+fmtShort(revHi);
    document.getElementById('sim-rev').style.color=s.revenueUpside>=0?'var(--green-mid)':'var(--red)';
    document.getElementById('sim-contrib').innerHTML=s.contribUpside===0?'$0':fmtShort(contLo)+' – '+fmtShort(contHi);
    document.getElementById('sim-contrib').style.color=s.contribUpside>=0?'var(--green-mid)':'var(--red)';
    // Fix #6: Update contribution per m³ when price changes
    document.getElementById('sim-contrib-note').textContent='($'+Math.round(s.sContrib)+'/m³)';
    // Price-effect isolation: show what price change alone would give at baseline volume
    const priceEffEl=document.getElementById('sim-price-effect');
    if(sPrice!==bPrice){
      const priceOnlyRevenue=(sPrice-bPrice)*bAnnualVol;
      const priceOnlyContrib=(s.sContrib-bContrib)*bAnnualVol;
      priceEffEl.style.display='block';
      priceEffEl.innerHTML='Price change alone at current volume: <strong style="color:'+(priceOnlyContrib>=0?'var(--green-mid)':'var(--red)')+'">'+fmtShort(Math.round(priceOnlyContrib))+'/yr</strong> contribution';
    }else{
      priceEffEl.style.display='none';
    }
    document.getElementById('sim-bottleneck').textContent=s.scenarioBottleneck;
    document.getElementById('sim-bottleneck').style.color=s.scenarioBottleneck===rBottleneck?'var(--gray-700)':'var(--amber)';
    document.getElementById('sim-confidence').textContent=confidence;
    document.getElementById('sim-confidence').style.color=confColor;
    document.getElementById('sim-realism').textContent=realism;
    document.getElementById('sim-realism').style.color=realColor;

    // Constraint detail
    const prodDailyFmt=Math.round(s.prodDaily).toLocaleString();
    const fleetDailyFmt=Math.round(s.effFleetDaily).toLocaleString();
    const limiting=s.prodDaily<=s.effFleetDaily?'Production':'Fleet';
    document.getElementById('sim-constraint-detail').innerHTML=
      'Production: '+prodDailyFmt+' m³/day'+(limiting==='Production'?' ← limiting':'')+
      '<br>Fleet: '+fleetDailyFmt+' m³/day'+(limiting==='Fleet'?' ← limiting':'');

    // Estimated overall score (prod + fleet change, dispatch + quality stay)
    const estScore=Math.max(0,Math.min(100,Math.round((s.sProdScore+s.sFleetScore+bDispatchScore+bQualityScore)/4)));
    const scoreEl=document.getElementById('sim-est-score');
    scoreEl.textContent='~'+estScore;
    scoreEl.style.color=estScore>rOverall?'var(--green-mid)':estScore<rOverall?'var(--red)':'var(--gray-900)';

    // Narrative / Insight
    const changes=[];
    if(sTA!==bTA)changes.push('turnaround from '+bTA+' to '+sTA+' min');
    if(sTrucks!==bTrucks)changes.push('trucks from '+bTrucks+' to '+sTrucks);
    if(sUtil!==bUtil)changes.push('utilization from '+bUtil+'% to '+sUtil+'%');
    let narrative='<span style="color:var(--gray-400)">Adjust the sliders to see the impact.</span>';
    if(changes.length>0){
      const dir=s.deltaVol>=0?'increase':'decrease';
      const absVol=Math.abs(s.deltaVol).toLocaleString();
      const shiftNote=s.scenarioBottleneck!==rBottleneck?'The primary constraint shifts from <strong>'+rBottleneck+'</strong> to <strong>'+s.scenarioBottleneck+'</strong>.':'<strong>'+s.scenarioBottleneck+'</strong> remains the primary constraint.';
      narrative='Adjusting '+changes.join(', ')+' would '+dir+' annual output by ~<strong>'+absVol+' m³</strong>. '+shiftNote;
    }
    document.getElementById('sim-narrative').innerHTML=narrative;

    // Evaluation badge
    const evalEl=document.getElementById('sim-evaluation');
    if(s.deltaVol>0){evalEl.textContent='Positive';evalEl.style.background='#DEF7EC';evalEl.style.color='var(--green)';}
    else if(s.deltaVol<0){evalEl.textContent='Negative';evalEl.style.background='#FDE8E8';evalEl.style.color='var(--red)';}
    else{evalEl.textContent='Neutral';evalEl.style.background='var(--gray-50)';evalEl.style.color='var(--gray-400)';}

    // Recommendation
    const recEl=document.getElementById('sim-recommendation');
    if(changes.length===0){recEl.innerHTML='<span style="color:var(--gray-400)">Move the sliders to get a recommendation.</span>';}
    else if(s.scenarioBottleneck==='Fleet / Logistics'){
      recEl.textContent='Prioritize reducing turnaround time or improving dispatch coordination before adding trucks — this delivers higher impact with lower investment.';
    }else{
      recEl.textContent='Focus on increasing plant utilization through reduced downtime and better production planning. Fleet capacity is sufficient under current conditions.';
    }

    // Warnings (max 2)
    const warns=[];
    if(sTA<40)warns.push('Turnaround under 40 min is rarely achievable without major infrastructure changes.');
    if(sTrucks>bTrucks*1.5)warns.push('Adding more than 50% trucks requires significant fleet investment.');
    if(sUtil>92)warns.push('Utilization above 92% is rarely sustainable long-term.');
    if(sTrucks>bTrucks&&s.scenarioBottleneck==='Production')warns.push('Adding trucks provides limited benefit under current production constraints.');
    if(sPrice!==bPrice)warns.push('Revenue impact is sensitive to price assumptions.');
    const topWarns=warns.slice(0,2);
    document.getElementById('sim-warnings').innerHTML=topWarns.length?topWarns.map(w=>'<div style="padding:5px 10px;background:#FEF3C7;border:1px solid #F9E4A0;border-radius:6px;font-size:11px;color:#7A5C00;margin-bottom:4px">⚠ '+w+'</div>').join(''):'';

    // Mini comparison
    const cmpColor=(old,nw,lower)=>{const better=lower?nw<old:nw>old;const worse=lower?nw>old:nw<old;return better?'color:var(--green-mid)':worse?'color:var(--red)':'';};
    document.getElementById('sim-cmp-ta').innerHTML='Turnaround: <span style="'+cmpColor(bTA,sTA,true)+'">'+bTA+' → '+sTA+'</span>';
    document.getElementById('sim-cmp-trucks').innerHTML='Trucks: <span style="'+cmpColor(bTrucks,sTrucks,false)+'">'+bTrucks+' → '+sTrucks+'</span>';
    document.getElementById('sim-cmp-util').innerHTML='Utilization: <span style="'+cmpColor(bUtil,sUtil,false)+'">'+bUtil+'% → '+sUtil+'%</span>';
    document.getElementById('sim-cmp-price').innerHTML='Price: <span>$'+bPrice+' → $'+sPrice+'</span>';
    const bnShift=s.scenarioBottleneck!==rBottleneck;
    document.getElementById('sim-cmp-bottleneck').innerHTML='Bottleneck: <span style="'+(bnShift?'color:var(--amber);font-weight:600':'')+'">'+rBottleneck+' → '+s.scenarioBottleneck+'</span>';
  }

  const sliderStyle='width:100%;accent-color:var(--green);cursor:pointer';
  const taMin=Math.max(30,Math.round(bTargetTA*0.6)),taMax=Math.max(taMin+10,Math.round(bTA*1.3));
  const trMin=Math.max(1,bTrucks-5),trMax=Math.max(trMin+10,bTrucks+15);
  const priceMin=Math.max(1,Math.round(bPrice*0.8)),priceMax=Math.max(priceMin+10,Math.round(bPrice*1.2));

  const costOfInaction=Math.round(rCapLeak+rHiddenRev);
  el.innerHTML=`
    ${plantPickerHtml}
    <!-- BASELINE BAR (sticky) -->
    <div style="background:var(--green-light);border:1px solid #C8E6D9;border-radius:10px;padding:12px 20px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <div style="display:flex;align-items:center;gap:24px;flex-wrap:wrap">
        <div><span style="font-size:11px;color:var(--gray-500)">Score</span> <span style="font-size:16px;font-weight:700;color:var(--gray-900)">${rOverall}/100</span></div>
        <div><span style="font-size:11px;color:var(--gray-500)">Annual</span> <span style="font-size:16px;font-weight:700;color:var(--gray-900)">${fmtVol(bAnnualVol)}</span></div>
        <div><span style="font-size:11px;color:var(--gray-500)">Bottleneck:</span> <span style="font-size:16px;font-weight:600;color:var(--red)">${rBottleneck}</span></div>
        <div><span style="font-size:11px;color:var(--gray-500)">Cost:</span> <span style="font-size:16px;font-weight:600;color:var(--red)">${fmt(costOfInaction)}/mo</span></div>
      </div>
    </div>

    <!-- 3-COLUMN LAYOUT -->
    <div style="display:grid;grid-template-columns:280px 1fr 320px;gap:16px;min-height:0">

      <!-- LEFT: INPUTS -->
      <div style="background:white;border:1px solid var(--border);border-radius:10px;padding:16px">
        <div style="font-size:11px;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:14px">Inputs</div>
        <div style="display:flex;flex-direction:column;gap:14px">
          <div>
            <div style="display:flex;justify-content:space-between;margin-bottom:4px">
              <label style="font-size:12px;color:var(--gray-600)">Turnaround time</label>
              <span id="sim-ta-val" style="font-size:12px;font-weight:600;color:var(--gray-900)">${bTA} min</span>
            </div>
            <input type="range" id="sim-ta" min="${taMin}" max="${taMax}" value="${bTA}" step="5" oninput="document.getElementById('sim-content').__simUpdate()" style="${sliderStyle}">
            <div style="text-align:center;font-size:9px;color:var(--gray-400)">Baseline: ${bTA}</div>
          </div>
          <div>
            <div style="display:flex;justify-content:space-between;margin-bottom:4px">
              <label style="font-size:12px;color:var(--gray-600)">Number of trucks</label>
              <span id="sim-trucks-val" style="font-size:12px;font-weight:600;color:var(--gray-900)">${bTrucks}</span>
            </div>
            <input type="range" id="sim-trucks" min="${trMin}" max="${trMax}" value="${bTrucks}" step="1" oninput="document.getElementById('sim-content').__simUpdate()" style="${sliderStyle}">
            <div style="text-align:center;font-size:9px;color:var(--gray-400)">Baseline: ${bTrucks}</div>
          </div>
          <div>
            <div style="display:flex;justify-content:space-between;margin-bottom:4px">
              <label style="font-size:12px;color:var(--gray-600)">Utilization target</label>
              <span id="sim-util-val" style="font-size:12px;font-weight:600;color:var(--gray-900)">${bUtil}%</span>
            </div>
            <input type="range" id="sim-util" min="10" max="95" value="${bUtil}" step="1" oninput="document.getElementById('sim-content').__simUpdate()" style="${sliderStyle}">
            <div style="text-align:center;font-size:9px;color:var(--gray-400)">Baseline: ${bUtil}%</div>
          </div>
          <div>
            <div style="display:flex;justify-content:space-between;margin-bottom:4px">
              <label style="font-size:12px;color:var(--gray-600)">Price per m³ <span style="font-size:9px;color:var(--gray-400)">*assumption</span></label>
              <span id="sim-price-val" style="font-size:12px;font-weight:600;color:var(--gray-900)">$${bPrice}</span>
            </div>
            <input type="range" id="sim-price" min="${priceMin}" max="${priceMax}" value="${bPrice}" step="1" oninput="document.getElementById('sim-content').__simUpdate()" style="${sliderStyle}">
            <div style="text-align:center;font-size:9px;color:var(--gray-400)">Baseline: $${bPrice}</div>
          </div>
        </div>
        <div style="margin-top:12px;text-align:center">
          <button onclick="document.getElementById('sim-ta').value='${bTA}';document.getElementById('sim-trucks').value='${bTrucks}';document.getElementById('sim-util').value='${bUtil}';document.getElementById('sim-price').value='${bPrice}';document.getElementById('sim-content').__simUpdate()" style="font-size:11px;color:var(--gray-400);background:none;border:1px solid var(--border);border-radius:6px;padding:4px 12px;cursor:pointer;font-family:var(--font)">Reset ⟳</button>
        </div>
      </div>

      <!-- CENTER: IMPACT -->
      <div style="background:white;border:1px solid var(--border);border-radius:10px;padding:16px;display:flex;flex-direction:column;gap:10px">
        <div style="font-size:11px;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:0.5px">Impact</div>

        <!-- POTENTIAL BAR -->
        <div>
          <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--gray-400);margin-bottom:4px">
            <span>Capacity utilised</span>
            <span>Theoretical max: ${theoAnnual.toLocaleString()} m³/yr</span>
          </div>
          <div style="position:relative;height:28px;background:#FEE2E2;border-radius:6px;overflow:hidden">
            <div id="sim-bar-baseline" style="position:absolute;left:0;top:0;height:100%;background:var(--green);border-radius:6px 0 0 6px;width:${Math.min(100,Math.round(bAnnualVol/theoAnnual*100))}%;transition:width 0.2s"></div>
            <div id="sim-bar-scenario" style="position:absolute;left:${Math.min(100,Math.round(bAnnualVol/theoAnnual*100))}%;top:0;height:100%;background:var(--green-mid);opacity:0.5;border-radius:0;width:0%;transition:all 0.2s"></div>
            <div style="position:absolute;inset:0;display:flex;align-items:center;padding:0 8px;font-size:11px;font-weight:600;color:white">
              <span id="sim-bar-label">${fmtVol(bAnnualVol)}</span>
            </div>
          </div>
          <div style="display:flex;justify-content:space-between;font-size:9px;margin-top:3px">
            <span style="color:var(--green)">Current: ${Math.round(bAnnualVol/theoAnnual*100)}%</span>
            <span id="sim-bar-gap" style="color:var(--red)">Unrealised: ${Math.round((1-bAnnualVol/theoAnnual)*100)}%</span>
          </div>
        </div>

        <!-- DELTA NUMBERS -->
        <div style="display:flex;flex-direction:column;gap:6px">
          <div>
            <div style="font-size:10px;color:var(--gray-500)">Δ Annual output</div>
            <div id="sim-delta-vol" style="font-size:24px;font-weight:700;color:var(--gray-400)">+0 m³</div>
          </div>
          <div>
            <div style="font-size:10px;color:var(--gray-500)">Δ Revenue</div>
            <div id="sim-rev" style="font-size:20px;font-weight:700;color:var(--gray-400)">$0</div>
          </div>
        </div>
        <div>
          <div style="font-size:10px;color:var(--gray-500)">Contribution</div>
          <div style="display:flex;align-items:baseline;gap:8px">
            <span id="sim-contrib" style="font-size:16px;font-weight:600;color:var(--gray-400)">$0</span>
            <span id="sim-contrib-note" style="font-size:10px;color:var(--gray-400)">($${bContrib}/m³)</span>
          </div>
        </div>
        <div id="sim-price-effect" style="display:none;font-size:11px;color:var(--gray-500);padding:6px 8px;background:var(--gray-50);border-radius:6px;line-height:1.4"></div>

        <!-- LIMITING FACTOR -->
        <div style="border-top:1px solid var(--border);padding-top:8px">
          <div style="font-size:10px;color:var(--gray-500);margin-bottom:3px">Limiting factor</div>
          <div id="sim-bottleneck" style="font-size:15px;font-weight:700;color:var(--amber)">${rBottleneck}</div>
          <div id="sim-constraint-detail" style="font-size:10px;color:var(--gray-500);margin-top:3px;line-height:1.4"></div>
        </div>
        <div style="border-top:1px solid var(--border);padding-top:8px">
          <div style="font-size:10px;color:var(--gray-500);margin-bottom:3px">Estimated score</div>
          <div style="display:flex;align-items:baseline;gap:6px">
            <span style="font-size:14px;color:var(--gray-400)">${rOverall}</span>
            <span style="font-size:12px;color:var(--gray-400)">→</span>
            <span id="sim-est-score" style="font-size:18px;font-weight:700;color:var(--gray-900)">${rOverall}</span>
            <span style="font-size:11px;color:var(--gray-400)">/100</span>
          </div>
          <div style="font-size:9px;color:var(--gray-400);margin-top:2px">Dispatch & quality scores unchanged</div>
        </div>
        <div style="border-top:1px solid var(--border);padding-top:6px;display:flex;gap:16px">
          <div><span style="font-size:10px;color:var(--gray-400)">Confidence:</span> <span id="sim-confidence" style="font-size:11px;font-weight:600;color:var(--green)">High</span></div>
          <div><span style="font-size:10px;color:var(--gray-400)">Realism:</span> <span id="sim-realism" style="font-size:11px;font-weight:600;color:var(--green)">Realistic</span></div>
        </div>
      </div>

      <!-- RIGHT: INSIGHT & DECISION -->
      <div style="background:white;border:1px solid var(--border);border-radius:10px;padding:16px;display:flex;flex-direction:column;gap:12px;overflow-y:auto">
        <div>
          <div style="font-size:11px;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px">Insight</div>
          <div id="sim-narrative" style="font-size:12px;color:var(--gray-600);line-height:1.6">
            <span style="color:var(--gray-400)">Adjust the sliders to see the impact.</span>
          </div>
        </div>
        <div>
          <div style="font-size:11px;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px">Evaluation</div>
          <div id="sim-evaluation" style="display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:12px;background:var(--gray-50);color:var(--gray-400)">Neutral</div>
        </div>
        <div>
          <div style="font-size:11px;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px">Recommendation</div>
          <div id="sim-recommendation" style="font-size:12px;color:var(--gray-700);line-height:1.5;font-weight:500">
            <span style="color:var(--gray-400)">Move the sliders to get a recommendation.</span>
          </div>
        </div>
        <div id="sim-warnings" style="margin-top:auto"></div>
      </div>
    </div>

    <!-- MINI COMPARISON (bottom) -->
    <div style="background:var(--gray-50);border:1px solid var(--border);border-radius:10px;padding:10px 20px;margin-top:12px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;font-size:12px;color:var(--gray-600)">
      <span style="font-size:10px;font-weight:600;color:var(--gray-400);text-transform:uppercase;letter-spacing:0.5px">Comparison</span>
      <span id="sim-cmp-ta">Turnaround: ${bTA} → ${bTA}</span>
      <span id="sim-cmp-trucks">Trucks: ${bTrucks} → ${bTrucks}</span>
      <span id="sim-cmp-util">Utilization: ${bUtil}% → ${bUtil}%</span>
      <span id="sim-cmp-price">Price: $${bPrice} → $${bPrice}</span>
      <span id="sim-cmp-bottleneck">Bottleneck: ${rBottleneck} → ${rBottleneck}</span>
    </div>
  `;
  // Attach update function
  document.getElementById('sim-content').__simUpdate=update;
}

function renderDashboard(){
  const body=document.getElementById('dash-body');const sub=document.getElementById('dash-sub');

    sub.textContent='No assessments yet';

      <div class="pc-metrics" style="grid-template-columns:repeat(5,1fr)">
